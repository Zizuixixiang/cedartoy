<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CEDAR TOY · TEST</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #FDF6F7;
      --purple: #BEB1D1;
      --purple-dark: #9B8DB5;
      --purple-darker: #8678A0;
      --purple-light: #E6DFF0;
      --pink: #E6A8B1;
      --pink-dark: #C28B93;
      --text: #5C5463;
      --muted: #9CA3AF;
      --card: #FFFFFF;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html { min-height: 100%; background: var(--bg); image-rendering: pixelated; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(190, 177, 209, .1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(190, 177, 209, .1) 1px, transparent 1px);
      background-size: 20px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    button, a { font: inherit; }
    button { cursor: pointer; touch-action: manipulation; }
    .pixel, h1, h2, .eyebrow, .progress-label, .mode-code, .status-text {
      font-family: "Silkscreen", "Microsoft YaHei", sans-serif;
    }
    .topbar {
      min-height: 60px;
      padding: 10px clamp(14px, 4vw, 30px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      color: #fff;
      background: var(--purple);
      border-bottom: 4px solid var(--purple-dark);
    }
    .brand, .back-link { color: #fff; text-decoration: none; }
    .brand { display: inline-flex; align-items: center; gap: 12px; font-size: clamp(17px, 4vw, 24px); }
    .pixel-logo { width: 22px; height: 16px; border: 4px solid #fff; box-shadow: 8px 8px 0 -4px #fff; }
    .back-link { font-size: 12px; padding: 8px; border: 2px solid rgba(255,255,255,.7); }
    main { width: min(920px, calc(100% - 28px)); margin: 0 auto; padding: clamp(24px, 5vw, 48px) 0 calc(40px + var(--safe-bottom)); }
    .hero { margin-bottom: 22px; }
    .eyebrow { color: var(--pink-dark); font-size: 11px; letter-spacing: .08em; }
    h1 { margin: 7px 0 6px; color: var(--purple-darker); font-size: clamp(26px, 7vw, 46px); line-height: 1.15; }
    .hero p { margin: 0; color: var(--muted); font-size: 14px; }
    .shell {
      position: relative;
      min-height: 430px;
      padding: clamp(18px, 4vw, 34px);
      background: var(--card);
      border: 4px solid var(--purple);
      box-shadow: 10px 10px 0 var(--purple-light);
    }
    .shell::before { content: ""; position: absolute; top: -4px; left: 26px; width: 54px; border-top: 4px solid var(--pink); }
    .status-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-bottom: 26px; }
    .status-text { color: var(--purple-dark); font-size: 11px; }
    .identity { color: var(--muted); font-size: 12px; text-align: right; }
    .panel[hidden] { display: none; }
    .intro { max-width: 660px; }
    h2 { margin: 0 0 10px; color: var(--purple-darker); font-size: clamp(18px, 4vw, 26px); }
    .lead { margin: 0 0 24px; line-height: 1.8; color: #716978; }
    .modes { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .mode-button {
      min-height: 105px;
      padding: 16px;
      text-align: left;
      color: var(--text);
      background: #fff;
      border: 3px solid var(--purple-light);
      box-shadow: 5px 5px 0 rgba(190,177,209,.28);
    }
    .mode-button:hover, .mode-button:focus-visible { outline: 0; border-color: var(--pink); transform: translateY(-2px); }
    .mode-code { display: block; margin-bottom: 9px; color: var(--purple-darker); font-size: 12px; }
    .mode-desc { font-size: 13px; line-height: 1.5; color: var(--muted); }
    .progress-wrap { margin-bottom: 28px; }
    .progress-head { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 9px; }
    .progress-label { font-size: 11px; color: var(--purple-dark); }
    .progress-track { height: 12px; padding: 2px; border: 2px solid var(--purple); background: #fff; }
    .progress-fill { display: block; width: 0; height: 100%; background: var(--pink); transition: width .18s ease; }
    .question-number { margin-bottom: 8px; color: var(--pink-dark); font-size: 12px; }
    .question-intro { margin: 0 0 18px; padding: 12px; color: var(--muted); background: var(--bg); border-left: 4px solid var(--pink); line-height: 1.65; }
    .question-intro[hidden] { display: none; }
    .question-text { margin: 0 0 22px; font-size: clamp(18px, 4vw, 25px); line-height: 1.55; color: var(--text); }
    .mbti-poles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px; margin-bottom: 18px; padding: 3px 0 9px; border-bottom: 2px dashed var(--purple-light); }
    .pole { display: grid; grid-template-columns: 24px minmax(0, 1fr); align-items: start; gap: 6px; padding: 2px 0; line-height: 1.5; background: transparent; border: 0; cursor: default; }
    .pole b { padding-top: 2px; color: var(--purple-darker); font-family: "Silkscreen", sans-serif; font-size: 11px; line-height: 1.35; }
    .pole:last-child b { color: var(--pink-dark); }
    .pole span { color: var(--text); font-size: 13px; }
    .answers { display: grid; gap: 10px; }
    .answers.mbti { display: block; }
    .mbti-scale-ends {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
      color: var(--purple-darker);
      font-family: "Silkscreen", sans-serif;
      font-size: 16px;
    }
    .mbti-scale-direction { color: var(--muted); font-size: 9px; letter-spacing: .08em; }
    .mbti-scale-track {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      overflow: hidden;
      background: linear-gradient(90deg, var(--purple-light), #FFF7F8);
      border: 3px solid var(--purple);
      box-shadow: 5px 5px 0 rgba(190,177,209,.28);
    }
    .ecr-scale-ends {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
      font-family: inherit;
      font-size: clamp(10px, 2.8vw, 13px);
      white-space: nowrap;
    }
    .ecr-scale-ends span:nth-child(2) { text-align: center; }
    .ecr-scale-ends span:last-child { text-align: right; }
    .ecr-scale-track { grid-template-columns: repeat(7, minmax(0, 1fr)); }
    .ecr-scale-track .scale-step { padding-inline: 0; }
    .ecr-neutral { display: block; margin-top: 1px; font-size: 9px; line-height: 1; white-space: nowrap; }
    .scale-step {
      position: relative;
      min-width: 0;
      min-height: 48px;
      padding: 5px 2px;
      color: var(--muted);
      background: transparent;
      border: 0;
      border-right: 2px solid rgba(155,141,181,.38);
      font-size: 11px;
      text-align: center;
    }
    .scale-step:last-child { border-right: 0; }
    .scale-step::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 3px;
      height: 9px;
      background: var(--purple-dark);
      transform: translateX(-50%);
    }
    .scale-step:hover, .scale-step:focus-visible { outline: 0; color: var(--purple-darker); background: rgba(255,255,255,.72); }
    .scale-step.selected {
      color: #fff;
      background: var(--pink);
      box-shadow: inset 0 -5px 0 var(--pink-dark);
    }
    .scale-step.selected::before { background: #fff; }
    .scale-degree { display: block; padding-top: 8px; white-space: nowrap; }
    .answer-button {
      min-height: 58px;
      padding: 12px;
      color: var(--text);
      background: #fff;
      border: 3px solid var(--purple-light);
      text-align: left;
      line-height: 1.45;
    }
    .answers.mbti .answer-button { text-align: center; font-size: 12px; padding: 9px 4px; }
    .answer-button:hover, .answer-button:focus-visible { outline: 0; border-color: var(--pink); background: #FFF7F8; }
    .answer-button.selected { color: var(--purple-darker); border-color: var(--pink); background: #FFF0F2; box-shadow: inset 4px 0 0 var(--pink); }
    button:disabled { cursor: wait; opacity: .55; }
    .result-screen {
      padding: clamp(18px, 4vw, 28px);
      color: var(--text);
      background: #fff;
      border: 4px solid var(--purple);
      box-shadow: 8px 8px 0 var(--purple-light);
    }
    .result-text { margin: 0; padding: 12px; white-space: pre-wrap; overflow-wrap: anywhere; background: var(--bg); border-left: 5px solid var(--pink); font-size: 14px; line-height: 1.75; }
    .result-text[hidden], .result-structured[hidden] { display: none; }
    .result-hero { margin-bottom: 28px; padding-bottom: 20px; border-bottom: 3px solid var(--purple-light); text-align: center; }
    .result-primary { margin: 0; color: var(--purple-darker); font-family: "Silkscreen", "Microsoft YaHei", sans-serif; font-size: clamp(34px, 9vw, 58px); font-weight: 700; line-height: 1.05; }
    .result-primary.dnd-name { font-family: "Microsoft YaHei", sans-serif; font-size: clamp(30px, 8vw, 48px); font-weight: 800; }
    .result-secondary { margin: 8px 0 0; color: var(--pink-dark); font-family: "Silkscreen", "Microsoft YaHei", sans-serif; font-size: clamp(11px, 3vw, 15px); }
    .result-nickname { margin: 7px 0 0; color: var(--muted); font-size: 13px; }
    .result-section { margin-top: 26px; }
    .result-section h3 { margin: 0 0 11px; color: var(--purple-darker); font-family: "Silkscreen", "Microsoft YaHei", sans-serif; font-size: 14px; }
    .result-section p { margin: 0 0 12px; line-height: 1.8; }
    .result-copy-paragraph { white-space: pre-line; }
    .axis-list { display: grid; gap: 15px; }
    .axis-card { padding: 12px; background: var(--bg); border: 2px solid var(--purple-light); }
    .axis-labels { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 8px; color: var(--purple-darker); font-family: "Silkscreen", "Microsoft YaHei", sans-serif; font-size: 11px; }
    .axis-track { position: relative; height: 16px; background: linear-gradient(90deg, var(--purple-light), #fff 50%, #FBECEF); border: 2px solid var(--purple); }
    .axis-track::after { content: ""; position: absolute; top: 0; bottom: 0; left: 50%; border-left: 2px dotted rgba(155,141,181,.55); }
    .axis-cursor { position: absolute; z-index: 1; top: -7px; width: 8px; height: 26px; background: var(--pink); border: 2px solid var(--pink-dark); transform: translateX(-50%); }
    .result-footnote { margin: 28px 0 0; padding-top: 12px; color: var(--muted); border-top: 2px dashed var(--purple-light); font-size: 10px; line-height: 1.6; overflow-wrap: anywhere; }
    .metric-bars { display: grid; gap: 14px; }
    .metric-bar-row { min-width: 0; }
    .metric-bar-labels { display: grid; grid-template-columns: minmax(0, 1fr) auto; align-items: baseline; gap: 10px; margin-bottom: 7px; }
    .metric-bar-name { min-width: 0; color: var(--purple-darker); font-size: 12px; font-weight: 700; overflow-wrap: anywhere; }
    .metric-bar-value { color: var(--pink-dark); font-family: "Silkscreen", "Microsoft YaHei", sans-serif; font-size: 12px; white-space: nowrap; }
    .metric-bar-track { height: 16px; overflow: hidden; background: var(--bg); border: 2px solid var(--purple-light); }
    .metric-bar-fill { height: 100%; min-width: 0; background: linear-gradient(90deg, var(--purple), var(--pink)); transition: width .45s ease; }
    .metric-bars-large .metric-bar-track { height: 26px; border-color: var(--purple); }
    .metric-bars-large .metric-bar-name, .metric-bars-large .metric-bar-value { font-size: 14px; }
    .metric-bars-compact { gap: 8px; margin-top: 12px; }
    .metric-bars-compact .metric-bar-labels { gap: 6px; margin-bottom: 4px; }
    .metric-bars-compact .metric-bar-name, .metric-bars-compact .metric-bar-value { font-size: 9px; }
    .metric-bars-compact .metric-bar-track { height: 10px; border-width: 1px; }
    .metric-bar-fill.humanity-certified-carbon { background: linear-gradient(90deg, #BD82A7, var(--pink)); }
    .metric-bar-fill.humanity-human-flavor { background: linear-gradient(90deg, var(--purple), #C78CAC); }
    .metric-bar-fill.humanity-mixed-signal { background: linear-gradient(90deg, var(--purple-dark), var(--purple)); }
    .metric-bar-fill.humanity-cyber-infiltration { background: linear-gradient(90deg, var(--purple-darker), var(--purple-dark)); }
    .metric-bar-fill.humanity-check-cooling { background: linear-gradient(90deg, #4F4661, #80758F); }
    .compare-box { margin-top: 24px; padding: 16px; background: var(--bg); border: 2px dashed var(--purple); }
    .compare-box h3 { margin: 0 0 10px; color: var(--purple-darker); font-size: 14px; }
    .compare-form { display: flex; flex-wrap: wrap; gap: 10px; }
    .compare-form input { flex: 1 1 220px; min-width: 0; padding: 10px 12px; color: var(--text); background: #fff; border: 3px solid var(--purple-light); }
    .compare-people { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .compare-person { padding: 14px; background: var(--bg); border: 2px solid var(--purple-light); overflow-wrap: anywhere; }
    .compare-person h3 { margin: 0 0 9px; color: var(--purple-darker); font-size: 13px; }
    .compare-score-line { margin: 0; color: var(--muted); font-size: 11px; line-height: 1.6; }
    .compare-emphasis-line { margin: 7px 0 0; color: var(--purple-darker); font-size: 14px; font-weight: 700; line-height: 1.55; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }
    .pixel-button {
      min-height: 43px;
      padding: 9px 16px;
      color: #fff;
      background: var(--pink);
      border: 0;
      border-right: 4px solid var(--pink-dark);
      border-bottom: 4px solid var(--pink-dark);
      text-decoration: none;
    }
    .pixel-button.secondary { color: var(--purple-darker); background: #fff; border: 3px solid var(--purple); box-shadow: 4px 4px 0 var(--purple-light); }
    .question-actions { display: flex; justify-content: space-between; gap: 12px; margin-top: 22px; }
    .review-confirm { margin: clamp(34px, 8vw, 70px) 0; color: var(--purple-darker); font-size: clamp(18px, 4vw, 25px); font-weight: 700; text-align: center; }
    .review-actions { display: flex; flex-wrap: nowrap; justify-content: space-between; gap: clamp(6px, 2vw, 12px); }
    .review-actions .pixel-button { flex: 1 1 0; min-width: 0; padding-inline: clamp(5px, 2vw, 16px); white-space: nowrap; font-size: clamp(9px, 2.5vw, 12px); }
    .source { margin: 24px 0 0; color: var(--muted); text-align: center; font-size: 12px; }
    .entertainment-badge { width: fit-content; margin: 10px 0 0 auto; color: var(--purple-darker); border: 2px solid var(--purple); padding: 4px 8px; font-size: 9px; letter-spacing: .12em; }
    .loading { display: grid; min-height: 260px; place-items: center; color: var(--purple-dark); text-align: center; }
    .error { margin: 0 0 16px; padding: 12px; color: #9d4f5b; background: #FFF0F2; border-left: 5px solid var(--pink); line-height: 1.5; }
    .error[hidden] { display: none; }
    @media (max-width: 680px) {
      .topbar { min-height: 56px; }
      .brand { font-size: 16px; }
      .back-link { font-size: 10px; }
      main { width: min(100% - 20px, 920px); padding-top: 22px; }
      .shell { min-height: 470px; padding: 18px 14px; box-shadow: 6px 6px 0 var(--purple-light); }
      .status-row { align-items: flex-start; margin-bottom: 21px; }
      .identity { max-width: 56%; font-size: 10px; overflow-wrap: anywhere; }
      .modes { grid-template-columns: 1fr; }
      .mbti-poles { grid-template-columns: 1fr; gap: 7px; }
      .answer-button { min-height: 54px; }
      .scale-step { min-height: 48px; font-size: 10px; }
      .mbti-scale-direction { font-size: 8px; }
      .ecr-scale-ends { gap: 2px; font-size: 10px; }
      .ecr-scale-track { overflow: hidden; }
      .ecr-scale-track .scale-step { min-width: 0; border-right-width: 1px; }
      .result-screen { padding: 16px 12px; box-shadow: 5px 5px 0 var(--purple-light); }
      .axis-card { padding: 10px 8px; }
      .compare-people { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand pixel" href="/"><span class="pixel-logo" aria-hidden="true"></span>CEDAR TOY</a>
    <a class="back-link pixel" href="/">← ARCADE</a>
  </header>
  <main>
    <section class="hero">
      <div class="eyebrow" id="subtitle"></div>
      <h1 id="title"></h1>
      <p>人类网页端 · 进度保留 24 小时</p>
    </section>
    <section class="shell" aria-live="polite">
      <div class="status-row">
        <span class="status-text" id="statusText">SYSTEM / CONNECTING</span>
        <span class="identity" id="identity"></span>
      </div>
      <p class="error" id="error" hidden></p>

      <div class="panel loading" id="loadingPanel"><span class="pixel">LOADING SAVE...</span></div>

      <div class="panel intro" id="modePanel" hidden>
        <h2>选择测试模式</h2>
        <p class="lead">答案只保存在这台设备，全部答完并确认后才会一次提交。刷新页面可以继续，也可以随时返回修改。</p>
        <div class="modes" id="modes"></div>
      </div>

      <div class="panel" id="questionPanel" hidden>
        <p class="question-intro" id="questionIntro" hidden></p>
        <div class="progress-wrap">
          <div class="progress-head"><span class="progress-label" id="modeLabel"></span><span class="progress-label" id="progressLabel"></span></div>
          <div class="progress-track"><span class="progress-fill" id="progressFill"></span></div>
        </div>
        <div class="question-number" id="questionNumber"></div>
        <h2 class="question-text" id="questionText"></h2>
        <div class="mbti-poles" id="mbtiPoles" hidden></div>
        <div class="answers" id="answers"></div>
        <div class="question-actions">
          <button class="pixel-button secondary pixel" id="previousButton" type="button">← 上一题</button>
          <button class="pixel-button secondary pixel" id="reviewButton" type="button" hidden>查看答题卡 →</button>
        </div>
      </div>

      <div class="panel" id="reviewPanel" hidden>
        <h2>确认提交</h2>
        <p class="review-confirm" id="reviewSummary"></p>
        <div class="actions review-actions">
          <button class="pixel-button secondary pixel" id="modifyButton" type="button">← 返回修改</button>
          <button class="pixel-button pixel" id="submitButton" type="button">提交并查看结果 →</button>
        </div>
      </div>

      <div class="panel" id="resultPanel" hidden>
        <h2>测试结果</h2>
        <div class="result-screen">
          <div class="result-structured" id="resultStructured"></div>
          <p class="result-text" id="resultText" hidden></p>
        </div>
        <div class="actions">
          <button class="pixel-button pixel" id="restartButton" type="button">RETEST →</button>
          <a class="pixel-button secondary pixel" href="/">BACK TO ARCADE</a>
        </div>
        <div class="compare-box" id="compareBox" hidden>
          <h3>双人对测</h3>
          <p>输入对方用户名或账号 id；游客可输入 guest: 开头的 id。无需授权，游客与账号同权。</p>
          <div class="compare-form">
            <input id="comparePlayerId" type="text" maxlength="70" placeholder="对方用户名或账号 id" autocomplete="off">
            <button class="pixel-button pixel" id="compareButton" type="button">COMPARE →</button>
          </div>
        </div>
      </div>
    </section>
    <p class="source" id="source"></p>
    <p class="entertainment-badge">仅供娱乐</p>
  </main>
  <script>
    const CONFIG = __TEST_GAME_CONFIG__;
    const TOKEN_KEY = "cedartoy_token";
    const GUEST_KEY = "cedartoy_guest_web_player_id";
    const panels = ["loadingPanel", "modePanel", "questionPanel", "reviewPanel", "resultPanel"];
    let activeState = null;
    let answers = [];
    let cursor = 0;
    let busy = false;

    const $ = (id) => document.getElementById(id);
    document.title = `${CONFIG.title} · CEDAR TOY`;
    $("title").textContent = CONFIG.title;
    $("subtitle").textContent = CONFIG.subtitle;
    $("source").textContent = CONFIG.source;

    function token() { return localStorage.getItem(TOKEN_KEY) || ""; }
    function guestPlayerId() {
      let value = localStorage.getItem(GUEST_KEY) || "";
      if (/^guest:web[a-zA-Z0-9]{1,61}$/.test(value)) return value;
      let suffix = "";
      if (globalThis.crypto?.getRandomValues) {
        const bytes = new Uint8Array(12);
        crypto.getRandomValues(bytes);
        suffix = Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("");
      } else {
        suffix = `${Date.now().toString(36)}${Math.random().toString(36).slice(2)}`.replace(/[^a-zA-Z0-9]/g, "");
      }
      value = `guest:web${suffix}`;
      localStorage.setItem(GUEST_KEY, value);
      return value;
    }
    function identityBody(extra = {}) { return {player_id: guestPlayerId(), ...extra}; }
    function requestHeaders() {
      const headers = {"Content-Type": "application/json"};
      if (token()) headers.Authorization = `Bearer ${token()}`;
      return headers;
    }
    function draftKey(playerId = activeState?.player_id || guestPlayerId()) {
      return `cedartoy_${CONFIG.game}_web_draft_${playerId}`;
    }

    function showPanel(id) {
      panels.forEach((panelId) => { $(panelId).hidden = panelId !== id; });
    }
    function showError(message = "") {
      $("error").textContent = message;
      $("error").hidden = !message;
    }
    function setIdentity(data) {
      const shareable = CONFIG.game === "love" || CONFIG.game === "ecr";
      const label = data.identity === "account"
        ? `ACCOUNT #${data.player_id}`
        : (shareable ? `GUEST / ${data.player_id}` : "GUEST / LOCAL SAVE");
      $("identity").textContent = label;
    }
    function setButtonsDisabled(disabled) {
      document.querySelectorAll("button").forEach((button) => { button.disabled = disabled; });
    }

    async function api(action, payload = {}, retryGuest = true) {
      const response = await fetch(`/api/${CONFIG.game}/${action}`, {
        method: "POST",
        headers: requestHeaders(),
        body: JSON.stringify(identityBody(payload)),
        cache: "no-store"
      });
      const data = await response.json().catch(() => ({}));
      if (response.status === 401 && token() && retryGuest) {
        localStorage.removeItem(TOKEN_KEY);
        return api(action, payload, false);
      }
      if (!response.ok) {
        const error = new Error(data.error || "请求失败，请稍后重试");
        error.status = response.status;
        throw error;
      }
      return data;
    }

    function renderModes() {
      activeState = null;
      answers = [];
      cursor = 0;
      $("statusText").textContent = "SYSTEM / SELECT MODE";
      $("modes").innerHTML = "";
      [
        {edition: "quick", label: "快速版 · 16题", desc: "用较短时间完成一次人格偏好扫描"},
        {edition: "complete", label: "完整版 · 93题", desc: "更细致地覆盖四组人格偏好维度"}
      ].forEach((item) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "mode-button";
        const code = document.createElement("span");
        code.className = "mode-code";
        code.textContent = item.label;
        const desc = document.createElement("span");
        desc.className = "mode-desc";
        desc.textContent = item.desc;
        button.append(code, desc);
        button.addEventListener("click", () => start(item.edition, true));
        $("modes").appendChild(button);
      });
      showPanel("modePanel");
    }

    function restoreDraft(state) {
      answers = Array(state.total).fill(null);
      cursor = 0;
      try {
        const saved = JSON.parse(localStorage.getItem(draftKey()) || "null");
        if ((!saved?.game || saved.game === CONFIG.game) && saved?.edition === state.edition && saved.total === state.total && Array.isArray(saved.answers)) {
          answers = Array.from({length: state.total}, (_, index) => Number.isInteger(saved.answers[index]) ? saved.answers[index] : null);
          cursor = Math.max(0, Math.min(Number(saved.cursor) || 0, state.total - 1));
        }
      } catch (_) {}
    }
    function saveDraft() {
      if (!activeState) return;
      localStorage.setItem(draftKey(), JSON.stringify({
        game: CONFIG.game,
        edition: activeState.edition,
        total: activeState.total,
        answers,
        cursor
      }));
    }
    function clearDraft() {
      if (activeState) localStorage.removeItem(draftKey());
      answers = [];
      cursor = 0;
    }

    function scrollToResultPanel() {
      const panel = $("resultPanel");
      if (!panel) return;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          panel.scrollIntoView({behavior: "smooth", block: "start"});
        });
      });
    }

    function renderState(state) {
      activeState = state;
      setIdentity(state);
      if (state.complete) {
        clearDraft();
        $("statusText").textContent = "SYSTEM / SCAN COMPLETE";
        renderResult(state.result_data, state.result || "结果已生成。");
        $("compareBox").hidden = !(CONFIG.game === "love" || CONFIG.game === "ecr");
        showPanel("resultPanel");
        scrollToResultPanel();
        return;
      }
      restoreDraft(state);
      $("statusText").textContent = "SYSTEM / LOCAL SAVE";
      renderQuestion();
      showPanel("questionPanel");
    }

    function renderQuestion() {
      const question = activeState.questions[cursor];
      if (!question) return;
      const answeredCount = answers.filter(Number.isInteger).length;
      $("modeLabel").textContent = CONFIG.game === "mbti"
        ? (activeState.edition === "quick" ? "快速版 · 16题" : "完整版 · 93题")
        : ({dnd: "九阵营 · 36题", love: "爱之语 · 30题", ecr: "依恋类型 · 36题", humanity: "人类浓度 · 20题"}[CONFIG.game] || "测试");
      $("progressLabel").textContent = `${cursor + 1} / ${activeState.total}`;
      $("progressFill").style.width = `${Math.max(2, answeredCount / activeState.total * 100)}%`;
      $("questionNumber").textContent = `QUESTION ${question.number}`;
      $("questionText").textContent = question.text;
      $("questionIntro").textContent = activeState.instructions || "";
      $("questionIntro").hidden = cursor !== 0 || !activeState.instructions;
      $("answers").innerHTML = "";

      if (CONFIG.game === "mbti") {
        $("mbtiPoles").hidden = false;
        $("mbtiPoles").innerHTML = `<div class="pole"><b>A</b><span></span></div><div class="pole"><b>B</b><span></span></div>`;
        $("mbtiPoles").children[0].querySelector("span").textContent = question.option_a;
        $("mbtiPoles").children[1].querySelector("span").textContent = question.option_b;
        $("answers").className = "answers mbti";
        renderMbtiScale();
      } else if (CONFIG.game === "ecr") {
        $("mbtiPoles").hidden = true;
        $("answers").className = "answers mbti ecr";
        renderEcrScale(question);
      } else {
        $("mbtiPoles").hidden = true;
        $("answers").className = "answers";
        question.options.forEach((option) => addAnswer(option.value, `${option.value}. ${option.text}`));
      }
      $("previousButton").disabled = busy || cursor === 0;
      $("reviewButton").hidden = !answers.every(Number.isInteger);
    }
    function renderMbtiScale() {
      const ends = document.createElement("div");
      ends.className = "mbti-scale-ends";
      ends.innerHTML = '<span>B</span><span class="mbti-scale-direction">完全 ← 偏向程度 → 完全</span><span>A</span>';

      const track = document.createElement("div");
      track.className = "mbti-scale-track";
      track.setAttribute("role", "radiogroup");
      track.setAttribute("aria-label", "从完全偏向 B 到完全偏向 A");
      [
        [0, "完全", "完全偏向 B"],
        [1, "较多", "较多偏向 B"],
        [2, "略偏", "略微偏向 B"],
        [3, "略偏", "略微偏向 A"],
        [4, "较多", "较多偏向 A"],
        [5, "完全", "完全偏向 A"]
      ].forEach(([value, degree, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "scale-step";
        button.setAttribute("role", "radio");
        button.setAttribute("aria-label", label);
        button.setAttribute("aria-checked", String(answers[cursor] === value));
        button.classList.toggle("selected", answers[cursor] === value);
        button.innerHTML = `<span class="scale-degree">${degree}</span>`;
        button.addEventListener("click", () => answer(value));
        track.appendChild(button);
      });
      $("answers").append(ends, track);
    }
    function renderEcrScale(question) {
      const optionLabels = new Map(question.options.map((option) => [option.value, option.text]));
      const ends = document.createElement("div");
      ends.className = "mbti-scale-ends ecr-scale-ends";
      ends.innerHTML = `<span>${optionLabels.get(1) || "非常不同意"}</span><span>${optionLabels.get(4) || "中立"}</span><span>${optionLabels.get(7) || "非常同意"}</span>`;

      const track = document.createElement("div");
      track.className = "mbti-scale-track ecr-scale-track";
      track.setAttribute("role", "radiogroup");
      track.setAttribute("aria-label", "从非常不同意到非常同意");
      [1, 2, 3, 4, 5, 6, 7].forEach((value) => {
        const button = document.createElement("button");
        const label = optionLabels.get(value) || String(value);
        button.type = "button";
        button.className = "scale-step";
        button.setAttribute("role", "radio");
        button.setAttribute("aria-label", `${value}，${label}`);
        button.setAttribute("aria-checked", String(answers[cursor] === value));
        button.classList.toggle("selected", answers[cursor] === value);
        button.innerHTML = `<span class="scale-degree">${value}${value === 4 ? '<span class="ecr-neutral">中立</span>' : ""}</span>`;
        button.addEventListener("click", () => answer(value));
        track.appendChild(button);
      });
      $("answers").append(ends, track);
    }
    function addAnswer(value, label) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "answer-button";
      button.textContent = label;
      button.classList.toggle("selected", answers[cursor] === value);
      button.addEventListener("click", () => answer(value));
      $("answers").appendChild(button);
    }

    async function start(edition, discardDraft = false) {
      if (busy) return;
      busy = true;
      showError();
      setButtonsDisabled(true);
      $("statusText").textContent = "SYSTEM / INITIALIZING";
      try {
        if (discardDraft && activeState) localStorage.removeItem(draftKey());
        renderState(await api("start", CONFIG.game === "mbti" ? {edition} : {}));
      } catch (error) {
        showError(error.message);
        if (CONFIG.game === "mbti") {
          renderModes();
        } else {
          $("loadingPanel").querySelector("span").textContent = "连接失败，请刷新重试";
          showPanel("loadingPanel");
        }
      } finally {
        busy = false;
        setButtonsDisabled(false);
      }
    }
    function answer(value) {
      if (busy || !activeState) return;
      answers[cursor] = value;
      if (cursor < activeState.total - 1) cursor += 1;
      saveDraft();
      if (answers.every(Number.isInteger)) renderReview();
      else renderQuestion();
    }

    function goToQuestion(index) {
      if (!activeState) return;
      cursor = Math.max(0, Math.min(index, activeState.total - 1));
      saveDraft();
      renderQuestion();
      showPanel("questionPanel");
    }

    function renderReview() {
      if (!activeState || !answers.every(Number.isInteger)) return;
      $("statusText").textContent = "SYSTEM / REVIEW ANSWERS";
      $("reviewSummary").textContent = `已答完 ${activeState.total} 题，确认提交？`;
      showPanel("reviewPanel");
    }

    function makeResultElement(tag, className, text = "") {
      const node = document.createElement(tag);
      node.className = className;
      node.textContent = text;
      return node;
    }

    function resultPercent(value) {
      const number = Number(value);
      return Number.isInteger(number) ? String(number) : number.toFixed(1);
    }

    function validAxis(axis) {
      return axis && typeof axis.left === "string" && typeof axis.right === "string"
        && Number.isFinite(Number(axis.left_percent)) && Number.isFinite(Number(axis.right_percent));
    }

    function appendResultAxes(root, axes, title) {
      const section = makeResultElement("section", "result-section");
      section.appendChild(makeResultElement("h3", "", title));
      const list = makeResultElement("div", "axis-list");
      axes.forEach((axis) => {
        const card = makeResultElement("div", "axis-card");
        const labels = makeResultElement("div", "axis-labels");
        labels.append(
          makeResultElement("span", "", `${axis.left} ${resultPercent(axis.left_percent)}%`),
          makeResultElement("span", "", `${resultPercent(axis.right_percent)}% ${axis.right}`)
        );
        const track = makeResultElement("div", "axis-track");
        const marker = makeResultElement("span", "axis-cursor");
        marker.style.left = `${Math.max(0, Math.min(100, Number(axis.right_percent)))}%`;
        track.appendChild(marker);
        card.append(labels, track);
        list.appendChild(card);
      });
      section.appendChild(list);
      root.appendChild(section);
    }

    function appendResultTextSection(root, title, text) {
      const section = makeResultElement("section", "result-section");
      section.appendChild(makeResultElement("h3", "", title));
      String(text).split(/\n\s*\n/).filter(Boolean).forEach((paragraph) => {
        section.appendChild(makeResultElement("p", "result-copy-paragraph", paragraph));
      });
      root.appendChild(section);
    }

    function renderMbtiResult(root, data) {
      const requiredText = [data.type, data.type_name, data.nickname, data.description, data.strengths, data.weaknesses];
      if (data.kind !== "mbti" || requiredText.some((value) => typeof value !== "string" || !value)
          || !Array.isArray(data.dimensions) || data.dimensions.length !== 4 || !data.dimensions.every(validAxis)) return false;
      const hero = makeResultElement("div", "result-hero");
      hero.append(
        makeResultElement("p", "result-primary", data.type),
        makeResultElement("p", "result-secondary", data.type_name),
        makeResultElement("p", "result-nickname", data.nickname)
      );
      root.appendChild(hero);
      appendResultAxes(root, data.dimensions, "四个维度");
      appendResultTextSection(root, "类型描述", data.description);
      appendResultTextSection(root, "性格优势", data.strengths);
      appendResultTextSection(root, "注意事项", data.weaknesses);
      return true;
    }

    function renderDndResult(root, data) {
      const bucketKeys = ["lx", "nx", "cx", "xg", "xn", "xe"];
      if (data.kind !== "dnd" || !data.name_zh || !data.name_en || !data.description
          || !Array.isArray(data.axes) || data.axes.length !== 2 || !data.axes.every(validAxis)
          || !data.raw_buckets || !bucketKeys.every((key) => Number.isFinite(Number(data.raw_buckets[key])))) return false;
      const hero = makeResultElement("div", "result-hero");
      hero.append(
        makeResultElement("p", "result-primary dnd-name", data.name_zh),
        makeResultElement("p", "result-secondary", data.name_en)
      );
      root.appendChild(hero);
      appendResultAxes(root, data.axes, "阵营坐标");
      appendResultTextSection(root, "阵营描述", data.description);
      const raw = data.raw_buckets;
      root.appendChild(makeResultElement(
        "p",
        "result-footnote",
        `原始桶分：守序 ${raw.lx} / 中立 ${raw.nx} / 混乱 ${raw.cx}；善良 ${raw.xg} / 中立 ${raw.xn} / 邪恶 ${raw.xe}`
      ));
      return true;
    }

    function appendMetricBars(root, entries, title = "", modifier = "") {
      const section = makeResultElement("section", "result-section");
      if (title) section.appendChild(makeResultElement("h3", "", title));
      const bars = makeResultElement("div", `metric-bars ${modifier}`.trim());
      entries.forEach((entry) => {
        const value = Number(entry.value);
        const minimum = Number(entry.min ?? 0);
        const maximum = Number(entry.max);
        const ratio = maximum > minimum ? (value - minimum) / (maximum - minimum) : 0;
        const percentage = Math.max(0, Math.min(100, ratio * 100));
        const row = makeResultElement("div", "metric-bar-row");
        const labels = makeResultElement("div", "metric-bar-labels");
        labels.append(
          makeResultElement("span", "metric-bar-name", entry.label),
          makeResultElement("span", "metric-bar-value", entry.display ?? String(value))
        );
        const track = makeResultElement("div", "metric-bar-track");
        track.setAttribute("role", "progressbar");
        track.setAttribute("aria-label", entry.label);
        track.setAttribute("aria-valuemin", String(minimum));
        track.setAttribute("aria-valuemax", String(maximum));
        track.setAttribute("aria-valuenow", String(value));
        const fillClass = entry.fillClass ? `metric-bar-fill ${entry.fillClass}` : "metric-bar-fill";
        const fill = makeResultElement("div", fillClass);
        fill.style.width = `${percentage}%`;
        track.appendChild(fill);
        row.append(labels, track);
        bars.appendChild(row);
      });
      section.appendChild(bars);
      root.appendChild(section);
    }

    function renderLoveResult(root, data) {
      const codes = ["A", "B", "C", "D", "E"];
      if (data.kind !== "love" || !data.scores || !data.dimensions
          || !codes.every((code) => Number.isFinite(Number(data.scores[code])) && data.dimensions[code])
          || !Array.isArray(data.primary_names) || !data.primary_names.length) return false;
      const hero = makeResultElement("div", "result-hero");
      hero.append(
        makeResultElement("p", "result-primary dnd-name", data.primary_names.join(" · ")),
        makeResultElement("p", "result-secondary", "你的主语言")
      );
      if (Array.isArray(data.secondary_names) && data.secondary_names.length) {
        hero.appendChild(makeResultElement("p", "result-nickname", `次语言：${data.secondary_names.join("、")}`));
      }
      root.appendChild(hero);
      appendMetricBars(root, codes.map((code) => ({
        label: `${code} · ${data.dimensions[code]}`,
        value: data.scores[code],
        max: 12,
        display: `${data.scores[code]} / 12`
      })), "五维分数");
      (data.descriptions || []).forEach((description, index) => {
        appendResultTextSection(root, data.primary_names[index] || "主语言描述", description);
      });
      (data.secondary_descriptions || []).forEach((description, index) => {
        appendResultTextSection(
          root,
          (data.secondary_labels || [])[index] || "次语言描述",
          description
        );
      });
      root.appendChild(makeResultElement("p", "result-footnote", data.reminder));
      return true;
    }

    function renderEcrResult(root, data) {
      if (data.kind !== "ecr" || !data.type_name || !data.axis_interpretation || !data.description || !data.footnote || !data.source
          || !Number.isFinite(Number(data.avoidance)) || !Number.isFinite(Number(data.anxiety))) return false;
      const hero = makeResultElement("div", "result-hero");
      hero.append(
        makeResultElement("p", "result-primary dnd-name", data.type_name),
        makeResultElement("p", "result-secondary", "ATTACHMENT STYLE")
      );
      root.appendChild(hero);
      appendMetricBars(root, [
        {label: "回避 A", value: data.avoidance, min: 1, max: 7, display: Number(data.avoidance).toFixed(2)},
        {label: "焦虑 B", value: data.anxiety, min: 1, max: 7, display: Number(data.anxiety).toFixed(2)}
      ], "二维均分（1—7）");
      appendResultTextSection(root, "轴解读", data.axis_interpretation);
      appendResultTextSection(root, "类型描述", data.description);
      root.append(
        makeResultElement("p", "result-footnote", data.footnote),
        makeResultElement("p", "result-footnote", `来源：${data.source}`)
      );
      return true;
    }

    function renderHumanityResult(root, data) {
      if (data.kind !== "humanity" || !data.band_name || !data.description || !data.footnote
          || !Number.isFinite(Number(data.concentration))) return false;
      const concentration = Math.max(0, Math.min(100, Number(data.concentration)));
      const hero = makeResultElement("div", "result-hero");
      hero.append(
        makeResultElement("p", "result-primary dnd-name", `${concentration}%`),
        makeResultElement("p", "result-secondary", data.band_name)
      );
      root.appendChild(hero);
      const humanityFillClasses = {
        certified_carbon: "humanity-certified-carbon",
        human_flavor: "humanity-human-flavor",
        mixed_signal: "humanity-mixed-signal",
        cyber_infiltration: "humanity-cyber-infiltration",
        check_cooling: "humanity-check-cooling"
      };
      appendMetricBars(root, [{
        label: "人类浓度",
        value: concentration,
        max: 100,
        display: `${concentration}%`,
        fillClass: humanityFillClasses[data.band] || "humanity-mixed-signal"
      }], "", "metric-bars-large");
      appendResultTextSection(root, "浓度报告", data.description);
      if (Array.isArray(data.human_highlights) && data.human_highlights.length) {
        appendResultTextSection(
          root,
          "人味高光",
          data.human_highlights.map((entry) => `${entry.option_text} → ${entry.comment}`).join("\n\n")
        );
      }
      if (Array.isArray(data.cyber_evidence) && data.cyber_evidence.length) {
        appendResultTextSection(
          root,
          "赛博铁证",
          data.cyber_evidence.map((entry) => `${entry.option_text} → ${entry.comment}`).join("\n\n")
        );
      }
      root.appendChild(makeResultElement("p", "result-footnote", data.footnote));
      return true;
    }

    function appendComparePeople(root, people, detailsFor) {
      const grid = makeResultElement("div", "compare-people");
      people.forEach((person, index) => {
        const card = makeResultElement("section", "compare-person");
        const details = detailsFor(person);
        card.append(
          makeResultElement("h3", "", `${index ? "B" : "A"} · ${person.display_name || person.player_id}`),
          makeResultElement("p", "compare-score-line", details.score),
          makeResultElement("p", "compare-emphasis-line", details.emphasis)
        );
        if (Array.isArray(details.bars) && details.bars.length) {
          const barsRoot = makeResultElement("div", "");
          appendMetricBars(barsRoot, details.bars, "", "metric-bars-compact");
          card.appendChild(barsRoot.firstElementChild.lastElementChild);
        }
        grid.appendChild(card);
      });
      root.appendChild(grid);
    }

    function renderLoveCompare(root, data) {
      if (data.kind !== "love_compare" || !data.player_a || !data.player_b || !data.relation || !data.message) return false;
      const hero = makeResultElement("div", "result-hero");
      hero.append(
        makeResultElement("p", "result-primary dnd-name", data.relation),
        makeResultElement("p", "result-secondary", "LOVE LANGUAGE PAIR")
      );
      root.appendChild(hero);
      appendResultTextSection(root, "关系提示", data.message);
      appendComparePeople(root, [data.player_a, data.player_b], (person) => {
        const scores = ["A", "B", "C", "D", "E"].map((code) => `${code}${person.scores[code]}`).join(" / ");
        return {
          score: scores,
          emphasis: `主语言：${person.primary_names.join("、")}`,
          bars: ["A", "B", "C", "D", "E"].map((code) => ({
            label: code,
            value: person.scores[code],
            max: 12,
            display: String(person.scores[code])
          }))
        };
      });
      appendResultTextSection(root, `给 ${data.player_a.display_name || data.player_a.player_id} 的实践建议`, (data.advice_for_a || []).join("\n\n"));
      appendResultTextSection(root, `给 ${data.player_b.display_name || data.player_b.player_id} 的实践建议`, (data.advice_for_b || []).join("\n\n"));
      return true;
    }

    function renderEcrCompare(root, data) {
      if (data.kind !== "ecr_compare" || !data.player_a || !data.player_b || !data.combination || !data.message) return false;
      const hero = makeResultElement("div", "result-hero");
      hero.append(
        makeResultElement("p", "result-primary dnd-name", data.combination),
        makeResultElement("p", "result-secondary", "ATTACHMENT PAIR")
      );
      root.appendChild(hero);
      appendComparePeople(root, [data.player_a, data.player_b], (person) => ({
        score: `回避 ${Number(person.avoidance).toFixed(2)} / 焦虑 ${Number(person.anxiety).toFixed(2)}`,
        emphasis: `类型：${person.type_name}`,
        bars: [
          {label: "回避", value: person.avoidance, min: 1, max: 7, display: Number(person.avoidance).toFixed(2)},
          {label: "焦虑", value: person.anxiety, min: 1, max: 7, display: Number(person.anxiety).toFixed(2)}
        ]
      }));
      appendResultTextSection(root, "组合提示", data.message);
      root.appendChild(makeResultElement("p", "result-footnote", `来源：${data.source}`));
      return true;
    }

    function renderResult(data, fallbackText) {
      const root = $("resultStructured");
      const fallback = $("resultText");
      root.innerHTML = "";
      let rendered = false;
      try {
        if (data?.kind === "mbti") rendered = renderMbtiResult(root, data);
        else if (data?.kind === "dnd") rendered = renderDndResult(root, data);
        else if (data?.kind === "love") rendered = renderLoveResult(root, data);
        else if (data?.kind === "ecr") rendered = renderEcrResult(root, data);
        else if (data?.kind === "humanity") rendered = renderHumanityResult(root, data);
        else if (data?.kind === "love_compare") rendered = renderLoveCompare(root, data);
        else if (data?.kind === "ecr_compare") rendered = renderEcrCompare(root, data);
      } catch (_) {
        rendered = false;
      }
      root.hidden = !rendered;
      fallback.hidden = rendered;
      if (!rendered) {
        root.innerHTML = "";
        fallback.textContent = fallbackText;
      }
    }

    async function submitAnswers() {
      if (busy || !activeState || !answers.every(Number.isInteger)) return;
      busy = true;
      showError();
      setButtonsDisabled(true);
      $("statusText").textContent = "SYSTEM / CALCULATING";
      try {
        renderState(await api("answer_batch", {answers: [...answers]}));
      } catch (error) {
        showError(error.message);
        $("statusText").textContent = "SYSTEM / RETRY";
      } finally {
        busy = false;
        setButtonsDisabled(false);
      }
    }

    async function compareResults() {
      if (busy) return;
      const playerId = $("comparePlayerId").value.trim();
      if (!playerId) {
        showError("请输入对方用户名或账号 id；游客请输入 guest: 开头的 id");
        return;
      }
      busy = true;
      showError();
      setButtonsDisabled(true);
      $("statusText").textContent = "SYSTEM / COMPARING";
      try {
        renderState(await api("compare", {player_id_b: playerId}));
      } catch (error) {
        showError(error.message);
        $("statusText").textContent = "SYSTEM / RETRY";
      } finally {
        busy = false;
        setButtonsDisabled(false);
      }
    }

    async function resume() {
      showError();
      try {
        renderState(await api("result"));
      } catch (error) {
        if (error.status === 404) {
          $("identity").textContent = token() ? "ACCOUNT" : "GUEST / LOCAL SAVE";
          if (CONFIG.game === "mbti") renderModes();
          else await start("standard");
        } else {
          showError(error.message);
          renderModes();
        }
      }
    }
    $("previousButton").addEventListener("click", () => goToQuestion(cursor - 1));
    $("reviewButton").addEventListener("click", renderReview);
    $("modifyButton").addEventListener("click", () => goToQuestion(cursor));
    $("submitButton").addEventListener("click", submitAnswers);
    $("compareButton").addEventListener("click", compareResults);
    $("restartButton").addEventListener("click", () => {
      showError();
      if (activeState) localStorage.removeItem(draftKey());
      if (CONFIG.game === "mbti") renderModes();
      else start("standard", true);
    });
    resume();
  </script>
</body>
</html>
