<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <title>CEDAR TOY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FDF6F7;
      --purple: #BEB1D1;
      --purple-dark: #9B8DB5;
      --purple-darker: #8678A0;
      --purple-light: #E6DFF0;
      --pink: #E6A8B1;
      --pink-dark: #C28B93;
      --text: #5C5463;
      --muted: #9ca3af;
      --screen-bg: #2D2D2D;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --browser-bottom: 0px;
      --mobile-nav-height: 58px;
      --mobile-nav-total: calc(var(--mobile-nav-height) + var(--safe-bottom) + var(--browser-bottom));
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      font-family: "Silkscreen", cursive;
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(190, 177, 209, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(190, 177, 209, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;
      image-rendering: pixelated;
    }

    button, input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .topbar {
      background: var(--purple);
      border-bottom: 4px solid var(--purple-dark);
      color: #fff;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 10px 24px;
      min-height: 58px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-size: 24px;
      letter-spacing: 1px;
      color: #fff;
      text-decoration: none;
      min-width: 0;
    }

    .pixel-logo {
      width: 24px;
      height: 18px;
      border: 4px solid #fff;
      box-shadow: 8px 8px 0 -4px #fff;
      flex: none;
    }

    .top-actions, .status-strip, .auth-area, .user-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .stat {
      color: #fff;
      background: transparent;
      padding: 0;
      border: 0;
      white-space: nowrap;
      font-size: 12px;
    }

    .stat b { color: #fff; }
    .dot { color: #86efac; }

    .pixel-btn {
      border: 0;
      color: #fff;
      background: var(--pink);
      border-right: 4px solid var(--pink-dark);
      border-bottom: 4px solid var(--pink-dark);
      padding: 10px 16px;
      min-height: 42px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .pixel-btn:active {
      transform: translate(3px, 3px);
      border-right-width: 2px;
      border-bottom-width: 2px;
    }

    .pixel-btn.secondary {
      color: var(--purple-dark);
      background: #fff;
      border: 3px solid var(--purple);
      box-shadow: 4px 4px 0 rgba(190, 177, 209, 0.4);
      min-height: 38px;
      padding: 8px 12px;
    }

    .user-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      max-width: 190px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .main {
      display: grid;
      grid-template-columns: minmax(300px, 32%) 1fr;
      gap: 28px;
      min-height: 0;
      padding: 20px 28px;
      overflow: hidden;
    }

    .sidebar {
      min-height: 0;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 16px;
    }

    .search {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      background: white;
      border: 4px solid var(--purple);
      box-shadow: 4px 4px 0 rgba(190, 177, 209, 0.4);
      padding: 14px 16px;
    }

    .search input {
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
      font-size: 18px;
      font-weight: 700;
    }

    .search input::placeholder { color: var(--muted); }
    .search-mark { color: var(--purple-dark); font-size: 24px; }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tab-button {
      border: 4px solid var(--purple);
      color: var(--pink-dark);
      background: white;
      padding: 14px 8px;
      text-transform: uppercase;
      min-height: 58px;
      font-size: 19px;
    }

    .tab-button.active {
      color: #fff;
      background: var(--purple-darker);
      border-color: var(--purple-darker);
    }

    .games {
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-right: 4px;
      scrollbar-width: thin;
      scrollbar-color: var(--purple) var(--purple-light);
    }

    .games::-webkit-scrollbar {
      width: 6px;
    }

    .games::-webkit-scrollbar-track {
      background: rgba(230, 223, 240, 0.55);
    }

    .games::-webkit-scrollbar-thumb {
      background: var(--purple);
      border: 1px solid rgba(255, 255, 255, 0.45);
    }

    .games::-webkit-scrollbar-thumb:hover {
      background: var(--purple-dark);
    }

    .game-card {
      width: 100%;
      text-align: left;
      background: white;
      color: var(--text);
      border: 4px solid var(--purple);
      box-shadow: 4px 4px 0px rgba(190, 177, 209, 0.4);
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 62px 1fr auto;
      gap: 14px;
      align-items: start;
      min-height: 128px;
      position: relative;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .game-card::after {
      content: "";
      position: absolute;
      inset: 2px;
      border: 2px solid var(--purple-light);
      pointer-events: none;
    }

    .game-card:hover:not(.locked) {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px rgba(190, 177, 209, 0.4);
    }

    .game-card.selected {
      border-color: var(--pink);
      box-shadow: 4px 4px 0px rgba(230, 168, 177, 0.5);
    }

    .game-card.selected::after { border-color: rgba(230, 168, 177, 0.25); }
    .game-card.locked {
      background: #f9fafb;
      border-style: dashed;
      cursor: not-allowed;
      opacity: 0.65;
    }

    .game-card.coming-soon .card-enter {
      color: var(--purple-darker);
      opacity: 0.85;
    }

    .game-card.hidden { display: none; }

    .locked-inner {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 86px;
      color: #9ca3af;
      text-align: center;
    }

    .game-card .glyph, .art-glyph {
      width: 58px;
      height: 58px;
      border: 2px solid var(--purple-light);
      background: #f9fafb;
      display: grid;
      place-items: center;
      color: var(--purple-dark);
      font-size: 28px;
    }

    .game-title {
      margin: 0 0 6px;
      color: var(--purple);
      font-size: 19px;
      line-height: 1.2;
      letter-spacing: 1px;
    }

    .game-card.selected .game-title, .game-card:hover .game-title { color: var(--pink); }
    .game-sub { margin: 0 0 12px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .level { color: var(--purple); font-size: 10px; white-space: nowrap; }
    .card-enter {
      grid-column: 3;
      justify-self: end;
      align-self: end;
      color: var(--pink);
      font-size: 9px;
      opacity: 0.72;
    }
    .game-card:hover .card-enter,
    .game-card.selected .card-enter {
      opacity: 1;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      color: var(--purple-dark);
      background: var(--purple-light);
      border: 1px solid var(--purple);
      padding: 4px 7px;
      font-size: 10px;
    }
    .tag.pink {
      color: var(--pink-dark);
      background: rgba(230, 168, 177, 0.12);
      border-color: var(--pink);
    }

    .preview {
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .panel-tabs {
      display: flex;
      align-items: end;
      gap: 4px;
      padding: 0 16px;
    }

    .panel-tab {
      border: 4px solid var(--purple);
      border-bottom: 0;
      background: var(--purple-light);
      color: var(--purple-darker);
      padding: 8px 18px;
      min-width: 110px;
      text-align: center;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }

    .panel-tab.active {
      color: var(--purple);
      background: #fff;
    }

    .panel-tab[hidden] {
      display: none;
    }

    .machine {
      grid-row: 2;
      grid-column: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr auto;
      background: var(--purple);
      border: 6px solid var(--purple-dark);
      box-shadow: 8px 8px 0px var(--purple-darker), inset 4px 4px 0px #D7CCE6;
      padding: 16px;
      gap: 14px;
    }

    .guide-panel {
      grid-row: 2;
      grid-column: 1;
      display: none;
      min-height: 0;
      background: var(--purple);
      border: 6px solid var(--purple-dark);
      box-shadow: 8px 8px 0px var(--purple-darker), inset 4px 4px 0px #D7CCE6;
      padding: 16px;
      gap: 14px;
      overflow: auto;
    }

    .preview[data-detail-tab="guide"] .machine {
      display: none;
    }

    .preview[data-detail-tab="guide"] .guide-panel {
      display: grid;
    }

    .screen {
      position: relative;
      overflow: hidden;
      min-height: 0;
      background: var(--screen-bg);
      border: 4px solid #1A1A1A;
      box-shadow: 0 0 24px rgba(190, 177, 209, 0.25);
      color: rgba(255,255,255,0.72);
      padding: 20px 28px;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.22) 50%),
        linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,118,0.06));
      background-size: 100% 4px, 3px 100%;
      z-index: 10;
      pointer-events: none;
    }

    .screen-inner {
      position: relative;
      z-index: 11;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .screen-head {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: start;
      margin-bottom: 24px;
    }

    .mission {
      margin: 0;
      color: var(--pink);
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: -0.04em;
    }

    .location, .cases-label, .desc, .rank-list {
      color: rgba(255,255,255,0.62);
      line-height: 1.8;
    }

    .cases {
      text-align: right;
      color: #fff;
      flex: none;
    }

    .cases-label { font-size: 10px; }
    .cases-num { font-size: 22px; line-height: 1; }

    .screen-body {
      flex: 1;
      min-height: 0;
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .art {
      width: 140px;
      height: 140px;
      background: #404040;
      border: 4px solid var(--pink);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .art-badge {
      position: absolute;
      top: -14px;
      left: -4px;
      background: var(--pink);
      color: #fff;
      padding: 2px 8px;
      font-size: 9px;
    }

    .art-glyph {
      border: 0;
      background: transparent;
      color: white;
      opacity: 0.25;
      font-size: 52px;
    }

    .art-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      background: var(--pink);
    }

    .info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .info h3 {
      color: var(--pink);
      border-bottom: 1px solid var(--pink);
      display: inline-block;
      margin: 0;
      width: fit-content;
      font-size: 18px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .desc { margin: 0; max-width: 760px; font-size: 15px; color: rgba(255,255,255,0.8); }
    .rank-panel {
      display: grid;
      gap: 8px;
      min-height: 0;
    }
    .rank-panel[hidden] { display: none; }
    .rank-title { color: var(--pink); margin: 0; font-size: 17px; text-transform: uppercase; }
    .info.arcade-mode .stat-bars {
      display: none;
    }
    .info.arcade-mode {
      gap: 10px;
    }
    .info.arcade-mode .arcade-bank {
      margin-top: 0;
    }
    .rank-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 14px;
    }

    .rank-list li {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding-bottom: 4px;
    }

    .rank-list li.empty-rank {
      grid-template-columns: 1fr;
      color: rgba(255,255,255,0.55);
    }

    .bar {
      height: 3px;
      border: 0;
      background: #222;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      background: var(--purple);
    }

    .stat-bars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-item {
      padding: 8px 10px;
      background: #3a3a3a;
      border-left: 4px solid var(--purple);
    }

    .stat-item.pink { border-color: var(--pink); }
    .stat-label { font-size: 9px; color: var(--purple); margin-bottom: 4px; }
    .stat-item.pink .stat-label { color: var(--pink); }
    .stat-track { height: 3px; background: #222; }
    .stat-fill { height: 100%; background: var(--purple); transition: width 0.4s ease; }
    .stat-item.pink .stat-fill { background: var(--pink); }

    .arcade-bank {
      display: none;
      position: relative;
      z-index: 30;
      margin-top: 0;
      padding: 10px 12px;
      background: #3a3a3a;
      border-left: 4px solid var(--pink);
      color: rgba(255,255,255,0.78);
      font-size: 11px;
      line-height: 1.45;
    }

    .arcade-bank.show { display: grid; gap: 6px; }
    .bank-title { color: var(--pink); font-size: 12px; white-space: nowrap; }
    .bank-row {
      display: grid;
      grid-template-columns: minmax(112px, 1.4fr) minmax(66px, 0.65fr) auto;
      gap: 8px;
      align-items: center;
    }
    .bank-select {
      position: relative;
      z-index: 31;
      min-width: 0;
    }
    .bank-select-btn {
      width: 100%;
      min-height: 30px;
      border: 2px solid var(--purple);
      background: #222;
      color: #fff;
      padding: 5px 22px 5px 7px;
      text-align: left;
      font: inherit;
      line-height: 1.2;
      display: flex;
      align-items: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      position: relative;
      z-index: 32;
    }
    .bank-select-btn::after {
      content: "▾";
      position: absolute;
      right: 7px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--pink);
    }
    .bank-picker-scrim {
      position: fixed;
      inset: 0;
      z-index: 95;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(92, 84, 99, 0.42);
    }
    .bank-picker-scrim.show { display: grid; }
    .bank-picker {
      width: min(320px, calc(100vw - 36px));
      background: var(--bg);
      border: 4px solid var(--purple);
      box-shadow: 6px 6px 0 var(--purple-dark);
      padding: 14px;
    }
    .bank-picker-title {
      color: var(--pink);
      font-size: 13px;
      margin-bottom: 10px;
    }
    .bank-picker-options {
      display: grid;
      gap: 8px;
    }
    .bank-picker-option {
      min-height: 38px;
      border: 3px solid var(--purple);
      background: #fff;
      color: var(--text);
      font: inherit;
      text-align: left;
      padding: 8px 10px;
    }
    .bank-picker-option.active {
      color: #fff;
      background: var(--pink);
      border-color: var(--pink);
    }
    .garden-picker-option-main,
    .garden-picker-option-meta { display: block; }
    .garden-picker-option-main { line-height: 1.45; }
    .garden-picker-option-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.5;
    }
    .garden-picker-empty { margin: 4px 0 8px; color: var(--pink); line-height: 1.7; }
    .garden-picker-hint { margin: 0; color: var(--muted); font-size: 11px; line-height: 1.7; }
    .bank-row select,
    .bank-row input {
      min-width: 0;
      width: 100%;
      border: 2px solid var(--purple);
      background: #222;
      color: #fff;
      padding: 5px 7px;
      outline: 0;
      font: inherit;
      min-height: 30px;
    }
    .bank-row .pixel-btn {
      position: relative;
      z-index: 32;
      min-height: 32px;
      padding: 2px 8px;
      font-size: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .bank-msg { color: rgba(255,255,255,0.62); min-height: 14px; line-height: 1.35; }

    .screen-footer {
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .screen-icons {
      display: flex;
      gap: 14px;
      color: rgba(255,255,255,0.35);
      font-size: 17px;
    }

    .screen-icons .lit { color: var(--pink); opacity: 1; }
    .press-hint { font-size: 9px; color: white; animation: blink 1.4s infinite; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .console {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--purple-dark);
      border-top: 4px solid var(--purple-darker);
      padding: 0 20px;
      min-height: 64px;
    }

    .round {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: var(--pink);
      border: 4px solid var(--pink-dark);
    }

    .round.alt {
      background: var(--purple-light);
      border-color: var(--purple);
    }

    .slot {
      width: 44px;
      height: 14px;
      background: var(--purple-darker);
    }

    .enter {
      margin-left: auto;
      font-size: 11px;
      padding: 10px 24px;
      min-width: 112px;
      text-transform: uppercase;
    }

    .console-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .console-actions .enter {
      margin-left: 0;
    }

    .watch-btn {
      background: var(--purple);
      border-right-color: var(--purple-darker);
      border-bottom-color: var(--purple-darker);
      font-size: 11px;
      padding: 10px 24px;
      text-transform: uppercase;
    }

    .drawer-actions {
      display: flex;
      gap: 12px;
    }

    .drawer-actions .pixel-btn {
      flex: 1;
    }

    .bottom-nav {
      height: 82px;
      border-top: 4px solid var(--purple);
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 42px;
      padding: 10px 18px;
    }

    .nav-item {
      border: 0;
      background: transparent;
      color: var(--purple);
      display: grid;
      place-items: center;
      gap: 5px;
      min-width: 76px;
      text-decoration: none;
    }

    .nav-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border: 4px solid currentColor;
      background: #fff;
      font-size: 22px;
    }

    .nav-item.active {
      color: var(--pink);
    }

    .nav-item.active .nav-icon {
      color: #fff;
      background: var(--pink);
      border-color: var(--pink);
    }

    .nav-label { font-size: 11px; }
    .unbind-btn {
      border: 0;
      background: transparent;
      color: var(--pink-dark);
      font-size: 11px;
      font-weight: 400;
      opacity: 0.6;
      padding: 4px 8px;
      text-decoration: underline;
      cursor: pointer;
    }
    .unbind-btn:hover {
      color: var(--pink-dark);
      opacity: 1;
    }

    .modal, .drawer-scrim {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: rgba(92, 84, 99, 0.55);
    }

    .modal.show, .drawer-scrim.show { display: grid; }
    .modal { place-items: center; padding: 18px; }

    .modal-box {

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function sanitizeGuideHtml(html) {
      const allowedTags = new Set(["a", "blockquote", "br", "code", "em", "h1", "h2", "h3", "h4", "hr", "li", "ol", "p", "pre", "strong", "table", "tbody", "td", "th", "thead", "tr", "ul"]);
      const allowedAttrs = new Map([["a", new Set(["href", "title"])], ["th", new Set(["align"])], ["td", new Set(["align"])]]);
      const doc = new DOMParser().parseFromString(`<div>${html}</div>`, "text/html");
      const root = doc.body.firstElementChild;
      const clean = (node) => {
        Array.from(node.children).forEach((child) => {
          const tag = child.tagName.toLowerCase();
          if (!allowedTags.has(tag)) {
            child.replaceWith(doc.createTextNode(child.textContent || ""));
            return;
          }
          Array.from(child.attributes).forEach((attr) => {
            const name = attr.name.toLowerCase();
            const allowed = allowedAttrs.get(tag);
            if (!allowed || !allowed.has(name)) {
              child.removeAttribute(attr.name);
              return;
            }
            if (tag === "a" && name === "href") {
              const href = attr.value.trim();
              if (!/^(https?:|mailto:|#)/i.test(href)) child.removeAttribute(attr.name);
            }
          });
          if (tag === "a" && child.hasAttribute("href")) {
            child.setAttribute("target", "_blank");
            child.setAttribute("rel", "noopener noreferrer");
          }
          clean(child);
        });
      };
      clean(root);
      return root.innerHTML;
    }

    function renderGuideMarkdown(value) {
      const source = String(value ?? "");
      if (!window.marked || typeof window.marked.parse !== "function") {
        return `<pre>${escapeHtml(source)}</pre>`;
      }
      return sanitizeGuideHtml(window.marked.parse(source, {gfm: true, breaks: true}));
    }

      const boxes = memoriaGuideBoxes();
      if (!boxes.length) return;
      let html = "";
      if (game && game.id === "memoria") {
        if (memoriaGuideState.loading) {
          html = `<div class="memoria-guide-title">攻略（给人类玩家看的）</div><div class="memoria-guide-warning">以下内容包含完整剧透，仅供人类玩家查阅。</div><div>读取中...</div>`;
        } else if (memoriaGuideState.error) {
          html = `<div class="memoria-guide-title">攻略（给人类玩家看的）</div><div class="memoria-guide-warning">以下内容包含完整剧透，仅供人类玩家查阅。</div><div>${escapeHtml(memoriaGuideState.error)}</div>`;
        } else if (!memoriaGuideState.loaded) {
          html = `<div class="memoria-guide-title">攻略（给人类玩家看的）</div><div class="memoria-guide-warning">以下内容包含完整剧透，仅供人类玩家查阅。切到攻略页后会自动加载。</div>`;

      if (!game || game.id !== "memoria") {
        boxes.forEach((box) => {
          box.classList.remove("show");
          box.innerHTML = "";
        });
        return;
      }
      if (!memoriaGuideState.loaded) {
        boxes.forEach((box) => {
          box.classList.add("show");
          box.innerHTML = html;
        });
        return;
      }
      const docs = memoriaGuideState.items.map((item) => `
        <details class="memoria-guide-doc">
          <summary>${escapeHtml(item.kind)} · ${escapeHtml(item.title)}</summary>
          <div class="memoria-guide-markdown">${renderGuideMarkdown(item.content || "")}</div>

        <div class="memoria-guide-list">${docs || "暂无攻略文档。"}</div>
      `;
      boxes.forEach((box) => {
        box.classList.add("show");

    function saveValue(value) {
      if (value == null) return "";
      if (typeof value === "boolean") return value ? "是" : "否";

        if (value.mode || value.current_question != null) {
          return [value.mode, value.current_question != null ? `Q${value.current_question}` : ""].filter(Boolean).join(" ");
        }
        return JSON.stringify(value);

    function statPill(key, value) {

    function compactStats(gameName, save) {
      const fieldMap = {

        eco: ["day", "pond_score", "alive_species"],
        arcade: ["winnings", "chips"],

        love: ["latest_result", "completed_at"],
        ecr: ["latest_result", "completed_at"],
        humanity: ["latest_result", "completed_at"],
        bdsmtest: ["latest_result", "completed_at"],
        imitator_td: ["level", "turn", "result"],
      };
      const fields = fieldMap[gameName] || Object.keys(save || {}).filter((key) => key !== "slot").slice(0, 4);

    function renderHistoryGameCard(gameName, data) {
      const title = saveGameNames[gameName] || gameName;
      const desc = saveGameDescriptions[gameName] || "存档概况。";
      const slots = Array.isArray(data?.slots) ? data.slots : [data];
      const rows = slots.map((slot) => {
        const slotPill = Array.isArray(data?.slots) ? statPill("slot", slot?.slot ?? 1) : "";
        const stats = compactStats(gameName, slot) || statPill("status", "有存档");
        return `
          <div class="history-card-row">
            <div class="history-stats">${slotPill}${stats}</div>
            ${achievementsHtml(slot)}
          </div>
        `;
      }).join("");
      return `
        <article class="history-card">
          <div class="history-card-head">
            <div class="history-card-title">${escapeHtml(title)}</div>
          </div>
          <div class="history-card-desc">${escapeHtml(desc)}</div>
          ${rows}
        </article>
      `;
    }

    function historySubjects(data) {
      return [
        {id: "self", label: "我", username: data?.self?.username || data?.user?.username || "", saves: data?.self?.saves || {}},

          id: `machine-${index}`,
          label: machine.username || machine.user?.username || `小机${index + 1}`,
          username: machine.username || machine.user?.username || "",
          saves: machine.saves || {},
        })) : []),
      ];
    }

    function renderHistory() {
      const data = historyState.data || {};
      const subjects = historySubjects(data);
      if (!subjects.some((subject) => subject.id === historyState.activeId)) historyState.activeId = "self";
      const active = subjects.find((subject) => subject.id === historyState.activeId) || subjects[0];
      const entries = Object.entries(active?.saves || {});
      const tabs = subjects.map((subject) => `
        <button class="history-tab ${subject.id === active.id ? "active" : ""}" data-history-tab="${escapeHtml(subject.id)}" type="button">
          ${escapeHtml(subject.label)}
        </button>
      `).join("");
      const cards = entries.length
        ? `<div class="history-card-list">${entries.map(([gameName, item]) => renderHistoryGameCard(gameName, item)).join("")}</div>`
        : `<p class="history-empty">${active.id === "self" ? "你还没有存档记录。开始游玩后会在这里出现。" : "这只小机还没有存档记录。"}</p>`;
      return `
        <div class="history-tabs">${tabs}</div>
        <div class="history-summary">${escapeHtml(active.username || active.label)} · 共 ${entries.length} 个存档</div>

      if (game.id !== "soup") {
        game.ranks = [];
        if (selected === game.id) renderRanks(game);
        return;

      try {
        const soupToken = localStorage.getItem(SOUP_TOKEN_KEY) || "";
        const res = await fetch("/soup/api/leaderboard/games", {
          headers: soupToken ? {Authorization: `Bearer ${soupToken}`} : {}
        });
        if (!res.ok) throw new Error("leaderboard unavailable");
        const rows = await res.json();
        game.ranks = Array.isArray(rows)
          ? rows.filter((row) => Number(row.score) > 0).slice(0, 3)
          : [];
      } catch (err) {
        game.ranks = [];
      }
      if (selected === game.id) renderRanks(game);
    }

    function renderDistribution(game, rows) {
      const safeRows = Array.isArray(rows) ? rows : [];
      const sortedRows = safeRows.slice().sort(
        (left, right) => (Number(right.count) || 0) - (Number(left.count) || 0)
      );
      const max = Math.max(1, ...sortedRows.map((row) => Number(row.count) || 0));
      const body = sortedRows.length
        ? sortedRows.map((row) => {
            const count = Number(row.count) || 0;
            const width = Math.max(4, (count / max) * 100);
            return `
              <div class="platform-dist-row">
                <span class="platform-dist-label">${escapeHtml(platformResultLabel(game, row.result))}</span>
                <span class="platform-dist-track" aria-hidden="true"><span style="width:${width}%"></span></span>
                <b>${count}</b>
              </div>
            `;
          }).join("")
        : `<p class="history-empty">暂无数据</p>`;
      return `
        <section class="platform-dist-block platform-dist-${game}">
          <div class="platform-dist-title">${escapeHtml(platformTestLabels[game] || game)}</div>
          ${body}
        </section>
      `;
    }

      if (currentGame().id !== "arcade" || !token()) {
        renderArcadeBanks();
        return;

      const aiUserId = ensureArcadeTarget();
      if (!aiUserId) {
        renderArcadeBanks();
        return;
      }
      arcadeBankState.loading = true;
      renderArcadeBanks();
      try {
        const res = await fetch(`/api/arcade/chips?ai_user_id=${encodeURIComponent(aiUserId)}`, {
          headers: headers(false),
          cache: "no-store"
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "读取失败");
        arcadeBankState.status = data;
        arcadeBankState.message = "";
      } catch (err) {
        arcadeBankState.status = null;
        arcadeBankState.message = err.message;
      } finally {
        arcadeBankState.loading = false;
        renderArcadeBanks();
      }
    }

    async function grantArcadeChips() {
      const aiUserId = ensureArcadeTarget();
      const amount = Number(arcadeBankState.amount);
      if (!aiUserId) {
        arcadeBankState.message = "请先绑定小机。";
        renderArcadeBanks();
        return;
      }
      if (!Number.isInteger(amount) || amount < 1) {
        arcadeBankState.message = "金额须为正整数。";
        renderArcadeBanks();
        return;
      }
      arcadeBankState.saving = true;
      arcadeBankState.message = "发放中...";
      renderArcadeBanks();
      try {
        const res = await fetch("/api/arcade/chips", {
          method: "POST",
          headers: headers(true),
          body: JSON.stringify({ai_user_id: Number(aiUserId), amount})
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "发放失败");
        arcadeBankState.status = data;
        arcadeBankState.message = `已发放 ${amount} 筹码。`;
        showToast(`已发放 ${amount} 筹码`);
        await loadGameStats();
      } catch (err) {
        arcadeBankState.message = err.message;
      } finally {
        arcadeBankState.saving = false;
        renderArcadeBanks();
      }
    }

    function bindMachinePanel() {
      document.querySelectorAll(".machine-card").forEach((card) => {
        const checkbox = card.querySelector(".machine-enabled");
        if (checkbox) {
          checkbox.addEventListener("change", () => {
            card.classList.toggle("enabled", checkbox.checked);
            const msg = card.querySelector(".machine-msg");
            if (checkbox.checked && msg) msg.textContent = "";
            if (!checkbox.checked) {
              checkbox.disabled = true;
              saveMachineSettings(card).then((saved) => {
                checkbox.disabled = false;
                if (!saved) {
                  checkbox.checked = true;
                  card.classList.add("enabled");
                }
              });
            }
          });
        }
        const save = card.querySelector(".machine-save");
        if (save) {
          save.addEventListener("click", () => saveMachineSettings(card));
        }
        const reset = card.querySelector(".machine-reset");
        if (reset) {
          reset.addEventListener("click", () => resetMachineSettings(card));
        }
      });
    }

    async function saveMachineSettings(card) {
      const aiUserId = Number(card.dataset.machineId);
      const msg = card.querySelector(".machine-msg");
      const payload = {
        ai_user_id: aiUserId,
        enabled: Boolean(card.querySelector(".machine-enabled")?.checked),
        remind_threshold: Number(card.querySelector(".machine-remind")?.value || 30),
        force_threshold: Number(card.querySelector(".machine-force")?.value || 50),
        lock_minutes: Number(card.querySelector(".machine-lock-minutes")?.value || 30),
        allow_self_reset: Boolean(card.querySelector(".machine-self-reset")?.checked),
      };
      if (msg) msg.textContent = "保存中...";
      try {
        const res = await fetch("/api/anti-addiction/settings", {
          method: "POST",
          headers: headers(true),
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "保存失败");
        const idx = machineState.machines.findIndex((item) => Number(item.id) === aiUserId);
        if (idx >= 0) machineState.machines[idx].anti_addiction = data.anti_addiction;
        if (msg) msg.textContent = "已保存";
        return true;
      } catch (err) {
        if (msg) msg.textContent = err.message || "保存失败";
        return false;
      }
    }

    async function resetMachineSettings(card) {
      const aiUserId = Number(card.dataset.machineId);
      const msg = card.querySelector(".machine-msg");
      if (msg) msg.textContent = "重置中...";
      try {
        const res = await fetch("/api/anti-addiction/reset", {
          method: "POST",
          headers: headers(true),
          body: JSON.stringify({ai_user_id: aiUserId}),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "重置失败");
        if (msg) msg.textContent = "已重置";
      } catch (err) {
        if (msg) msg.textContent = err.message || "重置失败";
      }
    }

      const machineCardsVisible = !me.user.is_ai && machineState.loaded && !machineState.error && machineState.machines.length > 0;
      const bindingUsers = (me.bindings || []).map((user) => ({id: user.id, username: user.username}));
      const bindings = bindingUsers.map((user) => `<li><span>AI</span><span>${escapeHtml(user.username)}</span><span><button class="unbind-btn" data-ai-id="${user.id}" type="button">解绑</button></span></li>`).join("") || "<li><span>--</span><span>暂无绑定</span><span>--</span></li>";
      content.innerHTML = `
        <p class="desc mine-user-name">用户：${escapeHtml(me.user.username)}</p>
        ${machineCardsVisible ? "" : `<ol class="rank-list">${bindings}</ol>`}
        ${renderMachinePanel()}
        ${me.user.is_admin ? '<a class="pixel-btn secondary" href="/admin" style="margin-bottom:10px">管理后台</a>' : ''}
        <button class="pixel-btn" id="mineBind" type="button">绑定</button>
        <button class="pixel-btn secondary" id="mineLogout" type="button" style="margin-top:10px">登出</button>
      `;
      bindMachinePanel();
      $("mineBind").addEventListener("click", () => {
        closeDrawers();
        openModal("bindModal");
      });
      $("mineLogout").addEventListener("click", logout);
      document.querySelectorAll(".unbind-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (!confirm("确定解绑该 AI 账号？")) return;
          await unbindAccount(btn.dataset.aiId);
        });
      });
    }

    async function loadMe() {
      loadMeAbort?.abort();
      const controller = new AbortController();
      loadMeAbort = controller;
      if (!token()) {
        me = null;
        renderAuth();
        return;
      }
      try {
        const res = await fetch("/api/auth/me", {
          headers: headers(false),
          signal: controller.signal,
        });
        if (!res.ok) throw new Error("auth failed");
        if (controller.signal.aborted) return;
        me = await res.json();
        machineState = {loaded: false, loading: false, machines: [], error: ""};
        if (me && me.user && me.user.id) {
          localStorage.setItem("cedartoy_user_id", me.user.id);
        }
      } catch (err) {
        if (err.name === "AbortError") return;
        localStorage.removeItem(TOKEN_KEY);
        localStorage.removeItem("cedartoy_user_id");
        me = null;
      }
      if (controller.signal.aborted) return;
      renderAuth();
      renderGames();
      renderDetail();
      if (currentGame().id === "arcade") loadArcadeBankStatus();
    }

    const USERNAME_RE = /^[a-zA-Z0-9_\u4e00-\u9fff]{2,20}$/;

    function validateLoginInput(username, password) {
      if (!username || !password) return "用户名和密码必填";
      if (username.length < 2 || username.length > 20) return "用户名长度须为 2-20 个字符";
      if (!USERNAME_RE.test(username)) return "用户名只能包含字母、数字、下划线和中文";
      if (password.length < 6) return "密码至少 6 位";
      return "";
    }

    async function login() {
      loadMeAbort?.abort();
      $("loginMsg").textContent = "";
      const username = $("loginUser").value.trim();
      const password = $("loginPass").value;
      const validationError = validateLoginInput(username, password);
      if (validationError) {
        $("loginMsg").textContent = validationError;
        return;
      }
      try {
        const res = await fetch("/api/auth/login_or_register", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({username, password})
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "登录失败");
        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem("cedartoy_user_id", data.user.id);
        me = {user: data.user, bindings: []};
        machineState = {loaded: false, loading: false, machines: [], error: ""};
        closeModals();
        renderAuth();
        renderGames();
        renderDetail();
        if (currentGame().id === "arcade") loadArcadeBankStatus();
      } catch (err) {
        $("loginMsg").textContent = err.message;
      }
    }

    async function bindAccount() {
      $("bindMsg").textContent = "";
      const binding_token = $("bindToken").value.trim();
      if (!binding_token) {
        $("bindMsg").textContent = "绑定码必填";
        return;
      }
      try {
        const res = await fetch("/api/auth/bind", {
          method: "POST",
          headers: headers(true),
          body: JSON.stringify({binding_token})
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "绑定失败");
        $("bindMsg").textContent = "绑定成功";
        await loadMe();
        machineState = {loaded: false, loading: false, machines: [], error: ""};
        renderMine();
        setTimeout(closeModals, 500);
      } catch (err) {
        $("bindMsg").textContent = err.message;
      }
    }

    async function unbindAccount(aiUserId) {
      try {
        const res = await fetch("/api/auth/bind", {
          method: "DELETE",
          headers: headers(true),
          body: JSON.stringify({ai_user_id: Number(aiUserId)})
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "解绑失败");
        await loadMe();
        machineState = {loaded: false, loading: false, machines: [], error: ""};
        renderMine();
      } catch (err) {
        alert(err.message);
      }
    }

    function logout() {
      loadMeAbort?.abort();
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem("cedartoy_user_id");
      me = null;
      arcadeBankState.status = null;
      arcadeBankState.aiUserId = "";
      arcadeBankState.message = "";
      machineState = {loaded: false, loading: false, machines: [], error: ""};
      renderAuth();
      renderGames();
      renderDetail();
      renderMine();
    }

    async function loadRoomCount() {
      try {
        const soupToken = localStorage.getItem(SOUP_TOKEN_KEY) || "";
        const res = await fetch("/soup/api/rooms/", {
          headers: soupToken ? {Authorization: `Bearer ${soupToken}`} : {}
        });
        if (!res.ok) throw new Error("rooms unavailable");
        const rooms = await res.json();
        const active = Array.isArray(rooms)
          ? rooms.filter((room) => room.status === "waiting" || room.status === "playing").length
          : 0;
        $("roomCount").textContent = String(active).padStart(2, "0");
      } catch (err) {
        $("roomCount").textContent = "--";
      }
    }

    async function loadGameStats() {
      try {
        const res = await fetch("/api/games/stats", {cache: "no-store"});
        if (!res.ok) throw new Error("stats unavailable");
        const stats = await res.json();
        games.forEach((game) => {
          const stat = stats[game.id];
          if (!stat) return;
          if (stat.metric_label) game.metricLabel = stat.metric_label;
          if (stat.metric !== undefined && stat.metric !== null) {
            game.metric = String(stat.metric);
          }
        });
        renderGames();
        renderDetail();
      } catch (err) {
        // Keep the existing pixel placeholders when live stats are unavailable.
      }
    }

    document.querySelectorAll(".tab-button").forEach((button) => {
      button.addEventListener("click", () => {
        filter = button.dataset.filter;
        document.querySelectorAll(".tab-button").forEach((item) => item.classList.toggle("active", item === button));
        renderGames();
      });
    });
    $("searchInput").addEventListener("input", renderGames);
    $("searchInput").addEventListener("focus", () => document.body.classList.add("searching"));
    $("searchInput").addEventListener("blur", () => document.body.classList.remove("searching"));
    document.querySelectorAll("[data-detail-tab]").forEach((button) => {
      button.addEventListener("click", () => setDetailTab(button.dataset.detailTab));
    });
    document.querySelectorAll("[data-drawer-tab]").forEach((button) => {
      button.addEventListener("click", () => setDrawerTab(button.dataset.drawerTab));
    });
    memoriaGuideBoxes().forEach((box) => {
      box.addEventListener("toggle", (event) => {
        const doc = event.target;
        if (!doc || !doc.matches || !doc.matches(".memoria-guide-doc") || !doc.open) return;
        doc.scrollIntoView({behavior: "smooth", block: "start"});
      }, true);
    });
    $("enterButton").addEventListener("click", enterGame);
    $("guideEnterButton").addEventListener("click", enterGame);
    $("drawerEnter").addEventListener("click", enterGame);
    ["watchButton", "guideWatchButton", "drawerWatchButton"].forEach((id) => {
      const btn = $(id);
      if (btn) btn.addEventListener("click", enterWatch);
    });
    $("drawerClose").addEventListener("click", closeDrawers);
    $("mineClose").addEventListener("click", closeDrawers);
    $("gameDrawer").addEventListener("click", (event) => { if (event.target.id === "gameDrawer") closeDrawers(); });
    $("mineDrawer").addEventListener("click", (event) => { if (event.target.id === "mineDrawer") closeDrawers(); });
    $("loginSubmit").addEventListener("click", login);
    $("bindSubmit").addEventListener("click", bindAccount);
    $("adultConfirmButton").addEventListener("click", () => {
      const url = pendingAdultUrl;
      closeModals();
      if (url) window.open(url, "_blank", "noopener,noreferrer");
    });
    document.querySelectorAll("[data-close-modal]").forEach((button) => button.addEventListener("click", closeModals));
    document.querySelectorAll(".modal").forEach((modal) => {
      modal.addEventListener("click", (event) => { if (event.target === modal) closeModals(); });
    });
    document.querySelectorAll("[data-bottom-action]").forEach((item) => {
      item.addEventListener("click", () => {
        document.querySelectorAll("[data-bottom-action]").forEach((nav) => nav.classList.toggle("active", nav === item));
        if (item.dataset.bottomAction === "leaderboard") {
          openPlatformStats();
          return;
        }
        if (item.dataset.bottomAction === "history") {
          openHistory();
          return;
        }
        if (item.dataset.bottomAction === "mine") {
          if (!me) {
            closeDrawers();
            openModal("loginModal");
            return;
          }
          renderMine();
          $("mineDrawer").classList.add("show");
        }
      });
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeBankPicker();
        closeModals();
        closeDrawers();
      }
      if (event.key === "Enter" && $("loginModal").classList.contains("show")) login();
    });
    $("bankPicker").addEventListener("click", (event) => { if (event.target.id === "bankPicker") closeBankPicker(); });

    function syncViewportInsets() {
      const vv = window.visualViewport;
      if (!vv) return;
      const inset = Math.max(0, Math.round(window.innerHeight - vv.height - vv.offsetTop));
      document.documentElement.style.setProperty("--browser-bottom", `${inset}px`);
    }

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", syncViewportInsets);
      window.visualViewport.addEventListener("scroll", syncViewportInsets);
      window.addEventListener("resize", syncViewportInsets);
      syncViewportInsets();
    }

    renderGames();
    renderDetail();
    renderAuth();
    loadMe();
    loadRoomCount();
    loadGameStats();
  </script>
</body>
</html>
