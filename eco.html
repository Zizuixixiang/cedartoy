<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>瓶中生态 · ECO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #FDF6F7;
      --purple: #BEB1D1;
      --purple-dark: #9B8DB5;
      --purple-darker: #8678A0;
      --purple-light: #E6DFF0;
      --pink: #E6A8B1;
      --pink-dark: #C28B93;
      --text: #5C5463;
      --muted: #9ca3af;
      --screen-bg: #2D2D2D;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --mobile-nav-height: 60px;
    }

    html { min-height: 100%; background: var(--bg); image-rendering: pixelated; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(190, 177, 209, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(190, 177, 209, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    button, summary { font: inherit; }
    button { cursor: pointer; touch-action: manipulation; }
    img { image-rendering: pixelated; }
    h1, h2, h3, .pixel-font, .score, .nav-button, .progress-count, .stack-page {
      font-family: "Silkscreen", -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
    }
    .view[hidden], [hidden] { display: none !important; }

    .site-header {
      color: #fff;
      background: var(--purple);
      border-bottom: 4px solid var(--purple-dark);
      padding: 12px max(18px, calc((100vw - 1180px) / 2));
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .brand { display: flex; align-items: center; gap: 13px; }
    .pixel-logo { width: 24px; height: 18px; border: 4px solid #fff; box-shadow: 8px 8px 0 -4px #fff; flex: none; }
    .brand h1 { margin: 0; font-size: 23px; letter-spacing: 1px; }
    .brand small { display: block; margin-top: 2px; font-size: 10px; opacity: 0.85; letter-spacing: 0.08em; }
    .desktop-nav { display: flex; gap: 8px; }
    .nav-button {
      min-width: 80px;
      min-height: 42px;
      color: #fff;
      background: transparent;
      border: 3px solid rgba(255,255,255,0.72);
      padding: 8px 13px;
      font-size: 12px;
      font-weight: 700;
    }
    .nav-button[aria-selected="true"] { color: var(--purple-darker); background: #fff; border-color: #fff; box-shadow: 3px 3px 0 var(--purple-darker); }

    main { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 54px; }
    .loading, .empty, .error-state { min-height: 140px; display: grid; place-items: center; padding: 24px; color: var(--muted); text-align: center; }
    .error-state { color: var(--pink-dark); }
    .loading::after { content: "..."; }

    .pixel-card {
      position: relative;
      background: #fff;
      border: 4px solid var(--purple);
      box-shadow: 5px 5px 0 rgba(190,177,209,0.42);
    }
    .pixel-card::after { content: ""; position: absolute; inset: 2px; border: 2px solid var(--purple-light); pointer-events: none; }
    .pixel-card > * { position: relative; z-index: 1; }
    .section-title { margin: 0 0 12px; color: var(--purple-darker); font-size: 16px; }
    .page-stack { display: grid; gap: 22px; }
    .page-heading { display: flex; align-items: end; justify-content: space-between; gap: 16px; }
    .page-heading h2 { margin: 0; color: var(--purple-darker); font-size: 28px; }
    .progress-count { color: var(--pink-dark); font-size: 15px; }

    .state-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(350px, 0.9fr);
      grid-template-areas:
        "summary summary"
        "disaster disaster"
        "choice choice"
        "observe observe"
        "settlers environment"
        "populations populations";
      gap: 18px;
      align-items: start;
    }
    .status-banner { grid-area: summary; display: grid; grid-template-columns: 150px 1fr; align-items: center; min-height: 116px; padding: 18px 24px; }
    .status-banner .score { color: var(--pink-dark); font-size: 72px; line-height: 1; text-align: center; border-right: 3px solid var(--purple-light); }
    .status-copy { padding-left: 24px; }
    .status-day { color: var(--purple-darker); font-size: 22px; font-weight: 700; }
    .status-comment { margin: 8px 0 0; color: var(--text); font-size: 13px; line-height: 1.6; }

    .disaster-zone { grid-area: disaster; padding: 16px; border-color: var(--pink); box-shadow: 5px 5px 0 rgba(230,168,177,0.34); background: #fffafb; }
    .disaster-zone::after { border-color: rgba(230,168,177,0.38); }
    .choice-zone { grid-area: choice; padding: 16px; }
    .settlers-zone { grid-area: settlers; padding: 16px; overflow: visible; }
    .environment-zone { grid-area: environment; padding: 14px 16px 16px; }
    .populations-zone { grid-area: populations; padding: 0; }
    .observe-zone { grid-area: observe; }
    .notice-list, .choice-options { margin: 0; padding: 0; list-style: none; display: grid; gap: 7px; }
    .notice-list li { border-left: 4px solid var(--pink); padding: 7px 10px; background: rgba(230,168,177,0.1); font-size: 13px; line-height: 1.5; }
    .choice-head { display: flex; align-items: start; justify-content: space-between; gap: 12px; }
    .choice-description { margin: 0 0 10px; line-height: 1.55; }
    .readonly-mark, .small-chip { display: inline-flex; color: var(--pink-dark); background: #fff8fa; border: 2px solid var(--pink); padding: 3px 7px; font-size: 10px; }
    .choice-options li { padding: 7px 10px; background: var(--purple-light); font-size: 12px; }

    .environment-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 7px; }
    .environment-cell { height: 62px; display: grid; align-content: center; justify-items: center; background: #faf8fc; border: 2px solid var(--purple-light); padding: 5px; }
    .environment-label { color: var(--muted); font-size: 10px; }
    .environment-number { color: var(--purple-darker); font-size: 20px; font-weight: 700; line-height: 1.2; }
    .environment-trend { color: var(--pink-dark); margin-left: 3px; font-size: 15px; }

    .settler-stack { position: relative; min-height: 196px; margin: 0 22px 4px; overflow: visible; touch-action: pan-y; perspective: 800px; user-select: none; }
    .settler-stack.single { margin-inline: 0; min-height: 174px; }
    .settler-layer { position: absolute; inset: 0; pointer-events: none; will-change: transform, opacity; transform-origin: center center; }
    .settler-layer.is-settling { transition: transform 260ms ease, opacity 260ms ease; }
    .settler-stack-card { height: 168px; padding: 18px; overflow: hidden; background: #fff; border: 4px solid var(--purple); box-shadow: 5px 5px 0 rgba(190,177,209,0.46); }
    .settler-stack-card::after { content: ""; position: absolute; inset: 3px; border: 2px solid var(--purple-light); pointer-events: none; }
    .settler-card-layout { position: relative; z-index: 1; display: grid; grid-template-columns: 44px minmax(0,1fr); gap: 14px; height: 100%; align-items: start; }
    .settler-card-art-slot { position: relative; width: 44px; height: 44px; display: grid; place-items: center; flex: none; }
    .settler-card-art { position: absolute; inset: 0; width: 44px; height: 44px; object-fit: contain; image-rendering: pixelated; }
    .settler-card-art-fallback { width: 44px; height: 44px; display: grid; place-items: center; color: var(--muted); background: #efedf1; border-radius: 8px; font-size: 17px; font-weight: 700; }
    .settler-card-info { min-width: 0; display: grid; gap: 10px; padding-right: 38px; }
    .settler-name-line { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
    .settler-name { margin: 0; color: var(--purple-darker); font-size: 20px; overflow-wrap: anywhere; }
    .settler-species { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .settler-status-line { display: flex; flex-wrap: wrap; gap: 7px 12px; color: var(--text); font-size: 11px; line-height: 1.45; }
    .settler-status-line span { white-space: nowrap; }
    .settler-health { font-weight: 700; }
    .settler-health.danger { color: #BD5262; }
    .settler-health.warning { color: #C98345; }
    .settler-health.good { color: #3F8D63; }
    .settler-return-line { display: flex; flex-wrap: wrap; gap: 5px; }
    .settler-return-badge { display: inline-flex; color: var(--pink-dark); background: #fff8fa; border: 2px solid var(--pink); padding: 2px 6px; font-size: 9px; line-height: 1.3; }
    .stack-page { position: absolute; z-index: 2; top: 12px; right: 13px; color: var(--pink-dark); font-size: 11px; }

    .pond-diary { min-height: 260px; padding: 24px 27px 24px 31px; color: var(--text); background: #FFFAF0; border-left-color: var(--pink); }
    .pond-diary::before { content: ""; position: absolute; z-index: 1; left: 14px; top: 18px; bottom: 18px; width: 3px; background: var(--pink); }
    .diary-text { margin: 0; color: var(--text); white-space: pre-wrap; font: inherit; font-size: 14px; line-height: 1.8; overflow-wrap: anywhere; }

    details.population-fold > summary { list-style: none; cursor: pointer; padding: 14px 17px; color: var(--purple-darker); font-weight: 700; }
    details.population-fold > summary::-webkit-details-marker { display: none; }
    details.population-fold > summary::after { content: "+"; float: right; color: var(--pink-dark); }
    details.population-fold[open] > summary::after { content: "−"; }
    .population-groups { display: grid; gap: 12px; border-top: 3px solid var(--purple-light); padding: 12px 16px 15px; }
    .population-group h3 { margin: 0 0 5px; color: var(--pink-dark); font-size: 12px; }
    .species-row { width: 100%; display: grid; grid-template-columns: auto minmax(18px,1fr) auto; align-items: center; gap: 7px; padding: 6px 1px; color: var(--text); background: transparent; border: 0; text-align: left; }
    .species-row-main { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .population-leader { align-self: center; height: 0.65em; border-bottom: 2px dotted var(--purple); opacity: 0.72; }
    .species-row-value { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
    .population-image { width: 30px; height: 30px; object-fit: contain; }
    .species-row.locked { color: var(--muted); cursor: default; }
    .delta-up { color: #3f8d63; }
    .delta-down { color: #bd5262; }

    .codex-progress { padding: 14px 16px; }
    .progress-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
    .progress-head strong { color: var(--purple-darker); }
    .pixel-progress { display: grid; grid-template-columns: repeat(var(--total), minmax(4px, 1fr)); gap: 3px; }
    .progress-cell { height: 13px; background: var(--purple-light); border: 1px solid var(--purple); }
    .progress-cell.filled { background: var(--pink); border-color: var(--pink-dark); box-shadow: inset 0 -3px 0 rgba(194,139,147,0.28); }
    .codex-section { display: grid; gap: 12px; }
    .species-grid { display: grid; grid-template-columns: repeat(6, minmax(0,1fr)); gap: 12px; }
    .species-tile { aspect-ratio: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 7px; min-width: 0; color: var(--purple-darker); background: #fff; border: 4px solid var(--purple); box-shadow: 5px 5px 0 rgba(190,177,209,0.45); padding: 9px; }
    .species-tile::after { content: ""; position: absolute; inset: 3px; border: 2px solid var(--purple-light); pointer-events: none; }
    .species-tile.locked { color: var(--muted); border-color: #c9c5cc; box-shadow: 4px 4px 0 rgba(156,163,175,0.24); background: repeating-linear-gradient(135deg, #f1eff2 0, #f1eff2 7px, #e8e5e9 7px, #e8e5e9 11px); }
    .species-tile.locked::after { border-color: rgba(156,163,175,0.28); }
    .species-art { position: relative; width: 64%; aspect-ratio: 1; display: grid; place-items: center; }
    .species-art img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
    .species-initial { color: var(--pink-dark); font-size: clamp(30px,4vw,52px); font-weight: 700; }
    .species-tile-name { position: relative; z-index: 1; font-weight: 700; font-size: 13px; text-align: center; }
    .codex-lower { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .soft-section { padding: 15px 16px; background: rgba(255,255,255,0.74); border-top: 3px solid var(--purple); }
    .badge-flow { display: flex; flex-wrap: wrap; gap: 7px; }
    .visitor-badge, .folio-count-badge { display: inline-flex; align-items: center; color: var(--purple-darker); background: var(--purple-light); border: 2px solid var(--purple); padding: 5px 9px; font-size: 12px; font-weight: 700; }
    .rumor-list { display: grid; gap: 8px; margin-top: 12px; }
    .codex-visitor-badges { display: flex; flex-wrap: wrap; gap: 7px; }
    .codex-visitor-notes { display: grid; gap: 4px; margin-top: 8px; padding-left: 10px; color: var(--muted); font-size: 10px; line-height: 1.45; }
    .codex-visitor-notes p { margin: 0; }
    .rumor-quote { margin: 0; padding: 7px 10px; border-left: 4px solid var(--pink); color: var(--text); font-size: 12px; line-height: 1.55; font-style: italic; background: rgba(230,168,177,0.07); }
    .achievement-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 8px; }
    .achievement-card { padding: 10px 11px; border: 2px solid #d8d4da; background: #f5f3f5; color: var(--muted); }
    .achievement-card.unlocked { color: var(--text); border-color: var(--pink); background: #fffafb; }
    .achievement-card h3 { margin: 0 0 3px; font-size: 13px; }
    .achievement-card p { margin: 0; font-size: 10px; line-height: 1.4; }

    .folio-section { position: relative; background: #fff; border: 4px solid var(--purple); box-shadow: 4px 4px 0 rgba(190,177,209,0.36); }
    .folio-section::after { content: ""; position: absolute; inset: 2px; border: 2px solid var(--purple-light); pointer-events: none; }
    .folio-title { position: relative; z-index: 2; list-style: none; cursor: pointer; margin: 0; padding: 13px 16px; color: var(--pink-dark); border-bottom: 3px solid transparent; font-size: 17px; font-weight: 700; }
    .folio-title::-webkit-details-marker { display: none; }
    .folio-title::after { content: "+"; float: right; color: var(--purple-darker); font-family: "Silkscreen", monospace; }
    .folio-section[open] > .folio-title { border-bottom-color: var(--purple-light); }
    .folio-section[open] > .folio-title::after { content: "−"; }
    .folio-section:not([open]) > .folio-body { display: none; }
    .folio-section[open] > .folio-body { position: relative; z-index: 1; display: grid; gap: 12px; padding: 14px 16px 17px; }
    .folio-species-list { display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); gap: 9px; }
    .folio-species-row { display: grid; gap: 5px; min-width: 0; padding: 11px 12px; background: #faf8fc; border: 2px solid var(--purple-light); }
    .folio-species-row strong { color: var(--purple-darker); text-align: center; }
    .folio-species-meta { color: var(--muted); font-size: 10px; line-height: 1.4; text-align: center; }
    .roster-flow { display: flex; flex-wrap: wrap; gap: 7px; }
    .clue-list { display: grid; gap: 6px; margin-top: 3px; }
    .clue-list p { margin: 0; padding-left: 9px; border-left: 3px solid var(--purple); color: var(--muted); font-size: 12px; font-style: italic; }
    .settler-folio-list { display: grid; gap: 12px; }
    .settler-folio-group { padding: 12px 14px; background: rgba(255,255,255,0.78); border-left: 5px solid var(--purple); }
    .settler-folio-head { margin: 0; color: var(--purple-darker); font-size: 14px; }
    .settler-folio-names { margin: 3px 0 0; color: var(--pink-dark); font-size: 11px; }
    .life-record { display: grid; grid-template-columns: minmax(70px,auto) 1fr; gap: 10px; margin-top: 10px; }
    .life-name { color: var(--text); font-size: 12px; font-weight: 700; }
    .origin-chip { display: block; width: fit-content; margin-top: 3px; color: var(--muted); font-size: 9px; }
    .mini-timeline { position: relative; margin: 0; padding: 0 0 0 17px; list-style: none; display: grid; gap: 6px; }
    .mini-timeline::before { content: ""; position: absolute; left: 4px; top: 5px; bottom: 5px; width: 2px; background: var(--purple-light); }
    .mini-timeline li { position: relative; font-size: 11px; line-height: 1.4; }
    .mini-timeline li::before { content: ""; position: absolute; left: -16px; top: 4px; width: 8px; height: 8px; background: var(--pink); border: 1px solid #fff; box-shadow: 0 0 0 1px var(--pink-dark); }
    .folio-record-flow { display: flex; flex-wrap: wrap; align-items: flex-start; gap: 10px; }
    .folio-record-item { display: grid; gap: 5px; min-width: 120px; max-width: 260px; padding: 8px 9px; background: #faf8fc; border-bottom: 2px solid var(--purple-light); }
    .folio-record-notes { color: var(--muted); font-size: 10px; line-height: 1.45; overflow-wrap: anywhere; }

    .annals-timeline { position: relative; margin: 0; padding: 0 0 0 104px; list-style: none; display: grid; gap: 17px; }
    .annals-timeline::before { content: ""; position: absolute; left: 82px; top: 9px; bottom: 9px; width: 2px; background: var(--purple); }
    .annals-day { position: relative; min-height: 34px; }
    .annals-day::before { content: ""; position: absolute; left: -26px; top: 9px; width: 10px; height: 10px; background: #fff; border: 3px solid var(--purple-dark); border-radius: 50%; }
    .date-badge { position: absolute; right: calc(100% + 40px); top: 0; min-width: 58px; padding: 4px 6px; color: #fff; border: 2px solid transparent; text-align: center; font-size: 10px; font-weight: 700; white-space: nowrap; }
    .season-spring { background: #A8C8A0; }
    .season-summer { background: #E6A8B1; }
    .season-autumn { background: #D4B483; }
    .season-winter { background: #9B8DB5; }
    .season-unknown { background: var(--muted); }
    .annals-events { display: grid; gap: 6px; }
    .annals-event { position: relative; margin: 0; padding: 8px 10px 8px 14px; color: var(--text); background: rgba(255,255,255,0.78); border-left: 3px solid var(--muted); line-height: 1.55; font-size: 13px; }
    .annals-event::before { content: ""; position: absolute; left: -7px; top: 12px; width: 8px; height: 8px; background: #fff; border: 2px solid var(--muted); }
    .annals-event.type-settle { border-left-color: var(--pink); }
    .annals-event.type-settle::before { border-color: var(--pink); }
    .annals-event.type-leave { border-left-color: var(--purple-darker); }
    .annals-event.type-leave::before { border-color: var(--purple-darker); }
    .annals-event.type-achievement { border-left-color: #D4B483; }
    .annals-event.type-achievement::before { border-color: #D4B483; }
    .annals-day.type-normal::before, .annals-day.type-normal .date-badge { border-color: var(--muted); }
    .annals-day.type-settle::before, .annals-day.type-settle .date-badge { border-color: var(--pink); }
    .annals-day.type-leave::before, .annals-day.type-leave .date-badge { border-color: var(--purple-darker); }
    .annals-day.type-achievement::before, .annals-day.type-achievement .date-badge { border-color: #D4B483; }
    .annals-event strong { color: var(--text); font-weight: 700; }

    .sheet-backdrop { position: fixed; z-index: 60; inset: 0; display: flex; align-items: end; justify-content: center; padding: 14px 14px 0; background: rgba(45,45,45,0.45); }
    .sheet { width: min(680px,100%); max-height: 78vh; overflow: auto; background: var(--bg); border: 4px solid var(--purple-dark); border-bottom: 0; padding: 14px 17px calc(22px + var(--safe-bottom)); }
    .sheet-handle { width: 54px; height: 5px; margin: 0 auto 12px; background: var(--purple); }
    .sheet-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-bottom: 9px; border-bottom: 3px solid var(--purple-light); }
    .sheet-header h2 { margin: 0; color: var(--purple-darker); font-size: 19px; }
    .sheet-close { width: 38px; height: 38px; color: var(--purple-darker); background: #fff; border: 3px solid var(--purple); font-size: 20px; }
    .sheet-content { padding-top: 12px; }
    .detail-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 7px; }
    .detail-item { padding: 8px 9px; background: #fff; border: 2px solid var(--purple-light); }
    .detail-label { display: block; color: var(--muted); font-size: 10px; }
    .detail-value { display: block; margin-top: 3px; color: var(--purple-darker); font-size: 13px; overflow-wrap: anywhere; }
    .bottom-nav { display: none; }

    @media (max-width: 1000px) and (min-width: 769px) {
      .species-grid { grid-template-columns: repeat(5,minmax(0,1fr)); }
    }

    @media (max-width: 768px) {
      .site-header { padding: 9px 12px; }
      .brand { gap: 9px; }
      .brand h1 { font-size: 17px; }
      .brand small, .desktop-nav { display: none; }
      .pixel-logo { width: 21px; height: 16px; border-width: 3px; }
      main { width: min(100% - 16px,620px); padding: 10px 0 calc(var(--mobile-nav-height) + var(--safe-bottom) + 14px); }
      .page-stack { gap: 13px; }
      .page-heading h2 { font-size: 20px; }
      .state-grid { grid-template-columns: 1fr; grid-template-areas: "summary" "disaster" "choice" "observe" "settlers" "environment" "populations"; gap: 10px; }
      .status-banner { grid-template-columns: 78px 1fr; min-height: 82px; padding: 10px 12px; border-width: 3px; }
      .status-banner .score { font-size: 45px; border-right-width: 2px; }
      .status-copy { padding-left: 11px; }
      .status-day { font-size: 13px; }
      .status-comment { margin-top: 4px; font-size: 10px; line-height: 1.4; }

      .settler-card-layout { gap: 10px; }
      .settler-card-info { gap: 8px; padding-right: 32px; }
      .settler-name-line { gap: 6px; }
      .settler-name { font-size: 15px; }
      .settler-species { font-size: 9px; }
      .settler-status-line { gap: 5px 9px; font-size: 9px; }
      .settler-return-badge { font-size: 8px; padding: 2px 5px; }
      .stack-page { top: 9px; right: 10px; font-size: 10px; }
      .pond-diary { min-height: 220px; padding: 16px 16px 16px 25px; }
      .pond-diary::before { left: 11px; top: 13px; bottom: 13px; }
      .diary-text { font-size: 11px; line-height: 1.8; }
      .population-groups { padding: 8px 10px 10px; gap: 8px; }
      .species-row { padding: 4px 1px; font-size: 11px; }
      .population-image { width: 25px; height: 25px; }
      .pixel-progress { gap: 2px; }

      .species-grid { grid-template-columns: repeat(3,minmax(0,1fr)); gap: 7px; }
      .species-tile { border-width: 3px; box-shadow: 4px 4px 0 rgba(190,177,209,0.45); padding: 6px; }
      .species-tile::after { border-width: 1px; }
      .species-tile-name { font-size: 10px; }

      .codex-lower { grid-template-columns: 1fr; gap: 10px; }
      .soft-section { padding: 10px; }
      .achievement-grid { gap: 6px; }
      .achievement-card { padding: 7px; }
      .achievement-card h3 { font-size: 11px; }
      .achievement-card p { font-size: 9px; }
      .folio-section { border-width: 3px; }
      .folio-title { font-size: 14px; padding: 10px 12px; }
      .folio-section[open] > .folio-body { padding: 10px 11px 13px; }

      .bottom-nav {

        background: var(--purple);
        border-top: 4px solid var(--purple-dark);
      }
      .bottom-nav .nav-button {
        min-width: 0;
        min-height: 56px;

        border: 0;
        border-top: 4px solid transparent;

      }
      .bottom-nav .nav-button[aria-selected="true"] { color: #fff; background: var(--purple-darker); border-top-color: var(--pink); }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="site-header">
      <div class="header-inner">
        <div class="brand">
          <span class="pixel-logo" aria-hidden="true"></span>
          <div><h1>瓶中生态</h1><small>ECO · READ ONLY</small></div>
        </div>
        <nav class="desktop-nav" aria-label="页面导航"></nav>
      </div>
    </header>

    <main id="main-content">
      <section id="view-state" class="view" aria-labelledby="desktop-tab-state"></section>
      <section id="view-codex" class="view" aria-labelledby="desktop-tab-codex" hidden></section>
      <section id="view-folio" class="view" aria-labelledby="desktop-tab-folio" hidden></section>
      <section id="view-annals" class="view" aria-labelledby="desktop-tab-annals" hidden></section>
    </main>

    <nav class="bottom-nav" aria-label="页面导航"></nav>
  </div>

  <div id="species-sheet" class="sheet-backdrop" hidden>
    <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
      <div class="sheet-handle" aria-hidden="true"></div>
      <div class="sheet-header">
        <h2 id="sheet-title">物种详情</h2>
        <button id="sheet-close" class="sheet-close" type="button" aria-label="关闭">×</button>
      </div>
      <div id="sheet-content" class="sheet-content"></div>
    </section>
  </div>

  <script>
    "use strict";

    const tabs = [
      { id: "state", label: "状态" },
      { id: "codex", label: "图鉴" },
      { id: "folio", label: "万物志" },
      { id: "annals", label: "年鉴" }
    ];
    const apiPaths = {
      state: "/eco/api/state",
      codex: "/eco/api/codex",
      folio: "/eco/api/folio",
      annals: "/eco/api/annals"
    };
    const loaded = new Set();
    const views = Object.fromEntries(tabs.map(tab => [tab.id, document.getElementById(`view-${tab.id}`)]));
    const aiUserId = new URLSearchParams(window.location.search).get("ai_user_id");
    const apiSuffix = aiUserId === null ? "" : `?ai_user_id=${encodeURIComponent(aiUserId)}`;
    const sheetBackdrop = document.getElementById("species-sheet");
    const sheetContent = document.getElementById("sheet-content");
    const sheetTitle = document.getElementById("sheet-title");

    function el(tag, options = {}, children = []) {
      const node = document.createElement(tag);
      if (options.className) node.className = options.className;
      if (options.text !== undefined && options.text !== null) node.textContent = String(options.text);
      if (options.attrs) Object.entries(options.attrs).forEach(([key, value]) => node.setAttribute(key, String(value)));
      const list = Array.isArray(children) ? children : [children];
      list.filter(child => child !== null && child !== undefined).forEach(child => node.append(child));
      return node;
    }

    function card(title, className = "") {
      const node = el("section", { className: `pixel-card ${className}`.trim() });
      if (title) node.append(el("h2", { className: "section-title", text: title }));
      return node;
    }

    function emptyNode() { return el("div", { className: "empty", text: "—" }); }

    function speciesImage(name, className) {
      const image = el("img", {
        className,
        attrs: { src: `/eco/assets/species/${name}.png`, alt: "", loading: "lazy" }
      });
      image.addEventListener("error", () => { image.hidden = true; }, { once: true });
      return image;
    }

    function speciesArt(name) {
      const fallback = el("span", { className: "species-initial", text: name.slice(0, 1) });
      const image = el("img", { attrs: { src: `/eco/assets/species/${name}.png`, alt: "", loading: "lazy" } });
      image.addEventListener("load", () => { fallback.hidden = true; }, { once: true });
      image.addEventListener("error", () => { image.hidden = true; }, { once: true });
      return el("span", { className: "species-art" }, [fallback, image]);
    }

    function settlerArt(species) {
      const fallback = el("span", { className: "settler-card-art-fallback", text: species.slice(0, 1) });
      const image = el("img", {
        className: "settler-card-art",
        attrs: { src: `/eco/assets/species/${species}.png`, alt: "", loading: "lazy" }
      });
      image.addEventListener("load", () => { fallback.hidden = true; }, { once: true });
      image.addEventListener("error", () => { image.hidden = true; }, { once: true });
      return el("span", { className: "settler-card-art-slot" }, [fallback, image]);
    }

    function originLabel(value) {
      const labels = { arrived: "初来乍到", return: "归来", returned: "归来", born: "塘中出生" };
      return labels[value] || `来历：${value}`;
    }

    function reasonLabel(value) {
      const labels = { old_age: "年老离去", age: "年老离去", starve: "饥饿离开", food: "饥饿离开" };
      return labels[value] || `离开原因：${value}`;
    }

    function errorMessage(error) {
      if (error.status === 401) return "请先在主站登录";
      if (error.status === 404) return "还没有池塘存档";
      if (error.network) return "网络连接失败，请稍后重试";
      return "读取失败，请稍后重试";
    }

    async function apiGet(path) {
      const token = localStorage.getItem("cedartoy_token") || "";
      let response;
      try {
        response = await fetch(`${path}${apiSuffix}`, { headers: { Authorization: `Bearer ${token}` } });
      } catch (cause) {
        const error = new Error("network", { cause });
        error.network = true;
        throw error;
      }
      let payload = null;
      try { payload = await response.json(); } catch (_) { /* 状态码仍可用于错误提示。 */ }
      if (!response.ok) {
        const error = new Error("request");
        error.status = response.status;
        throw error;
      }
      return payload;
    }

    function buildNav(target) {
      const prefix = target.classList.contains("desktop-nav") ? "desktop" : "mobile";
      tabs.forEach(tab => {
        const button = el("button", {
          className: "nav-button",
          text: tab.label,
          attrs: { type: "button", role: "tab", id: `${prefix}-tab-${tab.id}`, "data-tab": tab.id, "aria-selected": tab.id === "state" }
        });
        button.addEventListener("click", () => activateTab(tab.id));
        target.append(button);
      });
    }

    async function activateTab(id) {
      tabs.forEach(tab => {
        views[tab.id].hidden = tab.id !== id;
        document.querySelectorAll(`[data-tab="${tab.id}"]`).forEach(button => button.setAttribute("aria-selected", String(tab.id === id)));
      });
      if (!loaded.has(id)) await loadView(id);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function loadView(id) {
      const container = views[id];
      container.replaceChildren(el("div", { className: "loading", text: "读取中" }));
      try {
        const data = await apiGet(apiPaths[id]);
        ({ state: renderState, codex: renderCodex, folio: renderFolio, annals: renderAnnals })[id](data, container);
        loaded.add(id);
      } catch (error) {
        container.replaceChildren(el("div", { className: "pixel-card error-state", text: errorMessage(error) }));
      }
    }

    function disasterMessages(disasters) {
      const messages = [];
      const weather = disasters && disasters.active_weather;
      if (weather && typeof weather === "object") {
        let text = weather.kind || "持续天气";
        if (weather.elapsed !== null && weather.elapsed !== undefined && weather.duration !== null && weather.duration !== undefined) {
          text += ` · 第${weather.elapsed}/${weather.duration}天`;
        }
        if (weather.mitigated === true) text += " · 已缓解";
        messages.push(text);
      } else if (typeof weather === "string" && weather) {
        messages.push(weather);
      }
      if (disasters && disasters.invasion) messages.push(disasters.invasion);
      if (disasters && disasters.water_hyacinth_cover !== null && disasters.water_hyacinth_cover !== undefined) {
        messages.push(`水葫芦覆盖：${disasters.water_hyacinth_cover}`);
      }
      ((disasters && disasters.biological) || []).forEach(item => {
        if (!item || typeof item !== "object") return;
        let text = item.name || "生物灾害";
        if (item.elapsed !== null && item.elapsed !== undefined && item.duration !== null && item.duration !== undefined) text += ` · 第${item.elapsed}/${item.duration}天`;
        if (item.remaining !== null && item.remaining !== undefined) text += ` · 剩余${item.remaining}天`;
        messages.push(text);
      });
      return messages;
    }

    function naturalObserveText(text) {
      const start = text.indexOf('{"day"');
      if (start < 0) return text;
      let depth = 0;
      let inString = false;
      let escaped = false;
      for (let index = start; index < text.length; index += 1) {
        const character = text[index];
        if (inString) {
          if (escaped) escaped = false;
          else if (character === "\\") escaped = true;
          else if (character === '"') inString = false;
          continue;
        }
        if (character === '"') inString = true;
        else if (character === "{") depth += 1;
        else if (character === "}") {
          depth -= 1;
          if (depth === 0) {
            return text.slice(0, start).trimEnd();
          }
        }
      }
      return text;
    }

    function renderObserve(text) {
      const paper = el("section", { className: "pixel-card pond-diary observe-zone", attrs: { "aria-label": "观察记录" } });
      paper.append(el("pre", { className: "diary-text", text: naturalObserveText(String(text || "")) }));
      return paper;
    }

    function stackPose(offset) {
      if (offset === 0) return { x: 0, y: 0, scale: 1, rotate: 0, opacity: 1, zIndex: 20 };
      const side = offset < 0 ? -1 : 1;
      const depth = Math.min(Math.abs(offset), 3);
      const firstLayer = Math.min(depth, 1);
      const extra = Math.max(depth - 1, 0);
      return {
        x: side * (18 * firstLayer + extra * 12),
        y: 6 * firstLayer + extra * 5,
        scale: 1 - depth * 0.04,
        rotate: side * (1.15 * firstLayer + extra * 0.5),
        opacity: Math.max(0.44, 1 - depth * 0.18),
        zIndex: Math.max(1, 10 - Math.ceil(depth))
      };
    }

    function mixPose(from, to, progress) {
      const mix = key => from[key] + (to[key] - from[key]) * progress;
      return { x: mix("x"), y: mix("y"), scale: mix("scale"), rotate: mix("rotate"), opacity: mix("opacity") };
    }

    function applyPose(node, pose, zIndex) {
      node.style.transform = `translate3d(${pose.x}px, ${pose.y}px, 0) scale(${pose.scale}) rotate(${pose.rotate}deg)`;
      node.style.opacity = String(pose.opacity);
      node.style.zIndex = String(zIndex === undefined ? pose.zIndex : zIndex);
    }

    function settlerCard(settler, index, total) {
      const species = settler.name || settler.species;
      const title = settler.nickname || species;
      const cardNode = el("article", { className: "settler-stack-card" });
      const info = el("div", { className: "settler-card-info" });
      info.append(el("div", { className: "settler-name-line" }, [
        el("h3", { className: "settler-name", text: title }),
        settler.nickname ? el("span", { className: "settler-species", text: species }) : null
      ]));
      const healthClass = settler.health_value < 0.3 ? "danger" : (settler.health_value <= 0.6 ? "warning" : "good");
      info.append(el("div", { className: "settler-status-line" }, [
        el("span", { text: `到达：第${settler.arrive_day}天` }),
        el("span", { text: `存活：${settler.days_alive}天` }),
        el("span", {}, [document.createTextNode("健康："), el("strong", { className: `settler-health ${healthClass}`, text: `${settler.health} ${settler.health_value}` })])
      ]));
      const returns = (settler.return_records || [])
        .filter(record => record && record.day !== null && record.day !== undefined)
        .map(record => el("span", { className: "settler-return-badge", text: `第${record.day}天归来` }));
      if (returns.length) info.append(el("div", { className: "settler-return-line" }, returns));
      cardNode.append(el("div", { className: "settler-card-layout" }, [settlerArt(species), info]));
      if (total > 1) cardNode.append(el("span", { className: "stack-page", text: `${index + 1}/${total}` }));
      return cardNode;
    }

    function createSettlerStack(settlers) {
      if (!settlers.length) return emptyNode();
      const container = el("div", { className: `settler-stack${settlers.length === 1 ? " single" : ""}` });
      let activeIndex = 0;
      let motion = null;
      let motionRef = null;
      let pointerState = null;
      let suppressClickRef = false;
      let settleFallback = null;
      const layerNodes = new Map();
      const swipeDistance = 136;
      const dragActivationDistance = 14;
      const commitDistance = 42;
      const layerFlipProgress = 0.48;

      function setMotion(nextMotion) {
        motion = nextMotion;
        motionRef = nextMotion;
        renderLayers();
      }

      function finishSettling() {
        const latest = motionRef;
        if (!latest || latest.phase !== "settling") return;
        if (latest.accepted && latest.targetIndex !== null) activeIndex = latest.targetIndex;
        motion = null;
        motionRef = null;
        if (settleFallback !== null) window.clearTimeout(settleFallback);
        settleFallback = null;
        renderLayers();
      }

      function queueSettleFallback() {
        if (settleFallback !== null) window.clearTimeout(settleFallback);
        settleFallback = window.setTimeout(finishSettling, 320);
      }

      function makeLayer(index, role, pose, zIndex) {
        let layer = layerNodes.get(index);
        if (!layer) {
          layer = el("div");
          layer.append(settlerCard(settlers[index], index, settlers.length));
          layer.addEventListener("transitionend", event => {
            if (layer.dataset.role === "current" && event.propertyName === "transform") finishSettling();
          });
          layerNodes.set(index, layer);
        }
        layer.className = `settler-layer ${role}${motion && motion.phase === "settling" ? " is-settling" : ""}`;
        applyPose(layer, pose, zIndex);
        layer.dataset.index = String(index);
        layer.dataset.role = role;
        return layer;
      }

      function commitLayers(layers) {
        const visibleLayers = new Set(layers);
        Array.from(container.children).forEach(layer => {
          if (!visibleLayers.has(layer)) layer.remove();
        });
        layers.forEach(layer => container.append(layer));
      }

      function renderLayers() {
        const layers = [];
        if (settlers.length === 1) {
          layers.push(makeLayer(0, "current", stackPose(0), 20));
          commitLayers(layers);
          return;
        }
        if (!motion) {
          settlers.forEach((_, index) => {
            const offset = index - activeIndex;
            if (index !== activeIndex && Math.abs(offset) <= 3.2) layers.push(makeLayer(index, "background", stackPose(offset)));
          });
          layers.push(makeLayer(activeIndex, "current", stackPose(0), 20));
          commitLayers(layers);
          return;
        }

        const motionProgress = motion.phase === "dragging" ? Math.pow(motion.progress, 0.92) : motion.progress;
        const hasTarget = motion.targetIndex !== null;
        const stackShift = hasTarget ? motion.direction * motionProgress : 0;
        const stackAnchorIndex = motion.baseIndex + stackShift;
        settlers.forEach((_, index) => {
          const offset = index - stackAnchorIndex;
          if (index !== motion.baseIndex && index !== motion.targetIndex && Math.abs(offset) <= 3.2) {
            layers.push(makeLayer(index, "background", stackPose(offset)));
          }
        });

        if (hasTarget) {
          const targetPose = mixPose(stackPose(motion.direction), stackPose(0), motionProgress);
          const targetBackgroundZ = stackPose(motion.direction).zIndex;
          const targetZ = motionProgress < layerFlipProgress ? targetBackgroundZ : 24;
          layers.push(makeLayer(motion.targetIndex, "target", targetPose, targetZ));
        }
        const currentPose = mixPose(stackPose(0), stackPose(-motion.direction), motionProgress);
        const currentBackgroundZ = stackPose(-motion.direction).zIndex;
        const currentZ = motionProgress >= layerFlipProgress ? currentBackgroundZ : 24;
        layers.push(makeLayer(motion.baseIndex, "current", currentPose, currentZ));
        commitLayers(layers);
      }

      function settle(accepted) {
        if (!motion) return;
        setMotion({ ...motion, phase: "settling", accepted, progress: accepted ? 1 : 0 });
        queueSettleFallback();
      }

      container.addEventListener("pointerdown", event => {
        if (settlers.length < 2 || pointerState || (motionRef && motionRef.phase === "settling")) return;
        pointerState = { pointerId: event.pointerId, startX: event.clientX, baseIndex: activeIndex, direction: null };
        suppressClickRef = false;
        motion = null;
        motionRef = null;
        container.setPointerCapture(event.pointerId);
      });

      container.addEventListener("pointermove", event => {
        if (!pointerState || event.pointerId !== pointerState.pointerId) return;
        const deltaX = event.clientX - pointerState.startX;
        if (Math.abs(deltaX) > 6) suppressClickRef = true;
        if (pointerState.direction === null && Math.abs(deltaX) <= dragActivationDistance) return;
        if (pointerState.direction === null) pointerState.direction = deltaX < 0 ? 1 : -1;
        const direction = pointerState.direction;
        const directionalDelta = direction === 1 ? -deltaX : deltaX;
        const effectiveDistance = Math.max(0, directionalDelta - dragActivationDistance);
        const candidate = pointerState.baseIndex + direction;
        const targetIndex = candidate >= 0 && candidate < settlers.length ? candidate : null;
        const progress = targetIndex === null ? Math.min(effectiveDistance / swipeDistance, 0.18) : Math.min(effectiveDistance / swipeDistance, 1);
        setMotion({ phase: "dragging", baseIndex: pointerState.baseIndex, direction, targetIndex, progress, effectiveDistance, accepted: false });
      });

      function endPointer(event, cancelled) {
        if (!pointerState || event.pointerId !== pointerState.pointerId) return;
        if (container.hasPointerCapture(event.pointerId)) container.releasePointerCapture(event.pointerId);
        pointerState = null;
        if (!motion) return;
        const accepted = !cancelled && motion.targetIndex !== null && motion.effectiveDistance >= commitDistance;
        settle(accepted);
      }

      container.addEventListener("pointerup", event => endPointer(event, false));
      container.addEventListener("pointercancel", event => endPointer(event, true));
      container.addEventListener("click", () => {
        if (suppressClickRef) {
          suppressClickRef = false;
          return;
        }
        if (settlers.length < 2 || motionRef) return;
        const direction = activeIndex < settlers.length - 1 ? 1 : -1;
        const targetIndex = activeIndex + direction;
        setMotion({ phase: "dragging", baseIndex: activeIndex, direction, targetIndex, progress: 0, effectiveDistance: commitDistance, accepted: false });
        window.requestAnimationFrame(() => settle(true));
      });

      renderLayers();
      return container;
    }

    function renderState(data, container) {
      const grid = el("div", { className: "state-grid" });
      const banner = card(null, "status-banner");
      banner.append(
        el("div", { className: "score", text: data.score }),
        el("div", { className: "status-copy" }, [
          el("div", { className: "status-day", text: `第${data.day}天 · ${data.season} · 第${data.year}年 · ${data.weather}` }),
          el("p", { className: "status-comment", text: data.comment })
        ])
      );
      grid.append(banner);

      const warnings = disasterMessages(data.disasters || {});
      if (warnings.length) {
        const zone = card("灾害警示", "disaster-zone");
        zone.append(el("ul", { className: "notice-list" }, warnings.map(text => el("li", { text }))));
        grid.append(zone);
      }

      if (data.pending_choice !== null) {
        const zone = card(null, "choice-zone");
        zone.append(el("div", { className: "choice-head" }, [
          el("h2", { className: "section-title", text: "待决策" }),
          el("span", { className: "readonly-mark", text: "由小机决定" })
        ]));
        zone.append(el("p", { className: "choice-description", text: data.pending_choice.description }));
        zone.append(el("ol", { className: "choice-options" }, (data.pending_choice.options || []).map(option => el("li", { text: `${option.index}. ${option.label}` }))));
        grid.append(zone);
      }

      grid.append(renderObserve(data.observe_text));

      const settlers = card("定居者", "settlers-zone");
      settlers.append(createSettlerStack(data.settlers || []));
      grid.append(settlers);

      const environment = card("环境参数", "environment-zone");
      const env = data.environment || {};
      const values = [
        ["水温", env.water_temp, ""],
        ["溶氧", env.dissolved_oxygen && env.dissolved_oxygen.value, env.dissolved_oxygen && env.dissolved_oxygen.trend],
        ["光照", env.light, ""],
        ["营养盐", env.nutrients && env.nutrients.value, env.nutrients && env.nutrients.trend],
        ["有机碎屑", env.detritus && env.detritus.value, env.detritus && env.detritus.trend],
        ["浑浊度", env.turbidity, ""]
      ];
      const environmentGrid = el("div", { className: "environment-grid" });
      values.forEach(([label, value, trend]) => environmentGrid.append(el("div", { className: "environment-cell" }, [
        el("span", { className: "environment-label", text: label }),
        el("div", {}, [el("strong", { className: "environment-number", text: value }), trend ? el("b", { className: "environment-trend", text: trend }) : null])
      ])));
      environment.append(environmentGrid);
      grid.append(environment);

      const populations = el("details", { className: "pixel-card population-fold populations-zone" });
      populations.append(el("summary", { text: "种群" }));
      const groups = el("div", { className: "population-groups" });
      (data.populations || []).forEach(group => {
        const groupNode = el("section", { className: "population-group" }, el("h3", { text: group.label }));
        (group.species || []).forEach(species => {
          const unlocked = species.name !== "???";
          const row = el(unlocked ? "button" : "div", { className: `species-row${unlocked ? "" : " locked"}`, attrs: unlocked ? { type: "button" } : {} });
          row.append(el("span", { className: "species-row-main" }, [unlocked ? speciesImage(species.name, "population-image") : null, el("strong", { text: species.name })]));
          row.append(el("span", { className: "population-leader", attrs: { "aria-hidden": "true" } }));
          const value = el("span", { className: "species-row-value" }, el("span", { text: species.count === null ? "" : species.count }));
          if (species.delta > 0) value.append(el("span", { className: "delta-up", text: `↑${species.delta}` }));
          else if (species.delta < 0) value.append(el("span", { className: "delta-down", text: `↓${species.delta}` }));
          row.append(value);
          if (unlocked) row.addEventListener("click", () => openSpecies(species.name));
          groupNode.append(row);
        });
        groups.append(groupNode);
      });
      populations.append(groups);
      grid.append(populations);
      container.replaceChildren(grid);
    }

    function renderCodex(data, container) {
      const stack = el("div", { className: "page-stack" });
      stack.append(el("div", { className: "page-heading" }, el("h2", { text: "图鉴" })));

      const appeared = data.species_count.appeared;
      const total = data.species_count.total;
      const progress = card(null, "codex-progress");
      progress.append(el("div", { className: "progress-head" }, [
        el("strong", { text: "物种发现进度" }), el("span", { className: "progress-count", text: `${appeared} / ${total}` })
      ]));
      const cells = el("div", { className: "pixel-progress", attrs: { style: `--total:${total}` } });
      for (let index = 0; index < total; index += 1) cells.append(el("span", { className: `progress-cell${index < appeared ? " filled" : ""}` }));
      progress.append(cells);
      stack.append(progress);

      const speciesSection = el("section", { className: "codex-section" }, el("h2", { className: "section-title", text: "物种" }));
      const speciesGrid = el("div", { className: "species-grid" });
      (data.species || []).forEach(species => {
        const unlocked = species.name !== "???" && species.unlocked;
        const tile = el(unlocked ? "button" : "div", { className: `species-tile${unlocked ? "" : " locked"}`, attrs: unlocked ? { type: "button" } : {} });
        if (unlocked) {
          tile.append(speciesArt(species.name), el("span", { className: "species-tile-name", text: species.name }));
          tile.addEventListener("click", () => openSpecies(species.name));
        } else {
          tile.append(el("span", { className: "species-tile-name", text: "???" }));
        }
        speciesGrid.append(tile);
      });
      speciesSection.append(speciesGrid);
      stack.append(speciesSection);

      const lower = el("div", { className: "codex-lower" });
      const visitors = el("section", { className: "soft-section" }, el("h2", { className: "section-title", text: "访客" }));
      const visitorData = data.visitors || {};
      const visitorBadges = el("div", { className: "codex-visitor-badges" });
      const visitorNotes = el("div", { className: "codex-visitor-notes" });
      (visitorData.recorded || []).forEach(visitor => {
        const isRecord = visitor && typeof visitor === "object";
        const name = isRecord ? visitor.name : visitor;
        const count = isRecord ? visitor.count : null;
        const notes = isRecord ? (visitor.notes || []) : [];
        visitorBadges.append(el("span", { className: "visitor-badge", text: count === null || count === undefined ? name : `${name} ×${count}` }));
        if (notes.length) visitorNotes.append(el("p", { text: `${name}：${notes.join(" · ")}` }));
      });
      visitors.append(visitorBadges.childElementCount ? visitorBadges : emptyNode());
      if (visitorNotes.childElementCount) visitors.append(visitorNotes);
      const rumors = el("div", { className: "rumor-list" });
      (visitorData.rumors || []).forEach(text => rumors.append(el("blockquote", { className: "rumor-quote", text })));
      visitors.append(rumors.childElementCount ? rumors : emptyNode());

      const achievements = el("section", { className: "soft-section" }, el("h2", { className: "section-title", text: "成就" }));
      const achievementGrid = el("div", { className: "achievement-grid" });
      (data.achievements || []).forEach(item => achievementGrid.append(el("article", { className: `achievement-card${item.unlocked ? " unlocked" : ""}` }, [
        el("h3", { text: item.name }), el("p", { text: item.condition })
      ])));
      achievements.append(achievementGrid);
      lower.append(visitors, achievements);
      stack.append(lower);
      container.replaceChildren(stack);
    }

    function residentTimeline(resident) {
      const entries = [];
      let sequence = 0;
      const add = (day, text) => {
        if (day === null || day === undefined) return;
        const numeric = Number(day);
        entries.push({ day: Number.isFinite(numeric) ? numeric : Number.POSITIVE_INFINITY, sequence: sequence++, text });
      };
      add(resident.arrive_day, `第${resident.arrive_day}天 到访`);
      (resident.hibernations || []).forEach(period => {
        if (!period || typeof period !== "object") return;
        add(period.sleep, `第${period.sleep}天 入眠`);
        add(period.wake, `第${period.wake}天 苏醒`);
      });
      (resident.return_records || []).forEach(record => {
        if (record && typeof record === "object") add(record.day, `第${record.day}天 归来`);
      });
      if (resident.leave_day !== null && resident.leave_day !== undefined) {
        const leaveText = resident.reason === null || resident.reason === undefined ? "离开" : reasonLabel(resident.reason);
        add(resident.leave_day, `第${resident.leave_day}天 ${leaveText}`);
      }
      return entries.sort((left, right) => left.day - right.day || left.sequence - right.sequence);
    }

    function createFolioSection(title, openByDefault) {
      const section = el("details", { className: "folio-section" });
      section.open = openByDefault;
      section.append(el("summary", { className: "folio-title", text: title }));
      const body = el("div", { className: "folio-body" });
      section.append(body);
      return { section, body };
    }

    function folioCountSection(title, items) {
      const { section, body } = createFolioSection(title, false);
      const list = el("div", { className: "folio-record-flow" });
      (items || []).forEach(item => {
        const entry = el("article", { className: "folio-record-item" });
        entry.append(el("span", { className: "folio-count-badge", text: `${item.name} ×${item.count}` }));
        if ((item.notes || []).length) entry.append(el("span", { className: "folio-record-notes", text: item.notes.join(" · ") }));
        list.append(entry);
      });
      body.append(list.childElementCount ? list : emptyNode());
      return section;
    }

    function folioVisitorSection(items) {
      return folioCountSection("访客志", items);
    }

    function renderFolio(data, container) {
      const stack = el("div", { className: "page-stack" });
      stack.append(el("div", { className: "page-heading" }, el("h2", { text: "万物志" })));

      const { section: speciesSection, body: speciesBody } = createFolioSection("物种志", true);
      const speciesList = el("div", { className: "folio-species-list" });
      (data.species || []).forEach(item => speciesList.append(el("div", { className: "folio-species-row" }, [
        el("strong", { text: item.name }),
        el("span", { className: "folio-species-meta", text: `${item.unlock_text} · 历史最高${item.historical_peak} · 归零${item.extinct_count}次` })
      ])));
      speciesBody.append(speciesList.childElementCount ? speciesList : emptyNode());
      stack.append(speciesSection);

      const { section: rosterSection, body: rosterBody } = createFolioSection("造物名册", false);
      const roster = el("div", { className: "roster-flow" });
      (data.creation_roster || []).forEach(name => roster.append(el("span", { className: "visitor-badge", text: name })));
      rosterBody.append(roster.childElementCount ? roster : emptyNode());
      const clues = el("div", { className: "clue-list" });
      (data.undiscovered_clues || []).forEach(item => clues.append(el("p", { text: `${item.name} · ${item.clue}` })));
      if (clues.childElementCount) rosterBody.append(clues);
      stack.append(rosterSection);

      const { section: settlersSection, body: settlersBody } = createFolioSection("定居者志", true);
      const settlerGroups = el("div", { className: "settler-folio-list" });
      (data.settlers || []).forEach(group => {
        const residents = group.residents || [];
        const nicknames = [...new Set(residents.map(resident => resident.nickname).filter(Boolean))];
        const groupName = group.name || group.species;
        const groupNode = el("article", { className: "settler-folio-group" });
        const namedPart = nicknames.length ? ` · ${nicknames.join("、")}` : "";
        groupNode.append(el("h3", { className: "settler-folio-head", text: `${groupName}${namedPart} · 定居${group.settle_count}次 · 最长存活${group.longest_survival}天` }));
        residents.forEach(resident => {
          const record = el("div", { className: "life-record" });
          const nameColumn = el("div", {}, [
            el("div", { className: "life-name", text: resident.nickname || resident.name }),
            resident.origin !== null && resident.origin !== undefined ? el("span", { className: "origin-chip", text: originLabel(resident.origin) }) : null
          ]);
          const timeline = el("ol", { className: "mini-timeline" });
          residentTimeline(resident).forEach(entry => timeline.append(el("li", { text: entry.text })));
          record.append(nameColumn, timeline);
          groupNode.append(record);
        });
        settlerGroups.append(groupNode);
      });
      settlersBody.append(settlerGroups.childElementCount ? settlerGroups : emptyNode());
      stack.append(settlersSection);

      stack.append(folioVisitorSection(data.visitors));
      stack.append(folioCountSection("事件志", data.events));
      stack.append(folioCountSection("灾害志", data.disasters));
      container.replaceChildren(stack);
    }

    function parseAnnalsEntry(entry, fallbackIndex) {
      const match = String(entry).match(/^(春|夏|秋|冬)\s*第(\d+)天[：:]\s*(.*)$/);
      if (!match) return { key: `记录-${fallbackIndex}`, season: "", day: "记录", text: String(entry) };
      return { key: `${match[1]}-${match[2]}`, season: match[1], day: match[2], text: match[3] };
    }

    function annalsEventType(text) {
      if (/解锁成就/.test(text)) return "achievement";
      if (/死亡|死|离去|离开/.test(text)) return "leave";
      if (/定居|归来|回来|住了下来/.test(text)) return "settle";
      return "normal";
    }

    function appendAnnalsText(node, text, type) {
      let match = null;
      if (type === "achievement") match = text.match(/【([^】]+)】/);
      if (!match) match = text.match(/^年老的([^，。；：！？\s]{1,12}?)(?=在|离)/);
      if (!match) match = text.match(/^([^，。；：！？\s]{1,18}?)(?=住了下来|定居|归来|回来|来访|出生|长大|自然恢复|归零|因|在年老|年老|饥饿|没有|离开|离去|死亡|死了|死去)/);
      if (!match) {
        node.textContent = text;
        return;
      }
      const emphasized = match[1];
      const start = text.indexOf(emphasized, match.index || 0);
      node.append(document.createTextNode(text.slice(0, start)));
      node.append(el("strong", { text: emphasized }));
      node.append(document.createTextNode(text.slice(start + emphasized.length)));
    }

    function renderAnnals(data, container) {
      const stack = el("div", { className: "page-stack" });
      stack.append(el("div", { className: "page-heading" }, [
        el("h2", { text: "年鉴" }), el("span", { className: "progress-count", text: `${data.total} 条` })
      ]));
      const parsed = [...(data.timeline || [])].reverse().map(parseAnnalsEntry);
      const groups = [];
      const groupMap = new Map();
      parsed.forEach(item => {
        if (groupMap.has(item.key)) {
          groupMap.get(item.key).events.push(item.text);
        } else {
          const group = { key: item.key, season: item.season, day: item.day, events: [item.text] };
          groupMap.set(item.key, group);
          groups.push(group);
        }
      });
      const seasonClasses = { 春: "season-spring", 夏: "season-summer", 秋: "season-autumn", 冬: "season-winter" };
      const typePriority = { normal: 0, settle: 1, leave: 2, achievement: 3 };
      const timeline = el("ol", { className: "annals-timeline" });
      groups.forEach(group => {
        const types = group.events.map(annalsEventType);
        const dayType = types.reduce((selected, type) => typePriority[type] > typePriority[selected] ? type : selected, "normal");
        const item = el("li", { className: `annals-day type-${dayType}` });
        const badgeText = group.season ? `${group.season}·${group.day}` : group.day;
        item.append(el("span", { className: `date-badge ${seasonClasses[group.season] || "season-unknown"}`, text: badgeText }));
        const events = el("div", { className: "annals-events" });
        group.events.forEach((text, index) => {
          const event = el("p", { className: `annals-event type-${types[index]}` });
          appendAnnalsText(event, text, types[index]);
          events.append(event);
        });
        item.append(events);
        timeline.append(item);
      });
      stack.append(timeline.childElementCount ? timeline : emptyNode());
      container.replaceChildren(stack);
    }

    function detailItem(label, value) {
      return el("div", { className: "detail-item" }, [
        el("span", { className: "detail-label", text: label }),
        el("strong", { className: "detail-value", text: value })
      ]);
    }

    async function openSpecies(name) {
      sheetBackdrop.hidden = false;
      document.body.style.overflow = "hidden";
      sheetTitle.textContent = name;
      sheetContent.replaceChildren(el("div", { className: "loading", text: "读取中" }));
      try {
        const data = await apiGet(`/eco/api/species/${encodeURIComponent(name)}`);
        sheetTitle.textContent = data.name;
        const detail = el("div", { className: "detail-grid" });
        detail.append(detailItem("营养级", data.trophic_label));
        detail.append(detailItem("食物来源", (data.food_sources || []).join("、") || "—"));
        detail.append(detailItem("出生率", data.birth_rate));
        detail.append(detailItem("死亡率", data.death_rate));
        detail.append(detailItem("最大容量", data.max_capacity));
        detail.append(detailItem("当前数量", data.current_count));
        if (data.lifecycle) {
          if (data.lifecycle.stage_days !== undefined) detail.append(detailItem("成长周期", `${data.lifecycle.stage_days}天`));
          if (data.lifecycle.into !== undefined) detail.append(detailItem("转变为", data.lifecycle.into));
          if (data.lifecycle.ratio !== undefined) detail.append(detailItem("转化比例", data.lifecycle.ratio));
          if (data.lifecycle.season_only !== undefined) detail.append(detailItem("限定季节", data.lifecycle.season_only));
        }
        sheetContent.replaceChildren(detail);
      } catch (error) {
        sheetContent.replaceChildren(el("div", { className: "error-state", text: errorMessage(error) }));
      }
    }

    function closeSheet() {
      sheetBackdrop.hidden = true;
      document.body.style.overflow = "";
    }

    buildNav(document.querySelector(".desktop-nav"));
    buildNav(document.querySelector(".bottom-nav"));
    document.getElementById("sheet-close").addEventListener("click", closeSheet);
    sheetBackdrop.addEventListener("click", event => { if (event.target === sheetBackdrop) closeSheet(); });
    document.addEventListener("keydown", event => { if (event.key === "Escape" && !sheetBackdrop.hidden) closeSheet(); });
    activateTab("state");
  </script>
</body>
</html>
