      function updateClock() {
        const remaining = remainingMilliseconds();
        timeNode.textContent = `剩余 ${Math.ceil(remaining / 1000)} 秒`;
        if (remaining <= 0) finish();
      }

      function replaceTarget(record) {
        const index = targets.indexOf(record);
        if (index >= 0) targets.splice(index, 1);
        record.node.remove();
        if (!snailTargetRespawns(record.type)) return;
        later(() => {
          if (!finished) {
            spawnTarget(record.type, record.slot);
          }
        }, 420);
      }

      function returnCatch() {
        if (!attached) return;
        const caught = attached;
        attached = null;
        if (caught.type === "apple") {
          hits += 1;
          reportGameProgress(hits);
          hitsNode.textContent = `福寿螺 ${hits}/${appleTargetCount}`;
          showFeedback("捞到福寿螺！");
        } else if (caught.type === "pond") {
          deadline -= 3000;
          water.classList.remove("penalty");
          void water.offsetWidth;
          water.classList.add("penalty");
          later(() => water.classList.remove("penalty"), 430);
          showFeedback("误抓田螺，扣 3 秒", true);
          updateClock();
          if (finished) return;
          scheduleDeadline();
        } else {
          showFeedback("抓到石头，收钩变慢 · 0分", true);
        }
        replaceTarget(caught);
        if (caught.type === "apple" && hits >= appleTargetCount) later(finish, 260);
      }

      function findCollision(hookBounds) {
        let nearest = null;
        let nearestDistance = GAME_TUNING.snail.catchRadius;
        const hookX = hookBounds.left + hookBounds.width / 2;
        const hookY = hookBounds.top + hookBounds.height / 2;
        targets.forEach(record => {
          if (record.grabbed) return;
          const targetBounds = record.node.getBoundingClientRect();
          const targetX = targetBounds.left + targetBounds.width / 2;
          const targetY = targetBounds.top + targetBounds.height / 2;
          const distance = Math.hypot(hookX - targetX, hookY - targetY);
          if (distance < nearestDistance) {
            nearest = record;
            nearestDistance = distance;
          }
        });
        return nearest;
      }

      function frame(now) {
        if (finished) return;
        updateClock();
        if (finished) return;
        const delta = Math.min(40, now - lastFrame);
        lastFrame = now;
        const bounds = water.getBoundingClientRect();
        const maxLength = Math.max(180, bounds.height - 58);
        const speedMultiplier = now < entangledUntil ? GAME_TUNING.snail.weedSpeedMultiplier : 1;
        const entangled = now < entangledUntil;
        arm.classList.toggle("entangled", entangled);
        water.classList.toggle("entangled", entangled);
        if (mode === "swing") {
          angle = Math.sin((now - swingStarted) / 850) * 52;
        } else if (mode === "out") {
          hookLength = Math.min(maxLength, hookLength + delta * GAME_TUNING.snail.outboundSpeed * speedMultiplier);
          if (hookLength >= maxLength) mode = "back";
        } else {
          const returnSpeed = attached && attached.type === "rock"
            ? GAME_TUNING.snail.rockReturnSpeed
            : (attached ? GAME_TUNING.snail.caughtReturnSpeed : GAME_TUNING.snail.returnSpeed);
          hookLength = Math.max(48, hookLength - delta * returnSpeed * speedMultiplier);
          if (hookLength <= 48) {
            returnCatch();
            mode = "swing";
          }
        }
        arm.style.setProperty("--hook-length", `${hookLength}px`);
        arm.style.transform = `rotate(${angle}deg)`;
        const hookBounds = hook.getBoundingClientRect();
        const endpointX = hookBounds.left + hookBounds.width / 2 - bounds.left;
        const endpointY = hookBounds.top + hookBounds.height / 2 - bounds.top;
        weeds.forEach(record => {
          const weedBounds = record.node.getBoundingClientRect();
          const crossing = hookBounds.right > weedBounds.left && hookBounds.left < weedBounds.right
            && hookBounds.bottom > weedBounds.top && hookBounds.top < weedBounds.bottom;
          if (crossing && !record.touching && mode !== "swing") {
            entangledUntil = now + GAME_TUNING.snail.entangleDuration;
            showFeedback("水草缠住钩爪 · 减速", true);
          }
          record.touching = crossing;
        });
        if (mode === "out" && !attached) {
          const collision = findCollision(hookBounds);
          if (collision) {
            attached = collision;
            collision.grabbed = true;
            collision.node.classList.add("grabbed");
            mode = "back";
          }
        }
        if (attached) {
          attached.node.style.left = `${endpointX}px`;
          attached.node.style.top = `${endpointY}px`;
        }
        const elapsed = (now - swingStarted) / 1000;
        targets.forEach(record => {
          if (record.grabbed || record.type === "rock") return;
          record.node.style.left = `${record.baseX + Math.sin(elapsed * .18 + record.phase) * 2.4}%`;
          record.node.style.top = `${record.baseY}%`;
        });
        weeds.forEach(record => {
          record.node.style.left = `${record.baseX + Math.sin(elapsed * .32 + record.phase) * 1.2}%`;
          record.node.style.top = `${record.baseY}%`;
        });
        animationFrame = window.requestAnimationFrame(frame);
      }

      water.addEventListener("click", () => {
        if (!finished && mode === "swing") mode = "out";
      });

      const body = el("div", { className: "game-body" }, [
        el("div", { className: "game-hud" }, [hitsNode, timeNode]),
        el("div", { className: "game-stage snail-game-stage" }, water)
      ]);
      gameShell.replaceChildren(gameHeader(miniGameInfo.snail.title), body);
      gameCleanup = () => {
        if (animationFrame !== null) window.cancelAnimationFrame(animationFrame);
        if (deadlineTimer !== null) window.clearTimeout(deadlineTimer);
        timers.forEach(timer => window.clearTimeout(timer));
        timers.clear();
      };
      scheduleDeadline();
      animationFrame = window.requestAnimationFrame(frame);
    }

    function hyacinthPullValue(position, plantSize) {
      const distance = Math.abs(position - 50);
      const zoneWidths = {
        small: GAME_TUNING.hyacinth.smallZoneWidth,
        medium: GAME_TUNING.hyacinth.mediumZoneWidth,
        large: GAME_TUNING.hyacinth.largeZoneWidth
      };
      return distance <= zoneWidths[plantSize] / 2 ? 1 : 0;
    }

    function startHyacinthGame(onFinish) {
      const totalNode = el("span", { text: "已拔 0 株" });
      const plantCount = GAME_TUNING.hyacinth.plantCountMin
        + Math.floor(Math.random() * (GAME_TUNING.hyacinth.plantCountMax - GAME_TUNING.hyacinth.plantCountMin + 1));
      const countNode = el("span", { text: `待拔 ${plantCount} 株` });
      const field = el("div", { className: "hyacinth-field", attrs: { role: "button", tabindex: "0", "aria-label": "选择水葫芦并点击停下时机条" } });
      const feedback = el("div", { className: "hyacinth-feedback", attrs: { "aria-live": "polite" } });
      const marker = el("span", { className: "hyacinth-marker" });
      const timingLabel = el("p", { className: "hyacinth-timing-label", text: "再点一下停住标记" });
      const timing = el("div", { className: "hyacinth-timing", attrs: { hidden: "hidden" } }, [
        timingLabel,
        el("div", { className: "hyacinth-track" }, [
          el("span", { className: "hyacinth-ordinary-zone" }),
          el("span", { className: "hyacinth-perfect-zone" }),
          marker
        ])
      ]);
      timing.style.setProperty("--hyacinth-small-zone-width", `${GAME_TUNING.hyacinth.smallZoneWidth}%`);
      timing.style.setProperty("--hyacinth-small-zone-left", `${(100 - GAME_TUNING.hyacinth.smallZoneWidth) / 2}%`);
      timing.style.setProperty("--hyacinth-medium-zone-width", `${GAME_TUNING.hyacinth.mediumZoneWidth}%`);
      timing.style.setProperty("--hyacinth-medium-zone-left", `${(100 - GAME_TUNING.hyacinth.mediumZoneWidth) / 2}%`);
      timing.style.setProperty("--hyacinth-large-zone-width", `${GAME_TUNING.hyacinth.largeZoneWidth}%`);
      timing.style.setProperty("--hyacinth-large-zone-left", `${(100 - GAME_TUNING.hyacinth.largeZoneWidth) / 2}%`);
      const positions = [[13,17],[39,15],[68,18],[89,29],[20,43],[51,39],[80,52],[12,69],[43,68],[76,78]];
      const plants = [];
      const timers = new Set();
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      let selected = null;
      let timingPosition = 2;
      let timingDirection = 1;
      let timingVelocity = 1;
      let nextJitterAt = 0;
      let timingFrame = null;
      let timingLastFrame = performance.now();
      let completed = 0;
      let totalStalks = 0;
      let resolving = false;
      let finished = false;

      function later(callback, delay) {
        const timer = window.setTimeout(() => {
          timers.delete(timer);
          callback();
        }, delay);
        timers.add(timer);
      }

      function showFeedback(text, bad = false) {
        feedback.textContent = text;
        feedback.className = `hyacinth-feedback${bad ? " bad" : ""}`;
        void feedback.offsetWidth;
        feedback.classList.add("show");
        later(() => feedback.classList.remove("show"), 630);
      }

      function finish() {
        if (finished) return;
        finished = true;
        stopCurrentGame();
        onFinish(totalStalks);
      }

      field.append(gameScene("/eco/assets/scene/水面.png"));
      const plantSizes = Array.from({ length: plantCount }, (_, index) => ["small", "medium", "large"][index % 3])
        .sort(() => Math.random() - .5);
      const sizeLabels = { small: "小株", medium: "中株", large: "大株" };
      positions.slice(0, plantCount).forEach((position, index) => {
        const plantSize = plantSizes[index];
        const plant = el("button", { className: `hyacinth-plant ${plantSize}`, attrs: { type: "button", "aria-label": `第${index + 1}株${sizeLabels[plantSize]}水葫芦` } });
        plant.dataset.plantSize = plantSize;
        plant.style.left = `${position[0]}%`;
        plant.style.top = `${position[1]}%`;
        plant.append(animalGameArt("/eco/assets/species/水葫芦.png", "葫", "hyacinth-plant-art"));
        plants.push(plant);
        field.append(plant);
      });
      field.append(
        feedback,
        timing,
        el("div", { className: "game-stage-note", text: "先点一株，再点一次停下标记" })
      );

      function selectPlant(plant) {
        selected = plant;
        selected.classList.add("selected");
        timing.className = `hyacinth-timing ${plant.dataset.plantSize}`;
        timingLabel.textContent = {
          small: "小株 · 稳定慢条，停在亮区",
          medium: "中株 · 快条，停在中等亮区",
          large: "大株 · 抖动快条，停在窄粉区"
        }[plant.dataset.plantSize];
        timing.hidden = false;
        timingPosition = 2;
        timingDirection = 1;
        timingVelocity = 1;
        timingLastFrame = performance.now();
        nextJitterAt = timingLastFrame;
        marker.style.left = `${timingPosition}%`;
      }

      function animateTiming(now) {
        const delta = Math.min(40, now - timingLastFrame);
        timingLastFrame = now;
        if (selected) {
          if (reducedMotion) timingPosition = 50;
          else {
            const plantSize = selected.dataset.plantSize;
            const large = plantSize === "large";
            if (large && now >= nextJitterAt) {
              timingVelocity = GAME_TUNING.hyacinth.jitterMin + Math.random() * (GAME_TUNING.hyacinth.jitterMax - GAME_TUNING.hyacinth.jitterMin);
              nextJitterAt = now + GAME_TUNING.hyacinth.jitterIntervalMin + Math.random() * (GAME_TUNING.hyacinth.jitterIntervalMax - GAME_TUNING.hyacinth.jitterIntervalMin);
            }
            const halfSweep = plantSize === "small"
              ? GAME_TUNING.hyacinth.smallHalfSweep
              : (plantSize === "medium" ? GAME_TUNING.hyacinth.mediumHalfSweep : GAME_TUNING.hyacinth.largeHalfSweep);
            timingPosition += timingDirection * delta * 96 / halfSweep * (large ? timingVelocity : 1);
            if (timingPosition >= 98 || timingPosition <= 2) {
              timingPosition = Math.max(2, Math.min(98, timingPosition));
              timingDirection *= -1;
            }
          }
          marker.style.left = `${timingPosition}%`;
        }
        timingFrame = window.requestAnimationFrame(animateTiming);
      }

      function judgePlant() {
        if (!selected || resolving) return;
        resolving = true;
        const plant = selected;
        selected = null;
        timing.hidden = true;
        plant.classList.remove("selected");
        plant.disabled = true;
        const value = hyacinthPullValue(timingPosition, plant.dataset.plantSize);
        if (value > 0) {
          totalStalks = Math.min(GAME_TUNING.hyacinth.submitMax, totalStalks + 1);
          reportGameProgress(totalStalks);
          totalNode.textContent = `已拔 ${totalStalks} 株`;
          plant.classList.add("pulled");
          showFeedback(totalStalks >= GAME_TUNING.hyacinth.submitMax ? "已拔满 7 株" : "拔除 +1 株");
        } else {
          plant.classList.add("missed");
          showFeedback("失手，这株没有拔掉", true);
        }
        completed += 1;
        countNode.textContent = `待拔 ${plants.length - completed} 株`;
        later(() => {
          plant.hidden = true;
          resolving = false;
          if (totalStalks >= GAME_TUNING.hyacinth.submitMax || completed >= plants.length) finish();
        }, 650);
      }

      field.addEventListener("click", event => {
        if (finished || resolving) return;
        if (selected) {
          judgePlant();
          return;
        }
        const plant = event.target.closest(".hyacinth-plant");
        if (plant && !plant.disabled) selectPlant(plant);
      });

      const body = el("div", { className: "game-body" }, [
        el("div", { className: "game-hud" }, [totalNode, countNode]),
        el("div", { className: "game-stage snail-game-stage" }, field)
      ]);
      gameShell.replaceChildren(gameHeader(miniGameInfo.hyacinth.title), body);
      gameCleanup = () => {
        if (timingFrame !== null) window.cancelAnimationFrame(timingFrame);
        timers.forEach(timer => window.clearTimeout(timer));
        timers.clear();
      };
      timingFrame = window.requestAnimationFrame(animateTiming);
    }

    function startAlgaeGame(onFinish) {
      const scoreNode = el("span", { text: "得分 0" });
      const timeNode = el("span", { text: `剩余 ${Math.ceil(GAME_TUNING.algae.duration / 1000)} 秒` });
      const water = el("div", { className: "algae-water", attrs: { "aria-label": "左右滑动滤网捞取水藻" } });
      const feedback = el("div", { className: "algae-feedback", attrs: { "aria-live": "polite" } });
      const netFallback = el("span", { className: "algae-net-fallback" });
      const net = el("div", { className: "algae-net" }, gameImage("/eco/assets/props/捞网.png", "algae-net-image", netFallback));
      water.style.setProperty("--algae-net-y", `${GAME_TUNING.algae.netY * 100}%`);
      water.style.setProperty("--algae-decor-opacity", String(GAME_TUNING.algae.decorOpacity));
      const decorSlots = [[14, 30, 82, -8], [84, 53, 104, 11], [31, 76, 90, 5]];
      const decorCount = GAME_TUNING.algae.decorCountMin
        + Math.floor(Math.random() * (GAME_TUNING.algae.decorCountMax - GAME_TUNING.algae.decorCountMin + 1));
      const algaeClumpAssets = [
        "/eco/assets/props/绿藻团.png",
        "/eco/assets/props/绿藻团_a.png",
        "/eco/assets/props/绿藻团_b.png"
      ];
      const decorations = decorSlots.slice(0, decorCount).map(([left, top, size, turn], index) => {
        const decoration = animalGameArt(algaeClumpAssets[index % algaeClumpAssets.length], "藻", "algae-decor");
        decoration.style.left = `${left}%`;
        decoration.style.top = `${top}%`;
        decoration.style.setProperty("--algae-decor-size", `${size}px`);
        decoration.style.setProperty("--algae-decor-turn", `${turn}deg`);
        return decoration;
      });
      water.append(gameScene("/eco/assets/scene/水面.png"), ...decorations, feedback, net);

      const ordinaryAssets = algaeClumpAssets;
      const debrisAssets = ["/eco/assets/props/枯叶.png", "/eco/assets/props/小杂鱼.png"];
      const objects = [];
      let score = 0;
      let finished = false;
      let pointerId = null;
      let currentX = null;
      let targetX = null;
      let lastFrame = performance.now();
      let animationFrame = null;
      let stickyTimer = null;
      let stickyUntil = 0;
      let feedbackTimer = null;
      let shakeTimer = null;
      const deadline = Date.now() + GAME_TUNING.algae.duration;

      function finish() {
        if (finished) return;
        finished = true;
        stopCurrentGame();
        onFinish(score);
      }

      function randomItem(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function objectKind() {
        const roll = Math.random();
        if (roll < GAME_TUNING.algae.debrisChance) return "debris";
        const algaeRoll = (roll - GAME_TUNING.algae.debrisChance) / (1 - GAME_TUNING.algae.debrisChance);
        if (algaeRoll < GAME_TUNING.algae.ordinaryCutoff) return "ordinary";
        if (algaeRoll < GAME_TUNING.algae.stickyCutoff) return "sticky";
        return "rare";
      }

      function spawnObject(initialOffset = 0) {
        if (finished) return;
        const bounds = water.getBoundingClientRect();
        if (bounds.width <= 0) return;
        const kind = objectKind();
        const settings = {
          ordinary: { points: GAME_TUNING.algae.ordinaryPoints, size: 45, speed: 58 + Math.random() * 18, asset: randomItem(ordinaryAssets), label: "藻" },
          sticky: { points: GAME_TUNING.algae.stickyPoints, size: 53, speed: 68, asset: "/eco/assets/props/黏性藻团.png", label: "黏" },
          rare: { points: GAME_TUNING.algae.rarePoints, size: 31, speed: 126, asset: "/eco/assets/props/稀有蓝藻.png", label: "蓝" },
          debris: { points: -GAME_TUNING.algae.debrisPenalty, size: 39, speed: 86, asset: randomItem(debrisAssets), label: "扰" }
        }[kind];
        const fallback = el("span", { className: "algae-object-fallback", text: settings.label });
        const node = el("span", {
          className: `algae-floating-object ${kind}`,
          attrs: { "data-kind": kind, "data-points": settings.points, "data-asset": settings.asset }
        }, gameImage(settings.asset, "algae-object-image", fallback));
        node.style.width = `${settings.size}px`;
        node.style.height = `${settings.size}px`;
        const record = {
          kind,
          points: settings.points,
          size: settings.size,
          speed: settings.speed,
          x: 24 + Math.random() * Math.max(1, bounds.width - 48),
          y: -settings.size - initialOffset,
          node
        };
        objects.push(record);
        water.append(node);
      }

      function showFeedback(text, bad = false) {
        feedback.textContent = text;
        feedback.className = `algae-feedback${bad ? " bad" : ""}`;
        void feedback.offsetWidth;
        feedback.classList.add("show");
        if (feedbackTimer !== null) window.clearTimeout(feedbackTimer);
        feedbackTimer = window.setTimeout(() => {
          feedback.classList.remove("show");
          feedbackTimer = null;
        }, 540);
      }

      function clearStickySlowdown() {
        const remaining = stickyUntil - Date.now();
        if (remaining > 0) {
          stickyTimer = window.setTimeout(clearStickySlowdown, remaining + 10);
          return;
        }
        stickyTimer = null;
        stickyUntil = 0;
        net.classList.remove("sticky");
      }

      function applyStickySlowdown() {
        stickyUntil = Date.now() + GAME_TUNING.algae.stickyDuration;
        if (stickyTimer !== null) window.clearTimeout(stickyTimer);
        net.classList.add("sticky");
        stickyTimer = window.setTimeout(clearStickySlowdown, GAME_TUNING.algae.stickyDuration + 10);
      }

      function catchObject(record, index) {
        record.node.remove();
        objects.splice(index, 1);
        if (record.kind === "debris") {
          score = Math.max(0, score - GAME_TUNING.algae.debrisPenalty);
          reportGameProgress(score);
          scoreNode.textContent = `得分 ${score}`;
          water.classList.remove("shake");
          void water.offsetWidth;
          water.classList.add("shake");
          if (shakeTimer !== null) window.clearTimeout(shakeTimer);
          shakeTimer = window.setTimeout(() => {
            water.classList.remove("shake");
            shakeTimer = null;
          }, 390);
          showFeedback(`干扰物 -${GAME_TUNING.algae.debrisPenalty}`, true);
        } else {
          score = Math.min(GAME_TUNING.algae.submitMax, score + record.points);
          reportGameProgress(score);
          scoreNode.textContent = `得分 ${score}`;
          if (record.kind === "sticky") {
            applyStickySlowdown();
            showFeedback(`+${record.points} · 黏住！网兜减速 2 秒`, true);
          } else showFeedback(`+${record.points}`);
        }
      }

      function updatePointerTarget(event) {
        const bounds = water.getBoundingClientRect();
        const halfNet = 56;
        targetX = Math.min(bounds.width - halfNet, Math.max(halfNet, event.clientX - bounds.left));
      }

      water.addEventListener("pointerdown", event => {
        if (finished) return;
        event.preventDefault();
        pointerId = event.pointerId;
        water.setPointerCapture(pointerId);
        updatePointerTarget(event);
      }, { passive: false });
      water.addEventListener("pointermove", event => {
        if (finished || event.pointerId !== pointerId) return;
        event.preventDefault();
        updatePointerTarget(event);
      }, { passive: false });
      function endPointer(event) {
        if (event.pointerId !== pointerId) return;
        if (water.hasPointerCapture(pointerId)) water.releasePointerCapture(pointerId);
        pointerId = null;
      }
      water.addEventListener("pointerup", endPointer);
      water.addEventListener("pointercancel", endPointer);

      function frame(now) {
        if (finished) return;
        const remaining = Math.max(0, deadline - Date.now());
        timeNode.textContent = `剩余 ${Math.ceil(remaining / 1000)} 秒`;
        if (remaining <= 0) {
          finish();
          return;
        }
        const bounds = water.getBoundingClientRect();
        if (currentX === null) {
          currentX = bounds.width / 2;
          targetX = currentX;
        }
        if (stickyUntil > 0 && Date.now() >= stickyUntil) {
          stickyUntil = 0;
          net.classList.remove("sticky");
          if (stickyTimer !== null) window.clearTimeout(stickyTimer);
          stickyTimer = null;
        }
        const damping = Date.now() < stickyUntil ? ALGAE_STICKY_DAMPING : ALGAE_NET_DAMPING;
        currentX += (targetX - currentX) * damping;
        net.style.left = `${currentX}px`;
        const netY = bounds.height * GAME_TUNING.algae.netY;
        const deltaSeconds = Math.min(0.05, (now - lastFrame) / 1000);
        lastFrame = now;
        for (let index = objects.length - 1; index >= 0; index -= 1) {
          const record = objects[index];
          record.y += record.speed * deltaSeconds;
          record.node.style.left = `${record.x}px`;
          record.node.style.top = `${record.y}px`;
          const touchesNet = Math.abs(record.x - currentX) <= GAME_TUNING.algae.catchHalfWidth + record.size * GAME_TUNING.algae.catchSizeFactor
            && Math.abs(record.y - netY) <= GAME_TUNING.algae.catchHalfHeight + record.size * GAME_TUNING.algae.catchSizeFactor;
          if (touchesNet) {
            catchObject(record, index);
          } else if (record.y > bounds.height + record.size) {
            record.node.remove();
            objects.splice(index, 1);
          }
        }
        animationFrame = window.requestAnimationFrame(frame);
      }

      const body = el("div", { className: "game-body" }, [
        el("div", { className: "game-hud" }, [scoreNode, timeNode]),
        el("div", { className: "game-stage algae-game-stage" }, water)
      ]);
      gameShell.replaceChildren(gameHeader(miniGameInfo.algae.title), body);

    function naturalObserveText(text) {
      const start = text.indexOf('{"day"');
      if (start < 0) return stripSummonSentences(text);
      let depth = 0;
      let inString = false;
      let escaped = false;
      for (let index = start; index < text.length; index += 1) {
        const character = text[index];
        if (inString) {
          if (escaped) escaped = false;
          else if (character === "\\") escaped = true;
          else if (character === '"') inString = false;
          continue;
        }
        if (character === '"') inString = true;
        else if (character === "{") depth += 1;
        else if (character === "}") {
          depth -= 1;
          if (depth === 0) {
            return stripSummonSentences(text.slice(0, start).trimEnd());
          }
        }
      }
      return stripSummonSentences(text);
    }

    function stripSummonSentences(text) {
      return String(text || "")
        .replace(/(^|[。！？!?\n])([^。！？!?\n]*summon[^。！？!?\n]*(?:[。！？!?]+|(?=\n|$)))/gi, "$1")
        .replace(/[ \t]+\n/g, "\n")
        .trim();
    }

    function diaryParagraphs(text) {
      const eventPattern = /^(?:当前|变化|种群|数量|水温|溶氧|光照|营养盐|有机碎屑|浑浊度)[：:]|\d|出生|死亡|死去|增加|减少|上升|下降|归来|定居|离开|离去|入眠|苏醒|投放|取走|觅食|捕食|繁殖|孵化|生长|衰退|暴雨|疫病|鼠患|绿潮|入侵|过境|结冰|解锁/;
      return naturalObserveText(String(text || ""))
        .split(/\n+/)
        .map(line => line.trim().replace(/^[·•・▪◦*-]+\s*/, ""))
        .filter(Boolean)
        .map(line => ({ text: line, type: eventPattern.test(line) ? "event" : "narrative" }));
    }

    function renderObserve(text) {
      const paper = el("section", { className: "pixel-card pond-diary observe-zone", attrs: { "aria-label": "观察记录" } });
      const body = el("div", { className: "diary-text" });
      diaryParagraphs(text).forEach(paragraph => body.append(el("p", { className: `diary-paragraph ${paragraph.type}`, text: paragraph.text })));
      paper.append(body);
      return paper;
    }

    function stackPose(offset) {
      if (offset === 0) return { x: 0, y: 0, scale: 1, rotate: 0, opacity: 1, zIndex: 20 };
      const side = offset < 0 ? -1 : 1;
      const depth = Math.min(Math.abs(offset), 3);
      const firstLayer = Math.min(depth, 1);
      const extra = Math.max(depth - 1, 0);
      return {
        x: side * (18 * firstLayer + extra * 12),
        y: 6 * firstLayer + extra * 5,
        scale: 1 - depth * 0.04,
        rotate: side * (1.15 * firstLayer + extra * 0.5),
        opacity: Math.max(0.44, 1 - depth * 0.18),
        zIndex: Math.max(1, 10 - Math.ceil(depth))
      };
    }

    function mixPose(from, to, progress) {
      const mix = key => from[key] + (to[key] - from[key]) * progress;
      return { x: mix("x"), y: mix("y"), scale: mix("scale"), rotate: mix("rotate"), opacity: mix("opacity") };
    }

    function applyPose(node, pose, zIndex) {
      node.style.transform = `translate3d(${pose.x}px, ${pose.y}px, 0) scale(${pose.scale}) rotate(${pose.rotate}deg)`;
      node.style.opacity = String(pose.opacity);
      node.style.zIndex = String(zIndex === undefined ? pose.zIndex : zIndex);
    }

    function buildSettlerHistoryIndex(folio) {
      const index = new Map();
      ((folio && folio.settlers) || []).forEach(group => {
        index.set(group.species, coalesceSettlerResidents(group.residents || []));
      });
      return index;
    }

    function ensureSettlerHistory() {
      if (settlerHistoryIndex) return Promise.resolve(settlerHistoryIndex);
      if (!settlerHistoryPromise) {
        settlerHistoryPromise = apiGet(apiPaths.folio)
          .then(folio => {
            settlerHistoryIndex = buildSettlerHistoryIndex(folio);
            return settlerHistoryIndex;
          })
          .catch(() => {
            settlerHistoryIndex = new Map();
            return settlerHistoryIndex;
          });
      }
      return settlerHistoryPromise;
    }

    function settlerVisitMeta(settler, currentDay) {
      if (!settlerHistoryIndex) return null;
      const species = settler.name || settler.species;
      const arriveDay = Number(settler.arrive_day);
      const timelines = settlerHistoryIndex.get(species) || [];
      const identity = settler.nickname || species;
      const matchingIdentity = timelines.filter(item => (item.nickname || item.name) === identity);
      const timeline = matchingIdentity.find(item => item._returnDays && item._returnDays.has(arriveDay))
        || matchingIdentity.find(item => (item._segments || [item]).some(segment => Number(segment.arrive_day) === arriveDay));
      if (!timeline) return null;
      const segments = timeline._segments || [timeline];
      const uniqueSegments = new Map();
      segments.forEach(segment => {
        const key = `${segment.arrive_day}\u0000${segment.leave_day}`;
        if (!uniqueSegments.has(key)) uniqueSegments.set(key, segment);
      });
      const firstVisit = Math.min(...Array.from(uniqueSegments.values())
        .map(segment => Number(segment.arrive_day))
        .filter(Number.isFinite));
      let cumulativeDays = 0;
      uniqueSegments.forEach(segment => {
        const start = Number(segment.arrive_day);
        const end = segment.leave_day === null || segment.leave_day === undefined ? Number(currentDay) : Number(segment.leave_day);
        if (Number.isFinite(start) && Number.isFinite(end)) cumulativeDays += Math.max(0, end - start);
      });
      const returned = Boolean(timeline._returnDays && timeline._returnDays.has(arriveDay) && Number.isFinite(firstVisit) && firstVisit < arriveDay);
      return { returned, firstVisit, returnDay: arriveDay, cumulativeDays };
    }

    function settlerCard(settler, index, total, currentDay) {
      const species = settler.name || settler.species;
      const title = settler.nickname || species;
      const visitMeta = settlerVisitMeta(settler, currentDay);

      const info = el("div", { className: "settler-card-info" });

        el("h3", { className: "settler-name", text: title }),
        settler.nickname ? el("span", { className: "settler-species", text: species }) : null
      ]));
      const healthClass = settler.health_value < 0.3 ? "danger" : (settler.health_value <= 0.6 ? "warning" : "good");
      const cumulativeDays = visitMeta && visitMeta.returned ? visitMeta.cumulativeDays : settler.days_alive;
      info.append(el("div", { className: "settler-status-line" }, [
        el("span", { text: `到达：第${visitMeta && visitMeta.returned ? visitMeta.firstVisit : settler.arrive_day}天初访` }),
        visitMeta && visitMeta.returned ? el("span", { text: `归来：第${visitMeta.returnDay}天` }) : null,
        el("span", {}, [document.createTextNode("健康："), el("strong", { className: `settler-health ${healthClass}`, text: `${settler.health} ${settler.health_value}` })]),
        el("span", { className: "settler-survival-line", text: `累计驻留 ${cumulativeDays} 天` })
      ]));

      if (total > 1) cardNode.append(el("span", { className: "stack-page", text: `${index + 1}/${total}` }));

    function createSettlerStack(settlers, currentDay) {
      if (!settlers.length) return emptyNode();
      const container = el("div", { className: `settler-stack${settlers.length === 1 ? " single" : ""}` });
      let activeIndex = 0;
      let motion = null;
      let motionRef = null;
      let pointerState = null;
      let suppressClickRef = false;
      let settleFallback = null;
      const layerNodes = new Map();
      const swipeDistance = 136;
      const dragActivationDistance = 14;
      const commitDistance = 42;
      const layerFlipProgress = 0.48;

      function setMotion(nextMotion) {
        motion = nextMotion;
        motionRef = nextMotion;
        renderLayers();
      }

      function finishSettling() {
        const latest = motionRef;
        if (!latest || latest.phase !== "settling") return;
        if (latest.accepted && latest.targetIndex !== null) activeIndex = latest.targetIndex;
        motion = null;
        motionRef = null;
        if (settleFallback !== null) window.clearTimeout(settleFallback);
        settleFallback = null;
        renderLayers();
      }

      function queueSettleFallback() {
        if (settleFallback !== null) window.clearTimeout(settleFallback);
        settleFallback = window.setTimeout(finishSettling, 320);
      }

      function makeLayer(index, role, pose, zIndex) {
        let layer = layerNodes.get(index);
        if (!layer) {
          layer = el("div");
          layer.append(settlerCard(settlers[index], index, settlers.length, currentDay));
          layer.addEventListener("transitionend", event => {
            if (layer.dataset.role === "current" && event.propertyName === "transform") finishSettling();
          });
          layerNodes.set(index, layer);
        }
        layer.className = `settler-layer ${role}${motion && motion.phase === "settling" ? " is-settling" : ""}`;
        applyPose(layer, pose, zIndex);
        layer.dataset.index = String(index);
        layer.dataset.role = role;
        return layer;
      }

      function commitLayers(layers) {
        const visibleLayers = new Set(layers);
        Array.from(container.children).forEach(layer => {
          if (!visibleLayers.has(layer)) layer.remove();
        });
        layers.forEach(layer => container.append(layer));
      }

      function renderLayers() {
        const layers = [];
        if (settlers.length === 1) {
          layers.push(makeLayer(0, "current", stackPose(0), 20));
          commitLayers(layers);
          return;
        }
        if (!motion) {
          settlers.forEach((_, index) => {
            const offset = index - activeIndex;
            if (index !== activeIndex && Math.abs(offset) <= 3.2) layers.push(makeLayer(index, "background", stackPose(offset)));
          });
          layers.push(makeLayer(activeIndex, "current", stackPose(0), 20));
          commitLayers(layers);
          return;
        }

        const motionProgress = motion.phase === "dragging" ? Math.pow(motion.progress, 0.92) : motion.progress;
        const hasTarget = motion.targetIndex !== null;
        const stackShift = hasTarget ? motion.direction * motionProgress : 0;
        const stackAnchorIndex = motion.baseIndex + stackShift;
        settlers.forEach((_, index) => {
          const offset = index - stackAnchorIndex;
          if (index !== motion.baseIndex && index !== motion.targetIndex && Math.abs(offset) <= 3.2) {
            layers.push(makeLayer(index, "background", stackPose(offset)));
          }
        });

        if (hasTarget) {
          const targetPose = mixPose(stackPose(motion.direction), stackPose(0), motionProgress);
          const targetBackgroundZ = stackPose(motion.direction).zIndex;
          const targetZ = motionProgress < layerFlipProgress ? targetBackgroundZ : 24;
          layers.push(makeLayer(motion.targetIndex, "target", targetPose, targetZ));
        }
        const currentPose = mixPose(stackPose(0), stackPose(-motion.direction), motionProgress);
        const currentBackgroundZ = stackPose(-motion.direction).zIndex;
        const currentZ = motionProgress >= layerFlipProgress ? currentBackgroundZ : 24;
        layers.push(makeLayer(motion.baseIndex, "current", currentPose, currentZ));
        commitLayers(layers);
      }

      function settle(accepted) {
        if (!motion) return;
        setMotion({ ...motion, phase: "settling", accepted, progress: accepted ? 1 : 0 });
        queueSettleFallback();
      }

      container.addEventListener("pointerdown", event => {
        if (settlers.length < 2 || pointerState || (motionRef && motionRef.phase === "settling")) return;
        pointerState = { pointerId: event.pointerId, startX: event.clientX, baseIndex: activeIndex, direction: null };
        suppressClickRef = false;
        motion = null;
        motionRef = null;
        container.setPointerCapture(event.pointerId);
      });

      container.addEventListener("pointermove", event => {
        if (!pointerState || event.pointerId !== pointerState.pointerId) return;
        const deltaX = event.clientX - pointerState.startX;
        if (Math.abs(deltaX) > 6) suppressClickRef = true;
        if (pointerState.direction === null && Math.abs(deltaX) <= dragActivationDistance) return;
        if (pointerState.direction === null) pointerState.direction = deltaX < 0 ? 1 : -1;
        const direction = pointerState.direction;
        const directionalDelta = direction === 1 ? -deltaX : deltaX;
        const effectiveDistance = Math.max(0, directionalDelta - dragActivationDistance);
        const candidate = pointerState.baseIndex + direction;
        const targetIndex = candidate >= 0 && candidate < settlers.length ? candidate : null;
        const progress = targetIndex === null ? Math.min(effectiveDistance / swipeDistance, 0.18) : Math.min(effectiveDistance / swipeDistance, 1);
        setMotion({ phase: "dragging", baseIndex: pointerState.baseIndex, direction, targetIndex, progress, effectiveDistance, accepted: false });
      });

      function endPointer(event, cancelled) {
        if (!pointerState || event.pointerId !== pointerState.pointerId) return;
        if (container.hasPointerCapture(event.pointerId)) container.releasePointerCapture(event.pointerId);
        pointerState = null;
        if (!motion) return;
        const accepted = !cancelled && motion.targetIndex !== null && motion.effectiveDistance >= commitDistance;
        settle(accepted);
      }

      container.addEventListener("pointerup", event => endPointer(event, false));
      container.addEventListener("pointercancel", event => endPointer(event, true));
      container.addEventListener("click", () => {
        if (suppressClickRef) {
          suppressClickRef = false;
          return;
        }
        if (settlers.length < 2 || motionRef) return;
        const direction = activeIndex < settlers.length - 1 ? 1 : -1;
        const targetIndex = activeIndex + direction;
        setMotion({ phase: "dragging", baseIndex: activeIndex, direction, targetIndex, progress: 0, effectiveDistance: commitDistance, accepted: false });
        window.requestAnimationFrame(() => settle(true));
      });

      renderLayers();
      return container;
    }

      const values = [

      ])));

    function residentTimeline(resident) {
      const entries = [];
      const seen = new Set();
      let sequence = 0;
      const add = (day, text) => {
        if (day === null || day === undefined) return;
        const numeric = Number(day);
        const key = `${numeric}\u0000${text}`;
        if (seen.has(key)) return;
        seen.add(key);
        entries.push({ day: Number.isFinite(numeric) ? numeric : Number.POSITIVE_INFINITY, sequence: sequence++, text });
      };
      (resident._segments || [resident]).forEach(segment => {
        const returnDays = new Set((segment.return_records || [])
          .filter(record => record && record.day !== null && record.day !== undefined)
          .map(record => Number(record.day)));
        if (!returnDays.has(Number(segment.arrive_day))) add(segment.arrive_day, `第${segment.arrive_day}天 到访`);
        (segment.hibernations || []).forEach(period => {
          if (!period || typeof period !== "object") return;
          add(period.sleep, `第${period.sleep}天 入眠`);
          add(period.wake, `第${period.wake}天 苏醒`);
        });
        (segment.return_records || []).forEach(record => {
          if (record && typeof record === "object") add(record.day, `第${record.day}天 归来`);
        });
        if (segment.leave_day !== null && segment.leave_day !== undefined) {
          const leaveText = segment.reason === null || segment.reason === undefined ? "离开" : reasonLabel(segment.reason);
          add(segment.leave_day, `第${segment.leave_day}天 ${leaveText}`);
        }
      });
      return entries.sort((left, right) => left.day - right.day || left.sequence - right.sequence);
    }

    function coalesceSettlerResidents(residents) {
      const timelines = [];
      (residents || []).forEach(resident => {
        const identity = resident.nickname || resident.name;
        const returnDays = (resident.return_records || [])
          .filter(record => record && record.day !== null && record.day !== undefined)
          .map(record => Number(record.day));
        const arriveDay = Number(resident.arrive_day);
        const target = returnDays.includes(arriveDay)
          ? [...timelines].reverse().find(item => item._identity === identity && item._returnDays.has(arriveDay))
          : null;
        if (target) {
          target._segments.push(resident);
          returnDays.forEach(day => target._returnDays.add(day));
          return;
        }
        timelines.push({
          ...resident,
          _identity: identity,
          _segments: [resident],
          _returnDays: new Set(returnDays)
        });
      });
      return timelines;
    }

    function folioCountSection(title, items, flowClass = "") {
      const { section, body } = createFolioSection(title, false);
      const list = el("div", { className: `folio-record-flow${flowClass ? ` ${flowClass}` : ""}` });

    function folioItemCount(item) {
      const embedded = String((item && item.name) || "").match(/[×x]\s*(\d+)\s*$/i);
      const raw = item && (item.count ?? item.times ?? item.visits ?? item.occurrences);
      const count = Number(raw ?? (embedded && embedded[1]) ?? 1);
      return Number.isFinite(count) ? count : 1;
    }

    function folioItemNotes(item) {
      if (!item || item.notes === null || item.notes === undefined) return [];
      return Array.isArray(item.notes) ? item.notes.map(String) : [String(item.notes)];
    }

    function coalesceVisitorEntries(items) {
      const source = (items || []).map(item => ({ ...item, name: String(item.name || "").replace(/\s*[×x]\s*\d+\s*$/i, "").trim(), notes: folioItemNotes(item), count: folioItemCount(item) }));
      const decisions = [];
      const visitors = source.filter(item => {
        const decisionNote = item.notes.find(note => /你选择[^。；\n]*(?:收留|让[^。；\n]*留下)/.test(note));
        if (!/(?:定居|收留)/.test(item.name) && !decisionNote) return true;
        decisions.push({ item, decisionNote });
        return false;
      });
      decisions.forEach(({ item, decisionNote }) => {
        const directName = item.name.replace(/[\s·]*(?:定居.*|收留.*)$/u, "").trim();
        const target = visitors
          .filter(visitor => item.name.startsWith(visitor.name) || visitor.name === directName)
          .sort((left, right) => right.name.length - left.name.length)[0];
        const note = decisionNote || (item.name.includes("收留") ? "你选择「收留它」" : "你选择「让它留下」");
        const countedNote = /[×x]\s*\d+\s*$/i.test(note) ? note : `${note} ×${item.count}`;
        if (target) target.notes.push(countedNote);
        else visitors.push({ ...item, name: directName || item.name, notes: [...item.notes.filter(existing => existing !== decisionNote), countedNote] });
      });
      return visitors;
    }

    function folioVisitorSection(items) {
      return folioCountSection("访客志", coalesceVisitorEntries(items), "folio-visitor-flow");
    }

      stack.append(speciesSection);

      const { section: rosterSection, body: rosterBody } = createFolioSection("造物名册", false);
      const roster = el("div", { className: "roster-flow" });
      (data.creation_roster || []).forEach(name => roster.append(el("span", { className: "visitor-badge", text: name })));
      rosterBody.append(roster.childElementCount ? roster : emptyNode());
      const clues = el("div", { className: "clue-list" });
      (data.undiscovered_clues || []).forEach(item => clues.append(el("p", { text: `${item.name} · ${item.clue}` })));
      if (clues.childElementCount) rosterBody.append(clues);
      stack.append(rosterSection);

      const { section: settlersSection, body: settlersBody } = createFolioSection("定居者志", true);
      const settlerGroups = el("div", { className: "settler-folio-list" });
      (data.settlers || []).forEach(group => {
        const residents = coalesceSettlerResidents(group.residents || []);
        const nicknames = [...new Set(residents.map(resident => resident.nickname).filter(Boolean))];
        const groupName = group.name || group.species;
        const groupNode = el("article", { className: "settler-folio-group" });
        const namedPart = nicknames.length ? ` · ${nicknames.join("、")}` : "";
        groupNode.append(el("h3", { className: "settler-folio-head", text: `${groupName}${namedPart} · 定居${group.settle_count}次 · 最长存活${group.longest_survival}天` }));
        residents.forEach(resident => {
          const record = el("div", { className: "life-record" });
          const nameColumn = el("div", {}, [
            el("div", { className: "life-name", text: resident.nickname || resident.name }),
            resident.origin !== null && resident.origin !== undefined ? el("span", { className: "origin-chip", text: originLabel(resident.origin) }) : null
          ]);
          const timeline = el("ol", { className: "mini-timeline" });
          residentTimeline(resident).forEach(entry => timeline.append(el("li", { text: entry.text })));
          record.append(nameColumn, timeline);
          groupNode.append(record);
        });
        settlerGroups.append(groupNode);
      });
      settlersBody.append(settlerGroups.childElementCount ? settlerGroups : emptyNode());
      stack.append(settlersSection);

      stack.append(folioVisitorSection(data.visitors));
      stack.append(folioCountSection("事件志", data.events));
      stack.append(folioCountSection("灾害志", data.disasters));
      container.replaceChildren(stack);
    }

    function parseAnnalsEntry(entry, fallbackIndex) {
      const match = String(entry).match(/^(春|夏|秋|冬)\s*第(\d+)天[：:]\s*(.*)$/);
      if (!match) return { key: `记录-${fallbackIndex}`, season: "", day: "记录", text: String(entry) };
      return { key: `${match[1]}-${match[2]}`, season: match[1], day: match[2], text: match[3] };
    }

    function annalsEventType(text) {
      const match = ANNALS_PRIMARY_TYPES.find(([, matches]) => matches(text));
      if (match) return match[0];
      return "normal";
    }

    function appendAnnalsText(node, text, type) {
      let match = null;
      if (type === "leave") match = text.match(/^年(?:老|迈)的([^，。；：！？\s]{1,12}?)(?=在|离|动作|最后)/);
      if (!match && type === "leave") match = text.match(/^([^，。；：！？\s]{1,18}?)\s*的身影(?=再也看不到了)/);
      if (!match && type === "settle") match = text.match(/^第\d+天[，,]\s*([^，。；：！？\s]{1,18}?)(?=重新出现)/);
      if (!match && (type === "settle" || type === "leave")) {
        match = text.match(/^([^，。；：！？\s]{1,18}?)(?=住了下来|定居|归来|重新出现|再也看不到了|消失|离开|离去|死亡)/);
      }
      if (!match) {
        node.append(document.createTextNode(text));
        return;
      }
      const emphasized = match[1];
      const start = text.indexOf(emphasized, match.index || 0);
      node.append(document.createTextNode(text.slice(0, start)));
      node.append(el("strong", { text: emphasized }));
      node.append(document.createTextNode(text.slice(start + emphasized.length)));
    }

    function appendAnnalBadges(node, type, hasChoice) {
      const badges = [];
      if (type === "disaster") badges.push(["灾害", "danger"]);
      if (type === "good") badges.push(["转好", "good"]);
      if (type === "achievement") badges.push(["成就", "gold"]);
      if (hasChoice) badges.push(["决策", "choice"]);
      if (!badges.length) return;
      node.append(el("span", { className: "annal-badges" }, badges.map(([label, variant]) =>
        el("span", { className: `annal-badge ${variant}`, text: label })
      )));
    }

    function renderAnnals(data, container) {
      const parsed = [...(data.timeline || [])]
        .reverse()
        .map(parseAnnalsEntry)
        .map(item => ({ ...item, text: stripSummonSentences(item.text) }))
        .filter(item => item.text);
      const stack = el("div", { className: "page-stack" });
      stack.append(el("div", { className: "page-heading" }, [
        el("h2", { text: "年鉴" }), el("span", { className: "progress-count", text: `${parsed.length} 条` })
      ]));
      const groups = [];
      const groupMap = new Map();
      parsed.forEach(item => {
        if (groupMap.has(item.key)) {
          groupMap.get(item.key).events.push(item.text);
        } else {
          const group = { key: item.key, season: item.season, day: item.day, events: [item.text] };
          groupMap.set(item.key, group);
          groups.push(group);
        }
      });
      const seasonClasses = { 春: "season-spring", 夏: "season-summer", 秋: "season-autumn", 冬: "season-winter" };
      const timeline = el("ol", { className: "annals-timeline" });
      groups.forEach(group => {
        const types = group.events.map(annalsEventType);
        const item = el("li", { className: "annals-day" });
        const badgeText = group.season ? `${group.season}·${group.day}` : group.day;
        item.append(el("span", { className: `date-badge ${seasonClasses[group.season] || "season-unknown"}`, text: badgeText }));
        const events = el("div", { className: "annals-events" });
        group.events.forEach((text, index) => {
          const event = el("p", { className: `annals-event type-${types[index]}` });
          appendAnnalBadges(event, types[index], ANNALS_EVENT_TAXONOMY.choice.some(keyword => text.includes(keyword)));
          appendAnnalsText(event, text, types[index]);
          events.append(event);
        });
        item.append(events);
        timeline.append(item);
      });
      stack.append(timeline.childElementCount ? timeline : emptyNode());
      container.replaceChildren(stack);
    }

    function detailItem(label, value) {
      return el("div", { className: "detail-item" }, [
        el("span", { className: "detail-label", text: label }),
        el("strong", { className: "detail-value", text: value })
      ]);
    }

    async function openSpecies(name) {
      sheetBackdrop.hidden = false;
      document.body.style.overflow = "hidden";
      sheetTitle.textContent = name;
      sheetContent.replaceChildren(el("div", { className: "loading", text: "读取中" }));
      try {
        const data = await apiGet(`/eco/api/species/${encodeURIComponent(name)}`);
        sheetTitle.textContent = data.name;
        const detail = el("div", { className: "detail-grid" });
        detail.append(detailItem("营养级", data.trophic_label));
        detail.append(detailItem("食物来源", (data.food_sources || []).join("、") || "—"));
        detail.append(detailItem("出生率", data.birth_rate));
        detail.append(detailItem("死亡率", data.death_rate));
        detail.append(detailItem("最大容量", data.max_capacity));
        detail.append(detailItem("当前数量", data.current_count));
        if (data.lifecycle) {
          if (data.lifecycle.stage_days !== undefined) detail.append(detailItem("成长周期", `${data.lifecycle.stage_days}天`));
          if (data.lifecycle.into !== undefined) detail.append(detailItem("转变为", data.lifecycle.into));
          if (data.lifecycle.ratio !== undefined) detail.append(detailItem("转化比例", data.lifecycle.ratio));
          if (data.lifecycle.season_only !== undefined) detail.append(detailItem("限定季节", data.lifecycle.season_only));
        }
        sheetContent.replaceChildren(detail);
      } catch (error) {
        sheetContent.replaceChildren(el("div", { className: "error-state", text: errorMessage(error) }));
      }
    }

    function closeSheet() {
      sheetBackdrop.hidden = true;
      document.body.style.overflow = "";
    }

    function initTuner() {
      if (new URLSearchParams(window.location.search).get("tune") !== "1") return;
      const rootStyle = document.documentElement.style;
      const isMobile = window.matchMedia("(max-width: 768px)").matches;
      const storageKey = "cedartoy_eco_tuner";
      let storedConfig = {};
      try {
        storedConfig = JSON.parse(localStorage.getItem(storageKey) || "{}");
      } catch (_error) {
        storedConfig = {};
      }
      const storedRatOffsetY = Number(storedConfig.ratOffsetY);
      const config = {
        spaceScale: 1,
        bodyFontPx: 16,
        bottomNavFontPx: 14,
        cardRadiusPx: 0,
        mobileCodexColumns: 3,
        settlerDensity: "regular",
        annalsGapPx: isMobile ? 10 : 17,
        ratOffsetY: Number.isFinite(storedRatOffsetY) ? Math.max(-40, Math.min(40, storedRatOffsetY)) : 0,
        seasonBadgeColors: {
          spring: "#A8C8A0",
          summer: "#E6A8B1",
          autumn: "#D4B483",
          winter: "#9B8DB5"
        }
      };
      rootStyle.setProperty("--rat-offset-y", `${config.ratOffsetY}px`);
      const panel = el("details", { className: "tuner-panel" });
      panel.append(el("summary", { text: `调参面板 · ${BUILD_VERSION}` }));
      const controls = el("div", { className: "tuner-controls" });
      const spaceBases = {
        "--space-main-top": 24, "--space-main-bottom": 54, "--space-page-gap": 22, "--space-state-gap": 18,
        "--space-environment-gap": 7, "--space-species-gap": 12, "--space-codex-gap": 18, "--space-achievement-gap": 8,
        "--space-folio-gap": 12, "--space-folio-pad-top": 14, "--space-folio-pad-side": 16, "--space-folio-pad-bottom": 17,
        "--space-mobile-main-top": 10, "--space-mobile-page-gap": 13, "--space-mobile-state-gap": 10,
        "--space-mobile-environment-gap": 5, "--space-mobile-species-gap": 7, "--space-mobile-achievement-gap": 6,
        "--space-mobile-folio-pad-top": 10, "--space-mobile-folio-pad-side": 11, "--space-mobile-folio-pad-bottom": 13
      };
      const densityBases = {
        "--settler-stack-height": 146, "--settler-single-height": 132, "--settler-card-height": 126, "--settler-card-padding": 10,
        "--settler-mobile-stack-height": 138, "--settler-mobile-single-height": 126, "--settler-mobile-card-height": 120,
        "--settler-mobile-pad-y": 8, "--settler-mobile-pad-x": 10
      };

      function setScaledProperties(properties, scale) {
        Object.entries(properties).forEach(([property, base]) => {
          rootStyle.setProperty(property, `${Number((base * scale).toFixed(2))}px`);
        });
      }

      function addRange(label, value, min, max, step, apply) {
        const output = el("output", { text: value });
        const input = el("input", { attrs: { type: "range", min, max, step, value } });
        input.addEventListener("input", () => {
          const next = Number(input.value);
          output.textContent = String(next);
          apply(next);
        });
        controls.append(el("label", { className: "tuner-control" }, [el("span", { text: label }), output, input]));
      }

      function addSelect(label, value, options, apply) {
        const select = el("select");
        options.forEach(option => select.append(el("option", { text: option.label, attrs: { value: option.value } })));
        select.value = value;
        select.addEventListener("change", () => apply(select.value));
        controls.append(el("label", { className: "tuner-control" }, [el("span", { text: label }), select]));
      }

      addRange("全局间距档", config.spaceScale, 0.7, 1.3, 0.05, value => {
        config.spaceScale = value;
        rootStyle.setProperty("--space", String(value));
        setScaledProperties(spaceBases, value);
      });
      addRange("正文字号", config.bodyFontPx, 12, 18, 1, value => {
        config.bodyFontPx = value;
        rootStyle.setProperty("--body-font-size", `${value}px`);
      });
      addRange("底部导航字号", config.bottomNavFontPx, 12, 18, 1, value => {
        config.bottomNavFontPx = value;
        rootStyle.setProperty("--bottom-nav-font-size", `${value}px`);
      });
      addRange("卡片圆角", config.cardRadiusPx, 0, 16, 1, value => {
        config.cardRadiusPx = value;
        rootStyle.setProperty("--card-radius", `${value}px`);
      });
      addSelect("图鉴列数（手机）", String(config.mobileCodexColumns), [2,3,4].map(value => ({ value: String(value), label: `${value} 列` })), value => {
        config.mobileCodexColumns = Number(value);
        rootStyle.setProperty("--mobile-codex-columns", value);
      });
      addSelect("定居者卡密度", config.settlerDensity, [
        { value: "compact", label: "紧凑" },
        { value: "regular", label: "常规" }
      ], value => {
        config.settlerDensity = value;
        const density = value === "compact" ? 0.86 : 1;
        rootStyle.setProperty("--settler-density", String(density));
        setScaledProperties(densityBases, density);
      });
      addRange("年鉴节点间距", config.annalsGapPx, 8, 24, 1, value => {
        config.annalsGapPx = value;
        rootStyle.setProperty("--annals-gap", `${value}px`);
        rootStyle.setProperty("--annals-mobile-gap", `${value}px`);
      });
      addRange("ratOffsetY", config.ratOffsetY, -40, 40, 1, value => {
        config.ratOffsetY = value;
        rootStyle.setProperty("--rat-offset-y", `${value}px`);
        try {
          localStorage.setItem(storageKey, JSON.stringify({ ...storedConfig, ratOffsetY: value }));
        } catch (_error) {
          // 隐私模式或存储配额异常时仍保留本次实时调参。
        }
      });

      controls.append(el("strong", { text: "四季徽章颜色" }));
      const colors = el("div", { className: "tuner-colors" });
      [
        ["春", "spring", "--season-spring"],
        ["夏", "summer", "--season-summer"],
        ["秋", "autumn", "--season-autumn"],
        ["冬", "winter", "--season-winter"]
      ].forEach(([label, key, property]) => {
        const input = el("input", { attrs: { type: "color", value: config.seasonBadgeColors[key] } });
        input.addEventListener("input", () => {
          config.seasonBadgeColors[key] = input.value.toUpperCase();
          rootStyle.setProperty(property, input.value);
        });
        colors.append(el("label", { className: "tuner-color" }, [el("span", { text: label }), input]));
      });
      controls.append(colors);

      const output = el("textarea", { className: "tuner-output", attrs: { readonly: "readonly", "aria-label": "导出的调参配置" } });
      output.hidden = true;
      const exportButton = el("button", { className: "tuner-export", text: "导出配置", attrs: { type: "button" } });
      exportButton.addEventListener("click", () => {
        output.value = JSON.stringify(config, null, 2);
        output.hidden = false;
        output.focus();
        output.select();
      });
      controls.append(exportButton, output);
      panel.append(controls);
      document.body.append(panel);
    }

    buildNav(document.querySelector(".desktop-nav"));
    buildNav(document.querySelector(".bottom-nav"));
    document.getElementById("sheet-close").addEventListener("click", closeSheet);
    sheetBackdrop.addEventListener("click", event => { if (event.target === sheetBackdrop) closeSheet(); });
    gameOverlay.addEventListener("click", event => { if (event.target === gameOverlay) requestGameClose(); });
    document.addEventListener("keydown", event => {
      if (event.key !== "Escape") return;
      if (!gameOverlay.hidden) requestGameClose();
      else if (!sheetBackdrop.hidden) closeSheet();
    });
    initTuner();
    activateTab("state");
  </script>
</body>
</html>
