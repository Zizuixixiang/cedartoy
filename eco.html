<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>瓶中生态 · ECO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #FDF6F7;
      --purple: #BEB1D1;
      --purple-dark: #9B8DB5;
      --purple-darker: #8678A0;
      --purple-light: #E6DFF0;
      --pink: #E6A8B1;
      --pink-dark: #C28B93;
      --text: #5C5463;
      --muted: #9ca3af;
      --card-bg: #FFFFFF;
      --paper-bg: #FFFAF0;
      --folio-surface: #FAF8FC;
      --screen-bg: #2D2D2D;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --mobile-nav-height: 60px;
      --space: 1;
      --space-main-top: 24px;
      --space-main-bottom: 54px;
      --space-page-gap: 22px;
      --space-state-gap: 18px;
      --space-environment-gap: 7px;
      --space-species-gap: 12px;
      --space-codex-gap: 18px;
      --space-achievement-gap: 8px;
      --space-folio-gap: 12px;
      --space-folio-pad-top: 14px;
      --space-folio-pad-side: 16px;
      --space-folio-pad-bottom: 17px;
      --space-mobile-main-top: 10px;
      --space-mobile-page-gap: 13px;
      --space-mobile-state-gap: 10px;
      --space-mobile-environment-gap: 5px;
      --space-mobile-species-gap: 7px;
      --space-mobile-achievement-gap: 6px;
      --space-mobile-folio-pad-top: 10px;
      --space-mobile-folio-pad-side: 11px;
      --space-mobile-folio-pad-bottom: 13px;
      --body-font-size: 16px;
      --bottom-nav-font-size: 14px;
      --card-radius: 0px;
      --mobile-codex-columns: 3;
      --settler-density: 1;
      --settler-stack-height: 146px;
      --settler-single-height: 132px;
      --settler-card-height: 126px;
      --settler-card-padding: 10px;
      --settler-mobile-stack-height: 138px;
      --settler-mobile-single-height: 126px;
      --settler-mobile-card-height: 120px;
      --settler-mobile-pad-y: 8px;
      --settler-mobile-pad-x: 10px;
      --settler-info-gap: 3px;
      --diary-paragraph-gap: 9px;
      --folio-masonry-gap: 10px;
      --annals-gap: 17px;
      --annals-mobile-gap: 10px;
      --annals-normal: var(--muted);
      --annals-settle-bg: #FFF1F5;
      --annals-leave-edge: #5B3B73;
      --annals-leave-bg: #F8F4FB;
      --annals-gold-bg: #FFF8E6;
      --annals-badge-danger: #B84C47;
      --annals-badge-good: #56845F;
      --annals-badge-gold: #B08B45;
      --annals-badge-choice: #65778B;
      --season-spring: #A8C8A0;
      --season-summer: #E6A8B1;
      --season-autumn: #D4B483;
      --season-winter: #9B8DB5;
      --weather-sun: #D4B483;
      --weather-cloud: #9CA3AF;
      --weather-rain: #9B8DB5;
      --weather-snow: #FFFFFF;
      --weather-frost-blue: #B9D9EA;
      --weather-frost-gold: #D4B483;
      --game-scene-dim: 38%;
      --game-scene-fallback: linear-gradient(var(--bg), color-mix(in srgb, var(--bg) 75%, var(--purple-light)));
      --rat-board-edge-y: 9%;
      --rat-art-inset-x: 6%;
      --rat-actor-anchor-y: 10%;
      --rat-offset-y: 0px;
      --rat-hit-duration: 260ms;
      --rat-particle-duration: 520ms;
      --turtle-size: 82px;
      --turtle-rock-size: 42%;
      --snail-rock-size: 43px;
      --snail-weed-width: 72px;
      --snail-weed-opacity: .9;
      --snail-entangle-duration: 800ms;
      --hyacinth-small-zone-width: 50%;
      --hyacinth-small-zone-left: 25%;
      --hyacinth-medium-zone-width: 32.5%;
      --hyacinth-medium-zone-left: 33.75%;
      --hyacinth-large-zone-width: 20%;
      --hyacinth-large-zone-left: 40%;
      --algae-net-y: 88%;
      --algae-decor-opacity: .2;
      --ice-fine-first-opacity: .5;
      --ice-fine-deep-opacity: .26;
      --ice-chip-white: #FFFFFF;
      --ice-chip-blue: #B9D9EA;
      --ice-label-fade-duration: 360ms;
      --ice-crack-fade-duration: 500ms;
      --game-info-surface: color-mix(in srgb, var(--bg) 88%, var(--purple-light));
      --game-effect-surface: color-mix(in srgb, var(--purple-light) 42%, var(--bg));
      --snail-warning-surface: color-mix(in srgb, var(--pink) 14%, var(--bg));
      --snail-warning-border: var(--pink);
    }

    html { min-height: 100%; background: var(--bg); image-rendering: pixelated; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background-color: var(--bg);
      background-image:
        linear-gradient(rgba(190, 177, 209, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(190, 177, 209, 0.1) 1px, transparent 1px);
      background-size: 20px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: var(--body-font-size);
    }
    button, summary { font: inherit; }
    button { cursor: pointer; touch-action: manipulation; }
    img { image-rendering: pixelated; }
    h1, h2, h3, .pixel-font, .score, .nav-button, .progress-count, .stack-page {
      font-family: "Silkscreen", -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif;
    }
    .view[hidden], [hidden] { display: none !important; }

    .site-header {
      color: #fff;
      background: var(--purple);
      border-bottom: 4px solid var(--purple-dark);
      padding: 12px max(18px, calc((100vw - 1180px) / 2));
    }
    .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .brand { display: flex; align-items: center; gap: 13px; }
    .pixel-logo { width: 24px; height: 18px; border: 4px solid #fff; box-shadow: 8px 8px 0 -4px #fff; flex: none; }
    .brand h1 { margin: 0; font-size: 23px; letter-spacing: 1px; }
    .brand small { display: block; margin-top: 2px; font-size: 10px; opacity: 0.85; letter-spacing: 0.08em; }
    .desktop-nav { display: flex; gap: 8px; }
    .nav-button {
      min-width: 80px;
      min-height: 42px;
      color: #fff;
      background: transparent;
      border: 3px solid rgba(255,255,255,0.72);
      padding: 8px 13px;
      font-size: 12px;
      font-weight: 700;
    }
    .nav-button[aria-selected="true"] { color: var(--purple-darker); background: #fff; border-color: #fff; box-shadow: 3px 3px 0 var(--purple-darker); }

    main { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: var(--space-main-top) 0 var(--space-main-bottom); }
    .loading, .empty, .error-state { min-height: 140px; display: grid; place-items: center; padding: 24px; color: var(--muted); text-align: center; }
    .error-state { color: var(--pink-dark); }
    .loading::after { content: "..."; }

    .pixel-card {
      position: relative;
      background: #fff;
      border: 4px solid var(--purple);
      box-shadow: 5px 5px 0 rgba(190,177,209,0.42);
      border-radius: var(--card-radius);
    }
    .pixel-card::after { content: ""; position: absolute; inset: 2px; border: 2px solid var(--purple-light); border-radius: max(0px, calc(var(--card-radius) - 3px)); pointer-events: none; }
    .pixel-card > * { position: relative; z-index: 1; }
    .section-title { margin: 0 0 12px; color: var(--purple-darker); font-size: 16px; }
    .page-stack { display: grid; gap: var(--space-page-gap); }
    .page-heading { display: flex; align-items: end; justify-content: space-between; gap: 16px; }
    .page-heading h2 { margin: 0; color: var(--purple-darker); font-size: 28px; }
    .progress-count { color: var(--pink-dark); font-size: 15px; }

    .state-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(350px, 0.9fr);
      grid-template-areas:
        "summary summary"
        "disaster disaster"
        "choice choice"
        "observe observe"
        "settlers environment"
        "populations populations";
      gap: var(--space-state-gap);
      align-items: start;
    }
    .status-banner { grid-area: summary; display: grid; grid-template-columns: 150px 1fr; align-items: center; min-height: 116px; padding: 18px 24px; overflow: hidden; }
    .status-banner .score { color: var(--pink-dark); font-size: 72px; line-height: 1; text-align: center; border-right: 3px solid var(--purple-light); }
    .status-copy { padding: 0 58px 0 24px; }
    .status-day { color: var(--purple-darker); font-size: 22px; font-weight: 700; }
    .status-comment { margin: 8px 0 0; color: var(--text); font-size: 13px; line-height: 1.6; }

    .weather-corner { position: absolute; z-index: 3; top: 9px; right: 10px; width: 48px; height: 48px; overflow: hidden; pointer-events: none; }
    .weather-sun-disc, .weather-cloud, .weather-lightning, .weather-fog-bands, .weather-frost-ring, .weather-particles { display: none; }
    .weather-clear .weather-sun-disc { position: absolute; left: 14px; top: 14px; display: block; width: 20px; height: 20px; border: 4px dotted var(--weather-sun); border-radius: 50%; animation: weather-spin 18s linear infinite; }
    .weather-clear .weather-sun-disc::before { content: ""; position: absolute; inset: 3px; background: var(--weather-sun); border-radius: 50%; }
    .weather-clear .weather-sun-disc::after { content: ""; position: absolute; inset: -9px; border-radius: 50%; box-shadow: 0 0 12px rgba(212,180,131,0.55); animation: weather-glow 3.6s ease-in-out infinite; }
    .weather-cloud { position: absolute; width: 25px; height: 9px; border-radius: 8px; background: var(--weather-cloud); opacity: 0.75; }
    .weather-cloud::before, .weather-cloud::after { content: ""; position: absolute; bottom: 3px; border-radius: 50%; background: inherit; }
    .weather-cloud::before { left: 5px; width: 10px; height: 10px; }
    .weather-cloud::after { right: 4px; width: 13px; height: 13px; }
    .weather-cloud-one { left: 5px; top: 16px; }
    .weather-cloud-two { right: 3px; top: 25px; width: 21px; height: 7px; opacity: 0.52; }
    .weather-overcast .weather-cloud { display: block; animation: weather-cloud-drift 6.5s ease-in-out infinite alternate; }
    .weather-overcast .weather-cloud-two { animation-delay: -2.8s; animation-direction: alternate-reverse; }
    .weather-rain .weather-cloud-one, .weather-light-rain .weather-cloud-one, .weather-heavy-rain .weather-cloud-one, .weather-plum-rain .weather-cloud-one, .weather-thunderstorm .weather-cloud-one { display: block; }
    .weather-particles { position: absolute; inset: 0; }
    .weather-rain .weather-particles, .weather-light-rain .weather-particles, .weather-heavy-rain .weather-particles, .weather-plum-rain .weather-particles, .weather-thunderstorm .weather-particles, .weather-snow .weather-particles, .weather-hail .weather-particles { display: block; }
    .weather-particles i { position: absolute; display: block; left: calc(5px + var(--particle-x)); top: 25px; width: 2px; height: 10px; background: var(--weather-rain); opacity: 0; animation: weather-rain-fall 1s linear infinite; animation-delay: var(--particle-delay); }
    .weather-particles i:nth-child(1) { --particle-x: 0px; --particle-delay: -0.1s; }
    .weather-particles i:nth-child(2) { --particle-x: 6px; --particle-delay: -0.7s; }
    .weather-particles i:nth-child(3) { --particle-x: 12px; --particle-delay: -0.35s; }
    .weather-particles i:nth-child(4) { --particle-x: 18px; --particle-delay: -0.9s; }
    .weather-particles i:nth-child(5) { --particle-x: 24px; --particle-delay: -0.5s; }
    .weather-particles i:nth-child(6) { --particle-x: 30px; --particle-delay: -0.15s; }
    .weather-particles i:nth-child(7) { --particle-x: 35px; --particle-delay: -0.8s; }
    .weather-particles i:nth-child(8) { --particle-x: 39px; --particle-delay: -0.42s; }
    .weather-light-rain .weather-particles i:nth-child(n+5) { display: none; }
    .weather-light-rain .weather-particles i { width: 1px; height: 8px; animation-duration: 1.35s; opacity: 0.55; }
    .weather-rain .weather-particles i:nth-child(n+7) { display: none; }
    .weather-rain .weather-particles i { animation-duration: 0.95s; }
    .weather-heavy-rain .weather-particles i, .weather-thunderstorm .weather-particles i { height: 13px; animation-duration: 0.62s; }
    .weather-plum-rain .weather-particles i { width: 1px; height: 9px; animation-duration: 1.18s; opacity: 0.62; }
    .weather-thunderstorm { animation: weather-flash-bg 5s linear infinite; }
    .weather-thunderstorm .weather-lightning { position: absolute; z-index: 2; left: 25px; top: 19px; display: block; width: 9px; height: 17px; background: #F3D36B; clip-path: polygon(45% 0,100% 0,62% 42%,100% 42%,18% 100%,38% 55%,0 55%); opacity: 0; animation: weather-lightning-flash 5s linear infinite; }
    .weather-fog .weather-fog-bands { position: absolute; inset: 7px 0; display: block; overflow: hidden; }
    .weather-fog-bands i { position: absolute; left: -16px; width: 64px; height: 7px; border-radius: 10px; background: rgba(255,255,255,0.62); animation: weather-fog-drift 7s ease-in-out infinite alternate; }
    .weather-fog-bands i:nth-child(1) { top: 6px; }
    .weather-fog-bands i:nth-child(2) { top: 18px; animation-delay: -2.4s; }
    .weather-fog-bands i:nth-child(3) { top: 30px; animation-delay: -4.1s; }
    .weather-snow .weather-particles i { width: 5px; height: 5px; border-radius: 50%; background: var(--weather-snow); box-shadow: 0 0 0 1px rgba(155,141,181,0.25); animation: weather-snow-fall 3.4s ease-in infinite; }
    .weather-snow .weather-particles i:nth-child(n+6) { display: none; }
    .weather-hail .weather-particles i { width: 5px; height: 5px; border-radius: 50%; background: var(--weather-snow); box-shadow: 0 0 0 1px var(--purple-light); animation: weather-hail-fall 0.72s linear infinite; }
    .weather-hail .weather-particles i:nth-child(n+7) { display: none; }
    .weather-spring-chill .weather-frost-ring, .weather-autumn-frost .weather-frost-ring { position: absolute; inset: 2px; display: block; border-radius: 8px; animation: weather-frost-pulse 3.2s ease-in-out infinite; }
    .weather-spring-chill .weather-frost-ring { background: radial-gradient(circle, transparent 58%, color-mix(in srgb, var(--weather-frost-blue) 72%, transparent) 74%, transparent 78%); box-shadow: inset 0 0 0 2px var(--weather-frost-blue); }
    .weather-autumn-frost .weather-frost-ring { background: radial-gradient(circle, transparent 58%, color-mix(in srgb, var(--weather-frost-gold) 68%, transparent) 74%, transparent 78%); box-shadow: inset 0 0 0 2px var(--weather-frost-gold); }
    @keyframes weather-spin { to { transform: rotate(360deg); } }
    @keyframes weather-glow { 0%,100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.08); } }
    @keyframes weather-cloud-drift { from { transform: translateX(-3px); } to { transform: translateX(4px); } }
    @keyframes weather-rain-fall { 0% { transform: translateY(-3px); opacity: 0; } 20% { opacity: 0.8; } 100% { transform: translateY(20px); opacity: 0; } }
    @keyframes weather-lightning-flash { 0%,87%,91%,100% { opacity: 0; } 88%,90% { opacity: 1; } }
    @keyframes weather-flash-bg { 0%,87%,91%,100% { background: transparent; } 88%,90% { background: rgba(255,255,255,0.42); } }
    @keyframes weather-fog-drift { from { transform: translateX(-7px); opacity: 0.38; } to { transform: translateX(9px); opacity: 0.75; } }
    @keyframes weather-snow-fall { 0% { transform: translate(-2px,-6px); opacity: 0; } 20% { opacity: 0.9; } 55% { transform: translate(4px,10px); } 100% { transform: translate(-3px,25px); opacity: 0; } }
    @keyframes weather-hail-fall { from { transform: translateY(-5px); opacity: 0.2; } to { transform: translateY(24px); opacity: 0.95; } }
    @keyframes weather-frost-pulse { 0%,100% { opacity: 0.42; transform: scale(0.96); } 50% { opacity: 0.82; transform: scale(1); } }

    .disaster-zone { grid-area: disaster; padding: 16px; border-color: var(--pink); box-shadow: 5px 5px 0 rgba(230,168,177,0.34); background: #fffafb; }
    .disaster-zone::after { border-color: rgba(230,168,177,0.38); }
    .choice-zone { grid-area: choice; padding: 16px; }
    .settlers-zone { grid-area: settlers; padding: 16px; overflow: visible; }
    .environment-zone { grid-area: environment; padding: 14px 16px 16px; }
    .populations-zone { grid-area: populations; padding: 0; }
    .observe-zone { grid-area: observe; }
    .notice-list, .choice-options { margin: 0; padding: 0; list-style: none; display: grid; gap: 7px; }
    .notice-list li { border-left: 4px solid var(--pink); padding: 7px 10px; background: rgba(230,168,177,0.1); font-size: 13px; line-height: 1.5; }
    .snail-incubation-warning { display: grid; gap: 9px; padding: 11px 12px; background: var(--snail-warning-surface); border: 3px solid var(--snail-warning-border); font-size: 13px; line-height: 1.55; }
    .snail-incubation-warning .pond-help-button { justify-self: start; }
    .disaster-actions, .playtest-actions { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 12px; }
    .pond-help-button, .playtest-button, .game-button {
      min-height: 44px;
      padding: 9px 14px;
      color: var(--text);
      background: var(--purple-light);
      border: 3px solid var(--purple);
      border-radius: var(--card-radius);
      font-weight: 700;
    }
    .pond-help-button { color: var(--pink-dark); background: color-mix(in srgb, var(--pink) 12%, var(--bg)); border-color: var(--pink); }
    .pond-help-button:disabled { color: var(--muted); background: #efedf1; border-color: var(--muted); cursor: not-allowed; opacity: .78; }
    .playtest-zone { grid-area: playtest; padding: 16px; border-style: dashed; }
    .playtest-zone p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .state-grid.playtest-enabled {
      grid-template-areas:
        "summary summary"
        "playtest playtest"
        "disaster disaster"
        "choice choice"
        "observe observe"
        "settlers environment"
        "populations populations";
    }
    .choice-head { display: flex; align-items: start; justify-content: space-between; gap: 12px; }
    .choice-description { margin: 0 0 10px; line-height: 1.55; }
    .readonly-mark, .small-chip { display: inline-flex; color: var(--pink-dark); background: #fff8fa; border: 2px solid var(--pink); padding: 3px 7px; font-size: 10px; }
    .choice-options li { padding: 7px 10px; background: var(--purple-light); font-size: 12px; }

    .environment-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: var(--space-environment-gap); }
    .environment-cell { height: 62px; display: grid; align-content: center; justify-items: center; background: #faf8fc; border: 2px solid var(--purple-light); padding: 5px; }
    .environment-label { color: var(--muted); font-size: 10px; }
    .environment-number { color: var(--purple-darker); font-size: 20px; font-weight: 700; line-height: 1.2; }
    .environment-trend { color: var(--pink-dark); margin-left: 3px; font-size: 15px; }

    .settler-stack { position: relative; min-height: var(--settler-stack-height); margin: 0 22px 4px; overflow: visible; touch-action: pan-y; perspective: 800px; user-select: none; }
    .settler-stack.single { margin-inline: 0; min-height: var(--settler-single-height); }
    .settler-layer { position: absolute; inset: 0; pointer-events: none; will-change: transform, opacity; transform-origin: center center; }
    .settler-layer.is-settling { transition: transform 260ms ease, opacity 260ms ease; }
    .settler-stack-card { height: var(--settler-card-height); padding: var(--settler-card-padding); overflow: hidden; background: #fff; border: 4px solid var(--purple); border-radius: var(--card-radius); box-shadow: 5px 5px 0 rgba(190,177,209,0.46); }
    .settler-stack-card::after { content: ""; position: absolute; inset: 3px; border: 2px solid var(--purple-light); border-radius: max(0px, calc(var(--card-radius) - 4px)); pointer-events: none; }
    .settler-card-layout { position: relative; z-index: 1; display: grid; grid-template-columns: 44px minmax(0,1fr); gap: 14px; height: 100%; align-items: start; }
    .settler-card-art-slot { position: relative; width: 44px; height: 44px; display: grid; place-items: center; flex: none; }
    .settler-card-art { position: absolute; inset: 0; width: 44px; height: 44px; object-fit: contain; image-rendering: pixelated; }
    .settler-card-art-fallback { width: 44px; height: 44px; display: grid; place-items: center; color: var(--muted); background: #efedf1; border-radius: 8px; font-size: 17px; font-weight: 700; }
    .settler-card-info { min-width: 0; display: grid; gap: var(--settler-info-gap); padding-right: 38px; }
    .settler-name-line { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
    .settler-name { margin: 0; color: var(--purple-darker); font-size: 20px; overflow-wrap: anywhere; }
    .settler-species { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .settler-status-line { display: grid; gap: var(--settler-info-gap); color: var(--text); font-size: 10px; line-height: 1.2; }
    .settler-status-line span { display: block; white-space: nowrap; }
    .settler-survival-line { color: var(--muted); }
    .settler-health { font-weight: 700; }
    .settler-health.danger { color: #BD5262; }
    .settler-health.warning { color: #C98345; }
    .settler-health.good { color: #3F8D63; }
    .settler-return-line { display: flex; flex-wrap: wrap; gap: 5px; }
    .settler-return-badge { display: inline-flex; color: var(--pink-dark); background: #fff8fa; border: 2px solid var(--pink); padding: 2px 6px; font-size: 9px; line-height: 1.3; }
    .stack-page { position: absolute; z-index: 2; top: 12px; right: 13px; color: var(--pink-dark); font-size: 11px; }

    .pond-diary { min-height: 260px; padding: 24px 27px; color: var(--text); background: var(--paper-bg); border-left-color: var(--pink); }
    .pond-diary::after { display: none; }

    .sheet-backdrop { position: fixed; z-index: 60; inset: 0; display: flex; align-items: end; justify-content: center; padding: 14px 14px 0; background: rgba(45,45,45,0.45); }

    .game-overlay {

      display: grid;

      color: var(--text);
      background: var(--bg);
      border-inline: 4px solid var(--purple-dark);
      overflow: hidden;

    .game-instruction { margin: 0; color: var(--muted); font-size: 12px; text-align: center; }
    .rat-board { position: relative; width: 100%; height: 100%; min-height: 0; display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); grid-template-rows: repeat(3,minmax(0,1fr)); column-gap: 2%; row-gap: 0; padding-block: var(--rat-board-edge-y); }
    .rat-hole { position: relative; z-index: 1; min-width: 0; min-height: 0; padding: 0; background: transparent; border: 0; overflow: visible; touch-action: manipulation; }

    .game-prop-fallback { position: absolute; left: 12%; right: 12%; bottom: 10%; height: 27%; background: var(--screen-bg); border: 5px solid var(--purple-darker); border-radius: 50%; opacity: 0.82; }
    .game-prop-fallback.rock-shape { left: 3%; right: auto; bottom: 7%; width: 29%; height: 18%; background: var(--muted); border: 3px solid var(--purple-darker); border-radius: 48% 54% 32% 35%; opacity: 0.55; }
    .rat-hole-art { position: absolute; top: 50%; right: auto; left: 50%; bottom: auto; width: calc(100% - 2 * var(--rat-art-inset-x)); height: auto; aspect-ratio: 303 / 181; transform: translate(-50%,-50%); overflow: visible; }
    .rat-hole-art > .game-prop-image, .rat-hole-art > .game-prop-fallback { z-index: 3; inset: 0; width: 100%; height: 100%; }
    .rat-actor { position: absolute; z-index: 4; left: 50%; bottom: var(--rat-actor-anchor-y); width: 100%; height: auto; aspect-ratio: 303 / 219; display: grid; place-items: center; transform: translate(-50%,calc(76% + var(--rat-offset-y))); opacity: 0; transition: transform 120ms ease-out, opacity 90ms linear; pointer-events: none; }
    .rat-actor .game-animal-fallback { position: absolute; inset: 0; width: 100%; height: 100%; color: var(--pink-dark); background: color-mix(in srgb, var(--pink) 24%, var(--purple-light)); }
    .rat-hole.active .rat-actor { transform: translate(-50%,var(--rat-offset-y)); opacity: 1; }
    .game-animal-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
    .game-animal-fallback { width: 58px; height: 58px; display: grid; place-items: center; color: var(--purple-darker); background: var(--purple-light); border: 4px solid var(--purple); border-radius: 50%; font-size: 25px; font-weight: 700; }
    .rat-hole.hit .rat-actor { animation: rat-hit-retract var(--rat-hit-duration) ease-in forwards; }

    .rat-hit-particle.dust { border-radius: 50%; clip-path: none; opacity: .72; }

    .turtle-stage { display: grid; grid-template-rows: auto minmax(0,1fr) auto; gap: 16px; height: 100%; }
    .turtle-progress { height: 30px; padding: 4px; background: var(--bg); border: 4px solid var(--purple); }

    .turtle-swimmer { position: absolute; z-index: 3; left: 50%; top: 39%; width: var(--turtle-size); height: var(--turtle-size); padding: 0; transform: translate(-50%,-50%); background: transparent; border: 0; }

    "use strict";

      choice: Object.freeze(["你选择"]),

      return ANNALS_EVENT_TAXONOMY[type].some(keyword =>
        keyword === "年老" ? /年老(?!鼠)/u.test(text) : text.includes(keyword)
      );
    }
    const ANNALS_PRIMARY_TYPES = Object.freeze([
      ["achievement", text => /【[^】]+】/u.test(text)],
      ["leave", text => annalsHasKeyword(text, "leave")],
      ["good", text => annalsHasKeyword(text, "good")],
      ["disaster", text => annalsHasKeyword(text, "disaster")],
      ["settle", text => annalsHasKeyword(text, "settle")]
    ]);
    const loaded = new Set();
    const queryParams = new URLSearchParams(window.location.search);
    const views = Object.fromEntries(tabs.map(tab => [tab.id, document.getElementById(`view-${tab.id}`)]));
    const aiUserId = queryParams.get("ai_user_id");

    const DISASTER_SESSION_KEY = `cedartoy_eco_disasters:${aiUserId || "anonymous"}`;
    const disasterSessionState = readDisasterSessionState();

    const sheetBackdrop = document.getElementById("species-sheet");

    const miniGameInfo = {
      rat: { title: "鼠患打地鼠", action: "hunt_rat", helpButton: "帮小机打田鼠", how: "田鼠探头时点中,30 秒内尽量多打。", help: "田鼠越少,每天啃掉的芦苇越少;把它们打到只剩爆发时的四分之一,鼠患当场平息。" },

      snail: { title: "福寿螺捞螺", action: "catch_snail", helpButton: "帮小机捞福寿螺", how: "看准钩爪方向点击水面捞福寿螺;避开田螺和石头,穿过水草会短暂缠住减速。", help: "捞掉几只,当天对水藻的压制就轻几分;捞光就彻底解除。" },
      hyacinth: { title: "水葫芦拔草", action: "pull_hyacinth", helpButton: "帮小机拔水葫芦", how: "点一株水葫芦，再点一次把移动标记停进有效区。", help: "每拔一株削掉一点覆盖(一次最多 7 株);比小机连根乱拔温柔得多,不搅浑水不伤邻居。" },
      algae: { title: "绿潮捞藻", action: "skim_algae", helpButton: "帮小机捞藻", how: "左右滑动滤网接住绿藻团，避开枯叶和小鱼；黏藻会让网兜减速 2 秒。", help: "捞得越多,绿潮期间每天的缺氧就越轻;捞满 50 团还能让它提前一天散去。" },
      ice: { title: "凿冰", action: "crack_ice", helpButton: "帮小机凿冰", how: "连续点击冰面不同位置，把凿冰进度推到 100%。", help: "冰下的每一天,冬眠的动物都在憋气;凿开的洞能透气三天。整个冬天憋气越少,春天醒来的动物越多。你和小机同一天都试,成功率大增(85%)。" }
    };
    // 小游戏真机调参区：时长均为毫秒，倍率与阈值可直接在这里微调。
    const GAME_TUNING = Object.freeze({
      rat: { duration: 30000, minOpportunities: 10, maxOpportunities: 12, holdDurations: [500, 900, 1400], simultaneousPairsMin: 2, simultaneousPairsMax: 4, simultaneousTriplesMin: 0, simultaneousTriplesMax: 2, firstPopDelay: 900, endBuffer: 500, hitActorDuration: 260, hitEffectDuration: 540 },
      turtle: { duration: 20000, maxProgress: 100, tapGain: 3, decayPerSecond: 8, decayTick: 100, exitDuration: 900 },
      snail: { duration: 30000, catchRadius: 38, outboundSpeed: 0.34, returnSpeed: 0.38, caughtReturnSpeed: 0.23, rockReturnSpeed: 0.105, weedSpeedMultiplier: 0.5, entangleDuration: 800 },
      hyacinth: { plantCountMin: 8, plantCountMax: 10, stalkReduction: 0.02, submitMax: 7, largeHalfSweep: 1000, mediumHalfSweep: 1350, smallHalfSweep: 1750, jitterMin: 0.82, jitterMax: 1.18, jitterIntervalMin: 110, jitterIntervalMax: 230, smallZoneWidth: 50, mediumZoneWidth: 32.5, largeZoneWidth: 20 },
      algae: {
        duration: 45000,
        submitMax: 50,
        netY: 0.88,
        spawnInterval: 750,
        maxFloatingObjects: 10,
        initialSpawnOffsets: [0, 140, 280],
        catchHalfWidth: 38,
        catchHalfHeight: 16,
        catchSizeFactor: 0.18,
        debrisChance: 0.15,
        ordinaryCutoff: 0.744,
        stickyCutoff: 0.922,
        stickyDuration: 2000,
        ordinaryPoints: 1,
        stickyPoints: 1,
        rarePoints: 2,
        debrisPenalty: 2,
        decorCountMin: 2,
        decorCountMax: 3,
        decorOpacity: 0.2
      },
      submitLimits: { rat: 12 },
      ice: { fineThreshold: 50, deepThreshold: 80, labelFadeDelay: 2000, hitGain: 5 }
    });
    const ALGAE_NET_DAMPING = 0.14;
    const ALGAE_STICKY_DAMPING = 0.055;
    const MINI_GAME_ASSETS = Object.freeze({
      rat: [
        "/eco/assets/scene/岸边.png",
        "/eco/assets/props/鼠洞.png",
        "/eco/assets/props/田鼠探头.png"
      ],
      turtle: [
        "/eco/assets/scene/水面.png",
        "/eco/assets/props/石头.png",
        "/eco/assets/species/巴西龟.png"
      ],
      snail: [
        "/eco/assets/scene/水下.png",
        "/eco/assets/props/钩爪.png",
        "/eco/assets/props/石头.png",
        "/eco/assets/species/福寿螺.png",
        "/eco/assets/species/田螺.png",
        "/eco/assets/species/水藻.png"
      ],
      hyacinth: [
        "/eco/assets/scene/水面.png",
        "/eco/assets/species/水葫芦.png"
      ],
      algae: [
        "/eco/assets/scene/水面.png",
        "/eco/assets/props/捞网.png",
        "/eco/assets/props/绿藻团.png",
        "/eco/assets/props/绿藻团_a.png",
        "/eco/assets/props/绿藻团_b.png",
        "/eco/assets/props/枯叶.png",
        "/eco/assets/props/小杂鱼.png",
        "/eco/assets/props/黏性藻团.png",
        "/eco/assets/props/稀有蓝藻.png"
      ],
      ice: [
        "/eco/assets/scene/冰面_完整.png",
        "/eco/assets/scene/冰面_裂纹.png",
        "/eco/assets/props/冰面_细裂纹.png",
        "/eco/assets/props/锤子.png",
        "/eco/assets/props/水花.png",
        "/eco/assets/species/鲫鱼.png",
        "/eco/assets/species/泥鳅.png",
        "/eco/assets/species/草鱼.png"
      ]
    });
    const gameAssetPreloads = new Map();
    const readyGameAssetSources = new Set();

    function preloadGameAssets(gameId) {
      if (gameAssetPreloads.has(gameId)) return gameAssetPreloads.get(gameId).ready;
      const records = (MINI_GAME_ASSETS[gameId] || []).map(src => {
        const image = new Image();
        image.decoding = "async";
        image.loading = "eager";
        if ("fetchPriority" in image) image.fetchPriority = "high";
        const ready = new Promise(resolve => {
          const settle = async () => {
            image.onload = null;
            image.onerror = null;
            if (image.decode) {
              try { await image.decode(); } catch (_) { /* load/error 后继续使用游戏内降级图。 */ }
            }
            if (image.naturalWidth > 0) readyGameAssetSources.add(src);
            resolve();
          };
          image.onload = settle;
          image.onerror = settle;
          image.src = src;
          if (image.complete) settle();
        });
        return { image, ready };
      });
      const preload = { records, ready: Promise.all(records.map(record => record.ready)) };
      gameAssetPreloads.set(gameId, preload);
      return preload.ready;
    }

    function readDisasterSessionState() {
      try {
        const saved = JSON.parse(sessionStorage.getItem(DISASTER_SESSION_KEY) || "{}");
        return {
          prompted: Array.isArray(saved.prompted) ? saved.prompted : [],
          helped: Array.isArray(saved.helped) ? saved.helped : []
        };
      } catch (_) {
        return { prompted: [], helped: [] };
      }
    }

    function saveDisasterSessionState() {
      try {
        sessionStorage.setItem(DISASTER_SESSION_KEY, JSON.stringify({
          prompted: [...promptedDisasterGames],
          helped: [...helpedDisasterGames]
        }));
      } catch (_) { /* 无法使用会话存储时，当前页面内的软限制仍然有效。 */ }
    }

    function helpScopeKey(gameId, state = latestStateRender && latestStateRender.data) {
      if (gameId === "ice") return `ice:${state && state.day !== undefined ? state.day : "today"}`;
      if (gameId === "turtle") {
        const choice = state && state.pending_choice;
        const windowId = choice && (choice.id ?? choice.choice_id ?? choice.window_id ?? choice.key ?? choice.description);
        return `turtle:${windowId === null || windowId === undefined ? "active" : String(windowId)}`;
      }
      return gameId;
    }

    function helpSettledLabel(gameId) {
      if (gameId === "ice") return "今天已凿过,明天再来";
      if (gameId === "turtle") return "这个决策窗口你已帮过忙";
      return "这场灾害你已帮过忙";
    }

    function syncDisasterSessionState(activeGameIds, state) {
      if (playtestMode) return;
      const active = new Set(activeGameIds.map(gameId => helpScopeKey(gameId, state)));
      let changed = false;
      [promptedDisasterGames, helpedDisasterGames].forEach(stored => {
        [...stored].forEach(gameId => {
          if (stored === promptedDisasterGames ? activeGameIds.includes(gameId) : active.has(gameId)) return;
          stored.delete(gameId);
          changed = true;
        });
      });
      if (changed) saveDisasterSessionState();
    }

    function markDisasterHelpSettled(gameId, scopeKey = helpScopeKey(gameId)) {
      if (playtestMode) return;
      helpedDisasterGames.add(scopeKey);
      saveDisasterSessionState();
      document.querySelectorAll("[data-help-scope]").forEach(button => {
        if (button.dataset.helpScope !== scopeKey) return;
        button.disabled = true;
        button.textContent = helpSettledLabel(gameId);
      });
    }

    function applyDisasterHelpState(button, gameId, state = latestStateRender && latestStateRender.data) {
      const scopeKey = helpScopeKey(gameId, state);
      button.dataset.helpGame = gameId;
      button.dataset.helpScope = scopeKey;
      if (playtestMode || !helpedDisasterGames.has(scopeKey)) return;
      button.disabled = true;
      button.textContent = helpSettledLabel(gameId);
    }

    function el(tag, options = {}, children = []) {
      const node = document.createElement(tag);
      if (options.className) node.className = options.className;
      if (options.text !== undefined && options.text !== null) node.textContent = String(options.text);
      if (options.attrs) Object.entries(options.attrs).forEach(([key, value]) => node.setAttribute(key, String(value)));
      const list = Array.isArray(children) ? children : [children];
      list.filter(child => child !== null && child !== undefined).forEach(child => node.append(child));
      return node;
    }

    function card(title, className = "") {
      const node = el("section", { className: `pixel-card ${className}`.trim() });
      if (title) node.append(el("h2", { className: "section-title", text: title }));
      return node;
    }

    function emptyNode() { return el("div", { className: "empty", text: "—" }); }

    function speciesImage(name, className) {
      const image = el("img", {
        className,

    function errorMessage(error) {

    async function apiGet(path) {
      const token = localStorage.getItem("cedartoy_token") || "";
      let response;
      try {
        response = await fetch(`${path}${apiSuffix}`, { headers: { Authorization: `Bearer ${token}` } });
      } catch (cause) {
        const error = new Error("network", { cause });
        error.network = true;
        throw error;
      }
      let payload = null;
      try { payload = await response.json(); } catch (_) { /* 状态码仍可用于错误提示。 */ }
      if (!response.ok) {
        const error = new Error("request");
        error.status = response.status;
        throw error;
      }
      return payload;
    }

    function isSnailIncubating(flags) {
      return Boolean(flags && flags.apple_snail && flags.apple_snail.status === "incubating");
    }

    function playableDisasterGames(disasters, flags) {
      const games = [];
      const invasion = disasters && disasters.invasion;
      const invasionName = invasion && typeof invasion === "object" ? (invasion.name || invasion.kind || invasion.type) : invasion;
      if (invasionName === "巴西龟入侵") games.push("turtle");
      if (invasionName === "福寿螺入侵" || isSnailIncubating(flags)) games.push("snail");
      if (disasters && disasters.water_hyacinth_cover !== null && disasters.water_hyacinth_cover !== undefined) games.push("hyacinth");
      const hasRatProblem = ((disasters && disasters.biological) || []).some(item => item && item.name === "鼠患");
      if (hasRatProblem) games.push("rat");
      const hasAlgaeBloom = ((disasters && disasters.biological) || []).some(item => item && item.name === "绿潮");
      if (hasAlgaeBloom) games.push("algae");
      if (flags && flags.ice_on === true) games.push("ice");
      return games;
    }

    function statePathValue(state, paths) {
      for (const path of paths) {
        let value = state;
        for (const key of path) {
          if (!value || typeof value !== "object" || !Object.prototype.hasOwnProperty.call(value, key)) {
            value = undefined;
            break;
          }
          value = value[key];
        }
        if (value !== null && value !== undefined) return value;
      }
      return undefined;
    }

    function snailRemainingCount(state) {
      const direct = statePathValue(state, [
        ["flags", "apple_snail", "remaining_count"],
        ["flags", "apple_snail", "remaining_snails"],
        ["flags", "apple_snail", "remaining"],
        ["flags", "apple_snail_remaining"],
        ["disasters", "apple_snail_remaining"],
        ["disasters", "apple_snail_count"],
        ["disasters", "snail_remaining"],
        ["disasters", "invasion", "remaining_count"],
        ["disasters", "invasion", "remaining_snails"],
        ["disasters", "invasion", "remaining"],
        ["disasters", "invasion", "count"]
      ]);
      let count = Number(direct);
      if (!Number.isFinite(count)) {
        const item = (((state && state.disasters) || {}).biological || []).find(entry => entry && /福寿螺/.test(entry.name || ""));
        count = Number(item && (item.remaining_count ?? item.count ?? item.remaining_snails));
      }
      return Number.isFinite(count) ? Math.max(0, Math.min(12, Math.round(count))) : 12;
    }

    function winterBreathingStatus(state) {
      const suffocationDays = Number(statePathValue(state, [
        ["winter_suffocation_days"],
        ["suffocation_days"],
        ["ice_suffocation_days"],
        ["flags", "winter_suffocation_days"],
        ["flags", "ice_suffocation_days"],
        ["flags", "ice_breathless_days"],
        ["flags", "winter_hypoxia_days"],
        ["flags", "ice", "suffocation_days"],
        ["disasters", "ice", "suffocation_days"]
      ]));
      const frozenDays = Number(statePathValue(state, [
        ["winter_frozen_days"],
        ["frozen_days"],
        ["ice_frozen_days"],
        ["ice_total_days"],
        ["flags", "winter_frozen_days"],
        ["flags", "ice_frozen_days"],
        ["flags", "ice_total_days"],
        ["flags", "ice_days"],
        ["flags", "ice", "frozen_days"],
        ["disasters", "ice", "frozen_days"]
      ]));
      if (!Number.isFinite(suffocationDays) || !Number.isFinite(frozenDays)) return null;
      return { suffocationDays, frozenDays };
    }

    function reportGameProgress(value) {

      currentGameSession.score = Number.isFinite(amount) ? Math.max(0, amount) : 0;
    }

    function requestGameClose() {
      const session = currentGameSession;
      if (!session || !session.inProgress) {
        closeGameOverlay();
        return;
      }
      if (gameShell.querySelector(".game-exit-confirm")) return;
      const confirmLayer = el("div", { className: "game-exit-confirm", attrs: { role: "alertdialog", "aria-modal": "true", "aria-label": "结束本局" } });
      const yes = el("button", { className: "game-button primary", text: "结束并结算", attrs: { type: "button" } });
      const no = el("button", { className: "game-button", text: "取消", attrs: { type: "button" } });

        el("p", { text: "现在结束,按当前战果结算?" }),
        el("div", { className: "game-exit-confirm-actions" }, [yes, no])
      ]);
      no.addEventListener("click", () => confirmLayer.remove());
      yes.addEventListener("click", () => {
        confirmLayer.remove();
        if (currentGameSession !== session || !session.inProgress) return;
        const score = session.score;
        session.inProgress = false;
        currentGameSession = null;
        stopCurrentGame();
        session.onFinish(score);

      confirmLayer.append(card);

    function gameScoreText(gameId, score) {
      if (score === null || score === undefined) return "";
      if (gameId === "rat") return `游戏得分：命中 ${score} 只`;
      if (gameId === "turtle") return Number(score) === 1 ? "游戏得分：驱赶完成" : `游戏得分：驱赶进度 ${tidyNumber(Number(score), 0)}%`;
      if (gameId === "snail") return `游戏得分：捞到 ${score} 只`;
      if (gameId === "hyacinth") return `游戏得分：拔 ${Number(score) || 0} 株`;
      if (gameId === "algae") return `游戏得分：${score}`;
      return Number(score) === 1 ? "游戏得分：完成凿冰尝试" : `游戏得分：凿冰进度 ${tidyNumber(Number(score), 0)}%`;
    }

    function safeResultText(value) {
      if (value === null || value === undefined) return "";
      const text = String(value).trim();
      if (!text || /^(?:null|undefined)$/i.test(text)) return "";
      return text.replace(/\b(?:null|undefined)\b/gi, "").replace(/\s{2,}/g, " ").trim();
    }

    function guardedResultLine(tag, options, value, buildChildren = null) {
      const text = safeResultText(value);
      if (!text) return null;
      return buildChildren ? el(tag, options, buildChildren(text)) : el(tag, { ...options, text });
    }

    function readableSummary(value) {
      if (typeof value === "string") return safeResultText(value);
      if (Array.isArray(value)) return value.map(readableSummary).filter(Boolean).join("；");
      if (!value || typeof value !== "object") return "";
      for (const key of ["message", "summary", "text", "effect"]) {
        const text = readableSummary(value[key]);
        if (text) return text;
      }
      return Object.entries(value)
        .filter(([, item]) => ["string", "number", "boolean"].includes(typeof item) && safeResultText(item))
        .map(([key, item]) => `${key}：${safeResultText(item)}`)
        .join("；");
    }

    function resultSources(result) {
      const sources = [];
      const add = value => {
        if (!value || typeof value !== "object" || sources.includes(value)) return;
        sources.push(value);
      };
      add(result);
      add(result && result.summary);
      add(result && result.result);
      add(result && result.result && result.result.summary);
      add(result && result.data);
      [...sources].forEach(source => {
        add(source.progress);
        add(source.mechanism);
        add(source.outcome);
        add(source.details);
        add(source.effect);
        add(source.winter);
        ["rat", "snail", "apple_snail", "hyacinth", "algae", "ice"].forEach(key => add(source[key]));
      });
      return sources;
    }

    function resultValue(result, keys) {
      for (const source of resultSources(result)) {
        for (const key of keys) {
          if (Object.prototype.hasOwnProperty.call(source, key) && source[key] !== null && source[key] !== undefined) return source[key];
        }
      }
      return undefined;
    }

    function finiteResultNumber(result, keys) {
      const value = Number(resultValue(result, keys));
      return Number.isFinite(value) ? value : Number.NaN;
    }

    function resultBoolean(result, keys) {
      const value = resultValue(result, keys);
      if (value === true || value === false) return value;
      if (value === 1 || value === "1" || value === "true") return true;
      if (value === 0 || value === "0" || value === "false") return false;
      return undefined;
    }

    function tidyNumber(value, digits = 2) {
      if (!Number.isFinite(value)) return "";
      return Number(value.toFixed(digits)).toString();
    }

    function percentText(value) {
      if (!Number.isFinite(value)) return "";
      const percent = Math.abs(value) <= 1 ? value * 100 : value;
      return `${tidyNumber(percent, 1)}%`;
    }

    function isAlreadyHelped(value) {
      return /already_helped|already_today|这场灾害你已帮过忙|今天已凿过|已经帮过|已帮过/i.test(JSON.stringify(value || {}));
    }

    function pondHelpEffect(gameId, score, result, prevented, rejectedSnail) {
      if (prevented) return "卵块已清除，灾害未发生 · 碎屑 +3";
      if (rejectedSnail) return "";
      if (!result.ok) return "";
      if (gameId === "rat") {
        const removed = finiteResultNumber(result, ["removed", "removed_count", "removed_this_action", "hit", "hits", "hit_count", "rats_removed", "rats_hit", "count"]);
        const remaining = finiteResultNumber(result, ["remaining", "remaining_count", "rats_remaining", "remaining_rats", "mouse_count"]);
        let resolved = resultBoolean(result, ["resolved", "ended", "cleared", "calmed", "suppressed", "target_met", "rat_problem_resolved"]);
        const removedValue = Number.isFinite(removed) ? removed : Math.min(Number(score) || 0, GAME_TUNING.submitLimits.rat);
        if (resolved === undefined && Number.isFinite(remaining)) resolved = remaining <= 3;
        const lines = [`打掉 ${tidyNumber(removedValue, 0)} 只`];
        if (Number.isFinite(remaining)) lines.push(`剩 ${tidyNumber(remaining, 0)} 只`);
        if (resolved !== undefined) lines.push(resolved ? "鼠患已平息" : "鼠患尚未平息");
        return lines.join(" · ");
      }
      if (gameId === "snail") {
        const caught = finiteResultNumber(result, ["caught", "caught_count", "caught_this_action", "removed", "removed_count", "snails_caught", "apple_snails_caught", "count"]);
        const remaining = finiteResultNumber(result, ["remaining", "remaining_count", "snails_remaining", "remaining_snails", "apple_snail_count"]);
        let cleared = resultBoolean(result, ["cleared", "ended", "resolved", "eliminated", "target_met", "all_cleared"]);
        const caughtValue = Number.isFinite(caught) ? caught : Number(score) || 0;
        if (cleared === undefined && Number.isFinite(remaining)) cleared = remaining <= 0;
        const lines = [`捞 ${tidyNumber(caughtValue, 0)} 只`];
        if (Number.isFinite(remaining)) lines.push(`剩 ${tidyNumber(remaining, 0)} 只`);
        if (cleared !== undefined) lines.push(cleared ? "福寿螺已清光" : "福寿螺尚未清光");
        return lines.join(" · ");
      }
      if (gameId === "hyacinth") {
        const stalks = finiteResultNumber(result, ["stalks", "stalk_count", "pulled", "pulled_stalks", "count"]);
        const reduction = finiteResultNumber(result, ["reduction", "reduced_by", "cover_reduction", "reduced_cover", "reduction_amount", "cover_reduced"]);
        const stalkValue = Number.isFinite(stalks) ? stalks : Math.min(Number(score) || 0, GAME_TUNING.hyacinth.submitMax);
        const reductionValue = Number.isFinite(reduction) ? reduction : stalkValue * GAME_TUNING.hyacinth.stalkReduction;
        return `拔 ${tidyNumber(stalkValue, 0)} 株 · 削减 ${tidyNumber(reductionValue)}`;
      }
      if (gameId === "algae") {
        const amount = finiteResultNumber(result, ["amount", "skimmed", "skim_amount", "algae_amount", "score"]);
        const mitigation = finiteResultNumber(result, ["mitigation", "mitigation_rate", "reduction", "reduction_rate", "hypoxia_reduction", "oxygen_deficit_reduction", "daily_hypoxia_reduction", "relief"]);
        let shortened = resultBoolean(result, ["shortened", "shortened_one_day", "ended_early", "early_dispersal", "target_met", "shortened_by_day"]);
        const amountValue = Number.isFinite(amount) ? amount : Math.min(Number(score) || 0, GAME_TUNING.algae.submitMax);
        const mitigationValue = Number.isFinite(mitigation) ? mitigation : amountValue / 50 * 0.3;
        if (shortened === undefined) shortened = amountValue >= 50;
        const lines = [`捞量 ${tidyNumber(amountValue, 0)}`, `减免 ${percentText(mitigationValue)}`];
        lines.push(shortened ? "绿潮提前一天散去" : "绿潮未提前散去");
        return lines.join(" · ");
      }
      if (gameId === "ice") {
        const success = resultBoolean(result, ["success", "succeeded", "ice_hole_opened", "opened"]);
        const dualAttempt = resultBoolean(result, ["both_attempted", "both_tried_today", "dual", "dual_attempt", "human_ai_both_attempted", "human_and_ai_attempted", "human_and_ai", "combined", "combined_today", "combined_attempt", "both_tried"]);
        const suffocationDays = finiteResultNumber(result, ["suffocation_days", "winter_suffocation_days", "breathless_days", "hypoxia_days"]);
        const frozenDays = finiteResultNumber(result, ["frozen_days", "ice_days", "winter_frozen_days"]);
        let suffocationRatio = finiteResultNumber(result, ["suffocation_ratio", "suffocation_share", "winter_suffocation_ratio", "breathless_ratio", "hypoxia_ratio"]);
        if (!Number.isFinite(suffocationRatio) && Number.isFinite(suffocationDays) && Number.isFinite(frozenDays) && frozenDays > 0) suffocationRatio = suffocationDays / frozenDays;
        const lines = [];
        if (success !== undefined) lines.push(success ? "凿冰成功" : "凿冰失败");
        if (dualAttempt !== undefined) lines.push(dualAttempt ? "当日人机双试" : "当日仅人类尝试");
        if (Number.isFinite(suffocationDays)) lines.push(`本冬憋气 ${tidyNumber(suffocationDays)} 天`);
        if (Number.isFinite(suffocationRatio)) lines.push(`占比 ${percentText(suffocationRatio)}`);
        if (lines.length) return lines.join(" · ");
      }
      return readableSummary(result.summary) || readableSummary(result.message) || readableSummary(result.result) || (result.ok ? "池塘收到了你的帮忙。" : "");
    }

    function resultCapNote(gameId, score) {
      if (gameId === "rat" && score > GAME_TUNING.submitLimits.rat) return `上报 ${GAME_TUNING.submitLimits.rat} 只(上限)`;
      if (gameId === "hyacinth" && score > GAME_TUNING.hyacinth.submitMax) return `上报 ${GAME_TUNING.hyacinth.submitMax} 株(单次上限)`;
      if (gameId === "algae" && score > GAME_TUNING.algae.submitMax) return `上报 ${GAME_TUNING.algae.submitMax}(单次上限)`;

    async function postPondHelp(action, payload) {
      if (aiUserId === null || aiUserId === "") {
        const error = new Error("缺少小机绑定信息，请从主站的池塘入口进入。 ");
        error.userMessage = error.message;
        throw error;
      }
      const token = localStorage.getItem("cedartoy_token") || "";
      const body = { action };
      if (payload !== null && payload !== undefined) body.payload = payload;
      let response;
      try {
        response = await fetch(`/eco/api/human_action?ai_user_id=${encodeURIComponent(aiUserId)}`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
      } catch (cause) {
        const error = new Error("网络连接失败，结果没有送达，本次帮忙未生效。", { cause });
        error.userMessage = error.message;
        throw error;
      }
      let data = null;
      try { data = await response.json(); } catch (_) { /* 下方给出可见的通用错误。 */ }
      if (!response.ok) {
        const messages = {
          401: "请先在主站登录。",
          403: "这个账号暂时不能帮这座池塘。",
          404: "灾害可能已经结束，请刷新后再看。",
          429: "操作太快了，本次帮忙未生效。"
        };
        const error = new Error((data && data.message) || messages[response.status] || "提交失败，本次帮忙未生效。");
        error.userMessage = error.message;
        error.status = response.status;
        error.responseData = data;
        throw error;
      }
      if (!data || typeof data.ok !== "boolean") {
        const error = new Error("池塘没有返回有效结果，本次帮忙未生效。");
        error.userMessage = error.message;
        throw error;
      }
      return data;
    }

    async function refreshStateAfterGame() {
      try {
        const state = await apiGet(apiPaths.state);
        renderState(state, views.state);
        loaded.add("state");
        return "";

        return `池塘状态刷新失败：${errorMessage(error)}`;

    async function settleLiveGame(gameId, score) {
      showSubmitting(gameId);
      const info = miniGameInfo[gameId];
      const scopeKey = helpScopeKey(gameId);
      const payload = gameId === "rat"
        ? { count: Math.min(score, GAME_TUNING.submitLimits.rat) }
        : (gameId === "snail"
          ? { count: score }
          : (gameId === "hyacinth"
          ? { stalks: Math.min(score, GAME_TUNING.hyacinth.submitMax) }
          : (gameId === "algae" ? { amount: Math.min(score, GAME_TUNING.algae.submitMax) } : null)));
      try {
        const result = await postPondHelp(info.action, payload);
        const alreadyHelped = !result.ok && isAlreadyHelped(result);
        if (result.ok || alreadyHelped) markDisasterHelpSettled(gameId, scopeKey);
        const rejectedSnail = gameId === "snail" && !result.ok && /not[_ -]?active|不在|结束/i.test(JSON.stringify(result));
        const prevented = result.prevented === true
          || (result.summary && result.summary.prevented === true)
          || (result.result && result.result.prevented === true);
        if (prevented) markDisasterHelpSettled(gameId, scopeKey);
        const effect = pondHelpEffect(gameId, score, result, prevented, rejectedSnail);
        const refreshStatus = gameResultView(gameId, {
          ok: (result.ok && !rejectedSnail) || prevented,
          score,
          capNote: resultCapNote(gameId, score),
          effect,
          message: alreadyHelped ? helpSettledLabel(gameId) : (rejectedSnail ? "卵块好像已经不在了" : ((result.ok || prevented) ? "" : (result.message || "这次行动没有生效。"))),
          refreshing: true,
          playtest: false
        });
        const refreshError = await refreshStateAfterGame();
        if (refreshError) {
          const refreshText = safeResultText(refreshError);
          if (refreshText) {
            refreshStatus.className = "game-result-error";
            refreshStatus.textContent = refreshText;
          } else refreshStatus.remove();
        } else refreshStatus.remove();
      } catch (error) {
        const rejectionText = `${JSON.stringify(error.responseData || {})} ${error.userMessage || ""}`;
        const rejectedSnail = gameId === "snail" && (/not[_ -]?active/i.test(rejectionText) || error.status === 404);
        const alreadyHelped = isAlreadyHelped({ response: error.responseData, message: error.userMessage });
        if (alreadyHelped) markDisasterHelpSettled(gameId, scopeKey);
        const refreshStatus = gameResultView(gameId, {
          ok: false,
          score,
          capNote: resultCapNote(gameId, score),
          message: alreadyHelped ? helpSettledLabel(gameId) : (rejectedSnail ? "卵块好像已经不在了" : (error.userMessage || "提交失败，本次帮忙未生效。")),
          refreshing: true,
          playtest: false
        });
        const refreshError = await refreshStateAfterGame();
        if (refreshError) {
          const refreshText = safeResultText(refreshError);
          if (refreshText) {
            refreshStatus.className = "game-result-error";
            refreshStatus.textContent = refreshText;
          } else refreshStatus.remove();
        } else refreshStatus.remove();
      }
    }

    function simulatePlaytestResult(gameId, score) {
      const amount = Number(score) || 0;
      const ratRemaining = Math.max(0, 12 - Math.min(amount, 12));
      const snailRemaining = Math.max(0, 12 - Math.min(amount, 12));
      const state = latestStateRender && latestStateRender.data;
      const winterStatus = winterBreathingStatus(state) || { suffocationDays: 2, frozenDays: 10 };
      const rawAiAttempted = statePathValue(state, [
        ["flags", "ice_ai_attempted_today"],
        ["flags", "ice", "ai_attempted_today"],
        ["ice", "ai_attempted_today"]
      ]);
      const bothAttempted = rawAiAttempted === undefined
        ? Math.random() < 0.5
        : (rawAiAttempted === true || rawAiAttempted === 1 || rawAiAttempted === "1" || rawAiAttempted === "true");
      const iceSuccess = Math.random() < (bothAttempted ? 0.85 : 0.4);
      const simulatedSuffocationDays = winterStatus.suffocationDays + (iceSuccess ? 0 : 1);
      const simulatedFrozenDays = Math.max(1, winterStatus.frozenDays);
      const summaries = {
        rat: { removed_count: Math.min(amount, 12), remaining_count: ratRemaining, daily_damage_ratio: ratRemaining / 12, resolved: ratRemaining <= 3 },
        turtle: { message: "完成 1 次驱赶进度，等待小机的决策窗口结算。" },
        snail: { caught_count: Math.min(amount, 12), remaining_count: snailRemaining, suppression_ratio: snailRemaining / 12, cleared: snailRemaining === 0 },
        hyacinth: { stalks: Math.min(amount, 7), cover_reduction: Math.min(amount, 7) * 0.02 },
        algae: { amount: Math.min(amount, 50), hypoxia_reduction: Math.min(amount, 50) / 50 * 0.3, persistent: true, shortened: amount >= 50 },
        ice: {
          success: iceSuccess,
          both_attempted: bothAttempted,
          hole_days: iceSuccess ? 3 : 0,
          suffocation_days: simulatedSuffocationDays,
          frozen_days: simulatedFrozenDays,
          suffocation_ratio: simulatedSuffocationDays / simulatedFrozenDays,
          spring_loss_ratio: simulatedSuffocationDays / simulatedFrozenDays * 0.4
        }
      };
      return { ok: true, summary: summaries[gameId] || {} };
    }

    function finishPlaytestGame(gameId, score) {

    }

      for (let index = 0; index < 9; index += 1) {

          later(() => {

          }, GAME_TUNING.rat.hitActorDuration);
          hits += 1;
          reportGameProgress(hits);
          scoreNode.textContent = `命中 ${hits}`;
        });
        holes.push(hole);
        board.append(hole);
      }

      function shuffled(items) {
        const copy = [...items];
        for (let index = copy.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
        }
        return copy;
      }

      function buildTimeline() {
        const tuning = GAME_TUNING.rat;
        const groupOptions = [];
        for (let pairs = tuning.simultaneousPairsMin; pairs <= tuning.simultaneousPairsMax; pairs += 1) {
          for (let triples = tuning.simultaneousTriplesMin; triples <= tuning.simultaneousTriplesMax; triples += 1) {
            const singles = opportunityTarget - pairs * 2 - triples * 3;
            if (singles >= 1) groupOptions.push({ pairs, triples, singles });
          }
        }
        const counts = groupOptions[Math.floor(Math.random() * groupOptions.length)];
        const groupSizes = shuffled([
          ...Array(counts.singles).fill(1),
          ...Array(counts.pairs).fill(2),
          ...Array(counts.triples).fill(3)
        ]);
        const durationBag = shuffled(Array.from(
          { length: opportunityTarget },
          (_, index) => tuning.holdDurations[index % tuning.holdDurations.length]
        ));
        const latestPop = tuning.duration - Math.max(...tuning.holdDurations) - tuning.endBuffer;
        const span = latestPop - tuning.firstPopDelay;
        return groupSizes.map((size, index) => {
          const evenPoint = groupSizes.length === 1 ? 0 : span * index / (groupSizes.length - 1);
          const spacing = groupSizes.length === 1 ? span : span / (groupSizes.length - 1);
          const jitter = index === 0 || index === groupSizes.length - 1
            ? 0
            : (Math.random() - .5) * Math.min(840, spacing * .36);
          return {
            at: tuning.firstPopDelay + evenPoint + jitter,
            holds: durationBag.splice(0, size)
          };
        });
      }

      function popGroup(holds) {
        if (finished) return;
        const inactive = holes.filter(hole => !hole.classList.contains("active") && !hole.classList.contains("hit"));
        shuffled(inactive).slice(0, holds.length).forEach((hole, index) => {
          const token = `${Date.now()}-${Math.random()}`;
          hole.dataset.popToken = token;
          hole.classList.add("active");
          later(() => {
            if (hole.dataset.popToken === token) {
              hole.dataset.popToken = "";
              hole.classList.remove("active");
            }
          }, holds[index]);
        });
      }
      buildTimeline().forEach(pop => later(() => popGroup(pop.holds), pop.at));
      const clockTimer = window.setInterval(() => {
        const remaining = Math.max(0, GAME_TUNING.rat.duration - (Date.now() - startedAt));
        timeNode.textContent = `剩余 ${(remaining / 1000).toFixed(1)} 秒`;
        if (remaining <= 0) finish();
      }, 100);
      gameCleanup = () => {
        window.clearInterval(clockTimer);
        timers.forEach(timer => window.clearTimeout(timer));
        timers.clear();
        holes.forEach(hole => hole.classList.remove("active"));
      };

      const body = el("div", { className: "game-body" }, [
        el("div", { className: "game-hud" }, [scoreNode, timeNode]),
        el("div", { className: "game-stage" }, board)
      ]);
      gameShell.replaceChildren(gameHeader(miniGameInfo.rat.title), body);
    }
